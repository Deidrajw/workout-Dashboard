    const collapse = (label, content) => `<details class="app-detail" style="margin-bottom:8px"><summary style="font-size:12px;font-weight:600;color:var(--t2)">${label}<span style="margin-left:auto;color:var(--t5);font-size:12px">›</span></summary><div class="app-detail-body">${content}</div></details>`;

    return backBtn + `
    <!-- HERO: Quick Reference -->
    <div style="background:linear-gradient(135deg,#7DF9C022,#7DF9C008);border:1px solid #7DF9C044;border-radius:14px;padding:16px;margin-bottom:16px">
      <div class="mono" style="font-size:10px;color:#7DF9C0;letter-spacing:2px;margin-bottom:14px">⚡ QUICK REFERENCE</div>
      ${refCard(10,[[1,"10",[[".25mg",2],[".5mg",5],["1mg",10],["1.5mg",15],["2mg",20]]],[2,"5",[[".25mg",5],[".5mg",10],["1mg",20],["1.5mg",30],["2mg",40]]],[3,"3.3",[[".25mg",8],[".5mg",15],["1mg",30],["1.5mg",45],["2mg",60]]]])}
      ${refCard(30,[[1,"30",[["0.5mg",2],["1mg",3],["1.5mg",5],["2mg",7],["3mg",10]]],[2,"15",[["0.5mg",3],["1mg",7],["1.5mg",10],["2mg",13],["3mg",20]]],[3,"10",[["0.5mg",5],["1mg",10],["1.5mg",15],["2mg",20],["3mg",30]]]])}
    </div>

    <!-- Formula card -->
    <div style="background:var(--surface-2);border:1px solid var(--border-sub);border-radius:12px;padding:14px;margin-bottom:14px">
      <div class="mono" style="font-size:10px;color:var(--t4);letter-spacing:1.5px;margin-bottom:10px">THE FORMULA</div>
      <div style="display:flex;flex-direction:column;gap:8px">
        <div style="background:var(--surface-3);border-radius:8px;padding:10px 12px;font-size:12px;color:var(--t2)">① Concentration = Vial mg ÷ BAC mL</div>
        <div style="background:var(--surface-3);border-radius:8px;padding:10px 12px;font-size:12px;color:var(--t2)">② Units = (Dose mg ÷ Concentration) × 100</div>
      </div>
      <div style="margin-top:10px;padding:10px 12px;background:#A78BFA12;border:1px solid #A78BFA33;border-radius:8px">
        <div class="mono" style="font-size:9px;color:#A78BFA;letter-spacing:1px;margin-bottom:5px">WORKED EXAMPLE</div>

      </div>
    </div>

    <!-- Units explainer -->
    <div style="display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-bottom:14px">

    ${collapse("⚠️ Common mistakes",`<ul style="margin:0;padding:0 0 0 16px;font-size:12px;color:var(--t3);line-height:1.8"><li>Confusing units with mg — they are not the same</li><li>Using different BAC amounts each time without re-logging</li><li>Decimal slip: 1mg ≠ 1mcg (1mg = 1000mcg)</li><li>Reading the wrong edge of the plunger stopper</li></ul>`)}

    ${collapse("📖 Explanations — read when you have time", g.body.map(([heading,text])=>`<div style="margin-bottom:14px"><div style="font-size:12px;font-weight:700;color:var(--t2);margin-bottom:5px">${esc(heading)}</div><div style="font-size:12px;color:var(--t3);line-height:1.65">${esc(text).replace(/\n/g,"<br>")}</div></div>`).join(""))}
    `;
  }

  // Default generic renderer for all other guides
  return backBtn +
  `<div class="hint" style="margin-bottom:20px">${esc(g.cat)} · ${g.min||""}</div>
  ${g.body.map(([heading,text])=>`<div style="margin-bottom:18px"><div style="font-size:13px;font-weight:700;color:var(--t2);margin-bottom:6px">${esc(heading)}</div><div style="font-size:13px;color:var(--t3);line-height:1.65">${esc(text).replace(/\n/g,"<br>")}</div></div>`).join("")}`;

function compoundIntelView(name) {
  const c = cfg(name);
  const lib = LIBRARY.find(l=>l.name===name);
  const aps = allPeptidesIncArchived();
  const p = aps[name];
  const doses = [...(p?.doses||[])].sort((a,b)=>new Date(b.date)-new Date(a.date));
  const kits = state.supplies.filter(s=>s.name===name);
  // Priority: 1) active+reconstituted, 2) active, 3) most recently recon'd, 4) first
  const activeKit = kits.find(k=>k.activeKit && k.reconDate)
    || kits.find(k=>k.activeKit)
    || [...kits].filter(k=>k.reconDate).sort((a,b)=>new Date(b.reconDate)-new Date(a.reconDate))[0]
    || kits[0];

  // ── Reconstitution math ─────────────────────────────────────────────
  const hasKit = !!activeKit;
  const vialMg = hasKit ? parseFloat(activeKit.vialMg||0) : null;
  const bacMl  = hasKit ? parseFloat(activeKit.bacMl||0) : null;
  const conc   = (vialMg && bacMl) ? vialMg/bacMl : null; // mg/mL
  const compUnit = c.unit || "mg"; // compound's native dose unit (mg, mcg, etc.)
  // doseAmt is ALWAYS in mg for all supply math — use doseToMg to normalize
  const doseAmt = doses.length ? doseToMg(doses[0].dose, compUnit) : null;
  const units  = (conc && doseAmt) ? Math.round(doseAmt/conc*100) : null; // U-100 units to draw
  const scheduleDays = p?.scheduleDays || 7;
  const dosesPerVial = (conc && doseAmt) ? Math.floor(vialMg/doseAmt) : null;
  const vialDays = (dosesPerVial && scheduleDays) ? dosesPerVial*scheduleDays : null;

  // Kit-level supply intelligence — all values in mg
  const allKitDoses = doses.filter(d=>activeKit ? (d.kitId===activeKit.id || (!d.kitId && kits.length===1)) : true);
  const usedMg = allKitDoses.reduce((a,d)=>a+doseToMg(d.dose, compUnit),0);
  const totalKitMg = hasKit ? (parseFloat(activeKit.totalVials||1)*vialMg) : null;
  const remMg = totalKitMg ? Math.max(0, totalKitMg-usedMg) : null;
  const mgPerWeek = doseAmt ? doseAmt*(7/scheduleDays) : null;
  const weeksRem = (remMg!=null && mgPerWeek) ? remMg/mgPerWeek : null;
  const depletionDate = weeksRem!=null ? addDays(localDate(), Math.round(weeksRem*7)) : null;

  // Reconstitution age
  const reconDate = activeKit?.reconDate;
  const reconAge = reconDate ? Math.floor(daysSince(reconDate)) : null;
  const expiryDays = activeKit?.expiryDays || 30;

  // What to track
  const trackItems = c.returnSymptoms || (COMPOUND_SYMPTOMS[name]?.symptoms?.slice(0,6)) || [];

  const section = (title, color, content) => `<div class="card" style="border-color:${color||c.color}22;margin-bottom:14px">
    <div class="mono" style="font-size:10px;color:${color||"var(--t4)"};letter-spacing:2px;margin-bottom:12px">${title}</div>
    ${content}
  </div>`;
  const row = (label,val,valColor) => `<div style="display:flex;justify-content:space-between;align-items:center;padding:7px 0;border-bottom:1px solid var(--surface-2)">
    <span style="font-size:12px;color:var(--t4)">${label}</span>
    <span style="font-size:13px;color:${valColor||"var(--t1)"};font-weight:600">${val}</span>
  </div>`;

  return `
  <div style="display:flex;align-items:center;gap:12px;margin-bottom:16px">
    <button id="back-intel" style="background:var(--surface-2);border:1px solid var(--border);color:var(--t3);border-radius:8px;width:32px;height:32px;font-size:18px">‹</button>
    <div style="flex:1">
      <h1 class="serif" style="font-size:20px;margin:0;color:${c.color}">${esc(name)}</h1>
      <div style="font-size:12px;color:var(--t4)">${lib?esc(lib.sub):(c.unit||"mg")+" · peptide"}</div>
    </div>
    <div style="display:flex;flex-direction:column;align-items:flex-end;gap:4px">
      ${hasKit?`<span style="font-size:10px;color:${activeKit.activeKit?"#7DF9C0":"var(--t4)"}">● ${activeKit.activeKit?"Active kit":"Kit in stash"}</span>`:""}
      ${doses.length?`<span style="font-size:10px;color:var(--t4)">${doses.length} doses logged</span>`:""}
    </div>
  </div>

  ${lib?`<div class="card" style="border-color:${c.color}22;margin-bottom:14px">
    <div class="mono" style="font-size:10px;color:var(--t4);letter-spacing:2px;margin-bottom:10px">WHAT IS THIS</div>
    <div style="font-size:13px;color:var(--t3);line-height:1.65;margin-bottom:${lib.mechanism?"12px":"0"}">${esc(lib.overview||"")}</div>
    ${lib.mechanism?`<div class="mono" style="font-size:9px;color:var(--t4);letter-spacing:1.5px;margin-bottom:6px;margin-top:8px">HOW IT WORKS</div><div style="font-size:12px;color:var(--t3);line-height:1.6">${esc(lib.mechanism)}</div>`:""}
  </div>`:""}

  ${lib?.meta?section("AT A GLANCE","var(--t4)",`<div style="display:grid;grid-template-columns:1fr 1fr;gap:10px">${Object.entries(lib.meta).map(([k,v])=>`<div><div class="mono" style="font-size:8px;color:var(--t5);letter-spacing:1px;margin-bottom:2px">${k.toUpperCase()}</div><div style="font-size:12px;color:var(--t2)">${esc(v)}</div></div>`).join("")}</div>`):""}

  ${section("🧪 RECONSTITUTION" + (hasKit?" · YOUR KIT":"· GENERIC GUIDE"), hasKit?"#C8FF9C":"var(--t4)",
    hasKit ? `
      ${row("Vial size", vialMg+"mg", c.color)}
      ${row("BAC water added", bacMl+"mL", c.color)}
      ${row("Concentration", conc?conc.toFixed(2)+"mg/mL":"—", "#7DF9C0")}
      ${doseAmt?row("Your current dose", doseAmt+c.unit, c.color):""}
      ${units!=null?row("Units to draw", units+" units (on 100-unit syringe)", "#C8FF9C"):""}
      ${dosesPerVial?row("Doses per vial", dosesPerVial+" doses", "var(--t2)"):""}
      ${vialDays?row("Vial duration", "~"+vialDays+" days at current pace", "var(--t2)"):""}
      ${reconAge!=null?row("Vial opened", reconAge+"d ago", reconAge>=expiryDays-5?"#F9C87D":"var(--t2)"):""}
      ${reconAge!=null&&reconAge>=expiryDays-5?`<div style="background:#F9C87D10;border:1px solid #F9C87D33;border-radius:8px;padding:8px 10px;margin-top:8px;font-size:11px;color:#F9C87D">⏰ Approaching ${expiryDays}-day expiry — consider opening a new vial soon</div>`:""}
      <div style="font-size:10px;color:var(--t5);margin-top:10px;line-height:1.5">Tip: draw to the unit mark that matches your dose. For example, if concentration is 2mg/mL and your dose is 0.5mg, draw to 25 units.</div>
    ` : `
      <div style="font-size:12px;color:var(--t3);line-height:1.6;margin-bottom:10px">No kit found in your Stash for this compound. Add a kit to get live reconstitution math.</div>
      <div style="font-size:12px;color:var(--t3);line-height:1.6"><b style="color:var(--t2)">General formula:</b> Concentration (mg/mL) = Vial mg ÷ BAC water mL<br>Units to draw = (Dose mg ÷ Concentration) × 100</div>
    `
  )}

  ${(()=>{
    // BAC suggestion section — shown when we know vial size (from kit or skip if unknown)
    const suggestVialMg = vialMg || null;
    if(!suggestVialMg) return "";

    // Generate 3 BAC options: 1mL, 2mL, 3mL (skip if resulting volume > practical ~3mL or concentration < 0.5mg/mL)
    const bacOptions = [1,2,3].map(ml=>({ml, conc: suggestVialMg/ml})).filter(o=>o.conc>=0.5&&o.ml<=3);

    // Score each option: prefer units that are clean multiples of 5/10 for the intended dose
    // "clean" = units value is integer multiple of 5
    const scoreUnits = u => { if(u<=0) return 0; const r=u%5; return r===0?3:(r<=2||r>=3?1:2); };

    const bestIdx = bacOptions.reduce((bestI,opt,i)=>{
      if(!doseAmt) {
        // No dose: prefer 2mL (balanced default)
        return opt.ml===2?i:bestI;
      }
      const u = Math.round(doseAmt/opt.conc*100);
      const uScore = scoreUnits(u);
      const volScore = opt.ml<=2?2:1; // prefer smaller injection volume
      const score = uScore*2+volScore;
      const bestOpt = bacOptions[bestI];
      const bestU = Math.round(doseAmt/bestOpt.conc*100);
      const bestScore = scoreUnits(bestU)*2+(bestOpt.ml<=2?2:1);
      return score>bestScore?i:bestI;
    }, 0);

    const optLabels = ["More concentrated","Balanced dosing","More diluted"];
    const optDescs = [
      "Smaller injection volume. Good for larger doses.",
      "Easiest syringe math for most doses.",
      "More precise measurement for very small doses."
    ];

    const commonDoses = doseAmt
      ? [doseAmt*0.5, doseAmt, doseAmt*2].filter(d=>d>0&&d<=suggestVialMg)
      : suggestVialMg<=5
        ? [0.25,0.5,1].filter(d=>d<=suggestVialMg)
        : suggestVialMg<=30
          ? [0.5,1,1.5,2].filter(d=>d<=suggestVialMg)
          : [1,2,5].filter(d=>d<=suggestVialMg);

    const optCards = bacOptions.map((opt,i)=>{
      const isBest = i===bestIdx;
      const unitExamples = commonDoses.map(d=>{
        const u=Math.round(d/opt.conc*100);
        const dLabel = d<1 ? (d*1000)+"mcg" : d+"mg";
        return `<div style="display:flex;justify-content:space-between;padding:3px 0"><span style="font-size:11px;color:var(--t4)">${dLabel}</span><span style="font-size:11px;color:var(--t2);font-weight:600">${u} units</span></div>`;
      }).join("");
      return `<div style="background:var(--surface-2);border:1px solid ${isBest?"#7DF9C0":"var(--border-sub)"};border-radius:10px;padding:12px 14px;margin-bottom:8px;position:relative">
        ${isBest?`<div style="position:absolute;top:10px;right:10px;font-size:9px;font-weight:700;color:#7DF9C0;background:#7DF9C018;border:1px solid #7DF9C044;border-radius:10px;padding:2px 7px">SUGGESTED</div>`:""}
        <div style="font-size:12px;font-weight:700;color:var(--t1);margin-bottom:2px">${suggestVialMg}mg + ${opt.ml}mL BAC = ${opt.conc%1===0?opt.conc:opt.conc.toFixed(2)}mg/mL</div>
        <div style="font-size:11px;color:var(--t3);margin-bottom:8px">${optLabels[i]} — ${optDescs[i]}</div>
        ${unitExamples?`<div style="border-top:1px solid var(--border-sub);padding-top:8px">${unitExamples}</div>`:""}
      </div>`;
    }).join("");

    return section("💉 BAC WATER GUIDE","#8AB4FF",`
      <div style="font-size:12px;color:var(--t3);line-height:1.5;margin-bottom:12px">
        Common reconstitution options for a <b style="color:var(--t2)">${suggestVialMg}mg vial</b>.${doseAmt?` Based on your current dose of ${doseAmt}${c.unit}.`:" Choose based on your intended dose size."}
      </div>
      ${optCards}
      <div style="font-size:10px;color:var(--t5);line-height:1.5;margin-top:4px">Units based on U-100 insulin syringe (100 units = 1mL). Educational math only — not a dosing recommendation.</div>
    `);
  })()}

  ${(()=>{
    // dqWarnings computed here — in compoundDoseCard scope where activeKit/conc/c are available
    const dqW=[];
    if(!activeKit?.bacMl||parseFloat(activeKit.bacMl||0)<=0) dqW.push("BAC water amount not set — concentration and unit math may be inaccurate");
    if(!activeKit?.reconDate&&activeKit) dqW.push("No reconstitution date — expiry tracking unavailable");
    if(!c?.unit) dqW.push("Dose unit not configured for this compound");
    return dqW.length?dqW.map(w=>`<div style="background:#F9C87D11;border-left:3px solid #F9C87D;padding:6px 10px;margin-bottom:8px;font-size:10px;color:#F9C87D;border-radius:0 6px 6px 0">⚠ ${esc(w)}</div>`).join(""):"";
  })()}
  ${(remMg!=null || weeksRem!=null)?section("📦 SUPPLY FORECAST","#C8FF9C",`
    ${row("Total kit size", totalKitMg+"mg across "+activeKit.totalVials+" vial"+(activeKit.totalVials>1?"s":""), "var(--t2)")}
    ${row("Used so far", usedMg.toFixed(1)+"mg", "var(--t4)")}
    ${row(activeKit.reconDate?"Remaining in active kit":"Unopened supply", remMg.toFixed(1)+"mg", "#7DF9C0")}
    ${weeksRem!=null?row("Est. weeks remaining", weeksRem.toFixed(1)+" weeks", "#7DF9C0"):""}
    ${depletionDate?row("Est. depletion", fmtDate(depletionDate), "var(--t2)"):""}
    ${(()=>{
      // Exclude the active kit by identity — prevents double-counting
      const storedKits=kits.filter(k=>k!==activeKit);
      const storedMg=storedKits.reduce((a,k)=>a+parseFloat(k.totalVials||1)*parseFloat(k.vialMg||0),0);
      const totalAll=(totalKitMg||0)+storedMg;
      if(storedKits.length===0) return "";
      const totalWeeks=mgPerWeek>0?Math.round(totalAll/mgPerWeek):null;
      const storedLabel=storedKits.length===1&&storedKits[0].storageLocation==="freezer"?"Frozen kit (1)":"Stored kits ("+storedKits.length+")";
      return `<div style="border-top:1px solid var(--border-sub);margin-top:8px;padding-top:8px">
        ${row(storedLabel, storedMg+"mg across "+storedKits.reduce((a,k)=>a+(k.totalVials||1),0)+" vials","#8AB4FF")}
        ${row("Total "+name+" supply", totalAll+"mg total", "#7DF9C0")}
        ${totalWeeks?row("Est. total duration", "~"+totalWeeks+" weeks at current pace","var(--t2)"):""}
      </div>`;
    })()}
  `):""}

  ${lib?.timingInfo?section("⏱ TIMING","#F9C87D",`<div style="font-size:13px;color:var(--t2);line-height:1.65">${esc(lib.timingInfo)}</div>`):""}
  ${lib?.cycleInfo?section("🔁 CYCLE","#A78BFA",`<div style="font-size:13px;color:var(--t2);line-height:1.65">${esc(lib.cycleInfo)}</div>`):""}

  ${lib?.timeline?.length?section("WEEK-BY-WEEK","var(--t4)",lib.timeline.map(([wk,txt])=>`<div style="display:flex;gap:12px;padding:8px 0;border-bottom:1px solid var(--surface-2)"><div style="width:2px;align-self:stretch;background:${c.color}55;border-radius:2px;flex-shrink:0"></div><div><div style="font-size:11px;font-weight:600;color:${c.color};margin-bottom:2px">${esc(wk)}</div><div style="font-size:12px;color:var(--t3);line-height:1.5">${esc(txt)}</div></div></div>`).join("")):""}

  ${trackItems.length?section("📊 WHAT TO TRACK","var(--t4)",`
    <div style="font-size:12px;color:var(--t3);margin-bottom:10px">Key signals to log for meaningful trend data:</div>
    <div style="display:flex;flex-wrap:wrap;gap:6px">${trackItems.map(s=>`<span class="pill" style="background:${c.color}18;color:${c.color};border:1px solid ${c.color}33">${esc(s)}</span>`).join("")}</div>
    <div style="font-size:10px;color:var(--t5);margin-top:10px">Log these in your daily check-in and dose logs to unlock phase correlations, timing analysis, and trend insights.</div>
  `):""}

  ${lib?.stacks?.length?section("🔗 COMMON STACKS","var(--t4)",`
    <div style="font-size:12px;color:var(--t3);margin-bottom:10px;line-height:1.5">What this compound is commonly combined with — educational only. Not a protocol recommendation.</div>
    ${lib.stacks.map(s=>`<div style="padding:8px 0;border-bottom:1px solid var(--surface-2);font-size:12px;color:var(--t2)">${esc(s)}</div>`).join("")}
    <div style="font-size:10px;color:var(--t5);margin-top:8px">Discuss combinations with your clinician before stacking.</div>
  `):""}

  ${lib?.safety?section("⚠️ SAFETY NOTES","#ff7c7c",`
    <div style="font-size:12px;color:var(--t3);line-height:1.65">${esc(lib.safety)}</div>
    <div style="font-size:10px;color:var(--t5);margin-top:10px">Educational context only — not medical advice. Discuss your protocol with your prescriber.</div>
  `):""}

  ${lib?.titration?(()=>{
    const tit=lib.titration;
    // Current user context: find dose number, weeks on protocol, current dose amount
    const userWeeks = doses.length && p ? Math.round((Date.now()-new Date([...p.doses].sort((a,b)=>new Date(a.date)-new Date(b.date))[0].date).getTime())/(7*86400000)) : null;
    const userDose = doseAmt;
    // Guess current stage by dose amount vs stage dose ranges
    let userStage = null;
    if(userDose && tit.stages) {
      tit.stages.forEach(st=>{
        const nums=[...(st.dose.match(/[\d.]+/g)||[])].map(Number);
        if(nums.length&&userDose>=nums[0]-0.01) userStage=st.label;
      });
    }
    return section("📈 TYPICAL TITRATION","#A78BFA",`
      <div style="font-size:12px;color:var(--t3);line-height:1.5;margin-bottom:12px">${esc(tit.why)}</div>

      ${tit.stages.map((st,i)=>`<div style="display:flex;gap:10px;padding:8px 0;border-bottom:1px solid var(--surface-2)">
        <div style="width:2px;align-self:stretch;background:#A78BFA55;border-radius:2px;flex-shrink:0"></div>
        <div style="flex:1;min-width:0">
          <div style="display:flex;align-items:center;gap:6px;flex-wrap:wrap;margin-bottom:2px">
            <span style="font-size:12px;font-weight:600;color:#A78BFA">${esc(st.label)}</span>
            <span style="font-size:11px;color:var(--t4)">${esc(st.dose)} · ${esc(st.duration)}</span>
            ${userStage===st.label?`<span style="font-size:9px;font-weight:700;color:#7DF9C0;background:#7DF9C018;border:1px solid #7DF9C044;border-radius:8px;padding:1px 6px">YOU ARE HERE</span>`:""}
          </div>
          <div style="font-size:11px;color:var(--t3);line-height:1.4">${esc(st.note)}</div>
        </div>
      </div>`).join("")}

      ${userWeeks!=null?`<div style="background:#A78BFA10;border:1px solid #A78BFA33;border-radius:8px;padding:10px 12px;margin-top:10px;font-size:11px;color:var(--t2)">
        You are <b>Week ${userWeeks}</b> on protocol${userDose?` at <b>${userDose}${c.unit}</b>`:""}${userStage?` — <b>${esc(userStage)}</b> phase`:""}. ${doses.length>=1&&doses[0].escalation?"Your last log was marked as an escalation dose.":""}
      </div>`:""}

      ${tit.holdReasons?.length?`<div style="margin-top:10px"><div class="mono" style="font-size:9px;color:var(--t4);letter-spacing:1.5px;margin-bottom:6px">COMMON REASONS TO HOLD</div>${tit.holdReasons.map(r=>`<div style="font-size:11px;color:var(--t3);padding:3px 0">• ${esc(r)}</div>`).join("")}</div>`:""}
      ${tit.increaseReasons?.length?`<div style="margin-top:10px"><div class="mono" style="font-size:9px;color:var(--t4);letter-spacing:1.5px;margin-bottom:6px">COMMON REASONS TO INCREASE</div>${tit.increaseReasons.map(r=>`<div style="font-size:11px;color:var(--t3);padding:3px 0">• ${esc(r)}</div>`).join("")}</div>`:""}
      ${tit.monitor?.length?`<div style="margin-top:10px"><div class="mono" style="font-size:9px;color:var(--t4);letter-spacing:1.5px;margin-bottom:6px">WHAT TO MONITOR</div><div style="display:flex;flex-wrap:wrap;gap:5px">${tit.monitor.map(m=>`<span class="pill" style="background:#A78BFA18;color:#A78BFA;border:1px solid #A78BFA33">${esc(m)}</span>`).join("")}</div></div>`:""}

      <div style="font-size:10px;color:var(--t5);margin-top:12px;line-height:1.4">Common patterns from studies and educational sources — not a dosing protocol. Titration decisions belong with your clinician.</div>
    `);
  })():""}

  <button id="intel-dosing-guide" style="width:100%;margin-top:4px;padding:10px;border-radius:10px;background:var(--surface-2);border:1px solid var(--border-sub);color:var(--t3);font-size:12px">📐 Learn mg / mcg / mL / units — Dosing Math Guide</button>
  `;
}

function discoverDetail(name) {
  const item = LIBRARY.find(l=>l.name===name);
  if (!item) return `<div style="color:var(--t4);padding:40px;text-align:center">Compound not found.</div>`;
  const evBg=item.evidence==="established"?"#7DF9C022":item.evidence==="emerging"?"#F9C87D22":"#ff8c0018";
  const evCol=item.evidence==="established"?"#7DF9C0":item.evidence==="emerging"?"#F9C87D":"#ff8c00";
  const inStack=isInStack(item.name);
  const hasData=(allPeptidesIncArchived()[item.name]?.doses||[]).length>0;
  return `<div style="display:flex;align-items:center;gap:12px;margin-bottom:16px"><button id="backdisc" style="background:var(--surface-2);border:1px solid var(--border);color:var(--t3);border-radius:8px;width:32px;height:32px;font-size:18px">‹</button><div style="flex:1"><h1 class="serif" style="font-size:20px;margin:0;color:${item.color}">${esc(item.name)}</h1><div style="font-size:12px;color:var(--t4)">${esc(item.sub)}</div></div></div>
  <div style="display:flex;gap:6px;flex-wrap:wrap;margin-bottom:18px"><span class="pill" style="background:${evBg};color:${evCol};border:1px solid ${evCol}44">${item.evidence}</span>${(item.tags||[]).map(t=>`<span class="pill" style="background:rgba(255,255,255,.05);color:var(--t4);border:1px solid var(--border)">${esc(t)}</span>`).join("")}</div>
  <div class="card" style="border-color:${item.color}22;margin-bottom:14px"><div class="mono" style="font-size:10px;color:var(--t4);letter-spacing:2px;margin-bottom:10px">OVERVIEW</div><div style="font-size:13px;color:var(--t3);line-height:1.65">${esc(item.overview||"")}</div></div>
  <div class="card" style="border-color:${item.color}22;margin-bottom:14px"><div class="mono" style="font-size:10px;color:var(--t4);letter-spacing:2px;margin-bottom:10px">MECHANISM</div><div style="font-size:13px;color:var(--t3);line-height:1.65">${esc(item.mechanism||"")}</div></div>
  ${item.meta?`<div class="card" style="border-color:${item.color}22;margin-bottom:14px"><div class="mono" style="font-size:10px;color:var(--t4);letter-spacing:2px;margin-bottom:12px">AT A GLANCE</div><div style="display:grid;grid-template-columns:1fr 1fr;gap:10px">${Object.entries(item.meta).map(([k,v])=>`<div><div class="mono" style="font-size:8.5px;color:var(--t4);letter-spacing:1.5px;margin-bottom:3px">${k.toUpperCase()}</div><div style="font-size:12px;color:var(--t2)">${esc(v)}</div></div>`).join("")}</div></div>`:""}
  ${item.cycleInfo?`<div class="card" style="border-color:#A78BFA33;margin-bottom:14px"><div style="display:flex;align-items:center;gap:8px;margin-bottom:10px"><span style="font-size:16px">🔁</span><div class="mono" style="font-size:10px;color:#A78BFA;letter-spacing:2px">CYCLE LENGTH</div></div><div style="font-size:13px;color:var(--t2);line-height:1.65">${esc(item.cycleInfo)}</div></div>`:""}
  ${item.timingInfo?`<div class="card" style="border-color:#F9C87D33;margin-bottom:14px"><div style="display:flex;align-items:center;gap:8px;margin-bottom:10px"><span style="font-size:16px">⏱</span><div class="mono" style="font-size:10px;color:#F9C87D;letter-spacing:2px">BEST TIME TO TAKE</div></div><div style="font-size:13px;color:var(--t2);line-height:1.65">${esc(item.timingInfo)}</div></div>`:""}
  ${item.timeline&&item.timeline.length?`<div class="card" style="border-color:${item.color}22;margin-bottom:14px"><div class="mono" style="font-size:10px;color:var(--t4);letter-spacing:2px;margin-bottom:12px">WEEK-BY-WEEK</div>${item.timeline.map(([wk,txt])=>`<div style="display:flex;gap:12px;padding:8px 0;border-bottom:1px solid var(--surface-2)"><div style="width:2px;align-self:stretch;background:${item.color}55;border-radius:2px;flex-shrink:0"></div><div><div style="font-size:12px;font-weight:600;color:${item.color};margin-bottom:2px">${esc(wk)}</div><div style="font-size:12px;color:var(--t3);line-height:1.5">${esc(txt)}</div></div></div>`).join("")}</div>`:""}
  ${item.stacks&&item.stacks.length?`<div class="card" style="border-color:${item.color}22;margin-bottom:14px"><div class="mono" style="font-size:10px;color:var(--t4);letter-spacing:2px;margin-bottom:10px">COMMON STACKS</div>${item.stacks.map(s=>`<div style="font-size:12px;color:var(--t3);padding:5px 0;border-bottom:1px solid var(--surface-2)">${esc(s)}</div>`).join("")}</div>`:""}
  ${item.safety?`<div class="card" style="border-color:#ff4d4d22;margin-bottom:14px"><div class="mono" style="font-size:10px;color:var(--t4);letter-spacing:2px;margin-bottom:10px">SAFETY NOTES</div><div style="font-size:12px;color:var(--t3);line-height:1.6">${esc(item.safety)}</div></div>`:""}

           <button class="disc-remove" data-name="${esc(item.name)}" style="width:100%;padding:11px;border-radius:12px;background:#ff4d4d0a;border:1px solid #ff4d4d33;color:#ff7c7c;font-size:12px">Remove from stack${hasData?" (keeps dose history)":""}</button>
         </div>`
    }

}

function accumulationSection(name, data, c) {
  if (!c.halfLifeDays) return "";
  const doses = [...(data.doses||[])].sort((a,b)=>new Date(b.date)-new Date(a.date));
  const lastDose = doses[0];
  const _pkUnit = data.unit||cfg(name)?.unit||"mg";
  const validDoses = doses.map(d=>doseToMg(d.dose,_pkUnit)).filter(v=>v>0);
  const doseAmt = lastDose && doseToMg(lastDose.dose,_pkUnit) > 0 ? doseToMg(lastDose.dose,_pkUnit) : (validDoses.length ? validDoses[0] : null);
  const interval = data.scheduleDays || 7;
  const ke = Math.LN2 / c.halfLifeDays;
  const decayPerInterval = Math.exp(-ke * interval);
  const ssPeak = 1 / (1 - decayPerInterval);
  const ssTrough = ssPeak * decayPerInterval;
  const weeksTo95 = Math.ceil(Math.log(0.05) / Math.log(decayPerInterval));
  const fmt = v => doseAmt ? (v * doseAmt).toFixed(2) + " " + c.unit : (v * 100).toFixed(0) + "%";

  // Current level from real dose history
  const now = Date.now();
  const allDosesSorted=[...doses].sort((a,b)=>new Date(a.date)-new Date(b.date));
  let currentLevel = 0;
  doses.forEach(d => {
    const t = (now - new Date(d.date).getTime()) / 86400000;
    const _dMg=doseToMg(d.dose,data.unit||cfg(name)?.unit||"mg"); if (t >= 0) currentLevel += Math.exp(-ke * t) * (_dMg||1);
  });
  const ssPeakAbs = ssPeak * (doseAmt||1);
  const pctOfPeak = Math.round(Math.min(150, currentLevel / ssPeakAbs * 100));
  const daysSince = lastDose ? (now - new Date(lastDose.date).getTime()) / 86400000 : null;

  // Range thresholds (relative to ssPeak)
  const EFFECTIVE_LOW = 0.55, EFFECTIVE_HIGH = 0.9;
  const rangeStatus = currentLevel/ssPeakAbs < EFFECTIVE_LOW ? "below" : currentLevel/ssPeakAbs > EFFECTIVE_HIGH ? "peak" : "effective";
  const rangeColor = rangeStatus==="below" ? "#8AB4FF" : rangeStatus==="peak" ? c.color : "#7DF9C0";
  const rangeLabel = rangeStatus==="below" ? "Building Up" : rangeStatus==="peak" ? "Near Peak" : "Effective Range";

  // Timeframe selector
  const TF_DAYS={"2w":14,"1m":30,"3m":90,"all":null};
  const tf = state._medLevelTF || "1m";
  const firstDoseT = allDosesSorted.length ? new Date(allDosesSorted[0].date).getTime() : now;
  const windowDays = TF_DAYS[tf] || Math.max(14, Math.ceil((now-firstDoseT)/86400000)+7);

  const GW=480, GH=180, PL=32, PR=8, PT=12, PB=20;
  const projDays = Math.min(interval, 7);
  const gEnd = now + 86400000*projDays;
  const gStart = tf==="all" ? firstDoseT-86400000 : Math.max(firstDoseT-86400000*1.5, gEnd - 86400000*windowDays);
  const gSpan = gEnd-gStart;
  const gpx = t => PL + (t-gStart)/gSpan*(GW-PL-PR);
  const levelAt = t => { let lv=0; allDosesSorted.forEach(d=>{const dt=(t-new Date(d.date).getTime())/86400000; if(dt>=0) lv+=Math.exp(-ke*dt)*(doseToMg(d.dose,data.unit||cfg(name)?.unit||"mg")||0);}); return lv; };
  const STEPS=100;
  const sampled=[...Array(STEPS+1)].map((_,i)=>levelAt(gStart+(i/STEPS)*gSpan));
  const maxLevel=Math.max(...sampled, currentLevel, 0.1)*1.15;
  const gpy = v => PT + (1-v/maxLevel)*(GH-PT-PB);
  const allPts = sampled.map((v,i)=>[gpx(gStart+(i/STEPS)*gSpan), gpy(v), gStart+(i/STEPS)*gSpan]);
  const histPts = allPts.filter(p=>p[2]<=now);
  const projPts = allPts.filter(p=>p[2]>=now);
  const pathD = pts => pts.map(([x,y],i)=>`${i?"L":"M"} ${x.toFixed(1)} ${y.toFixed(1)}`).join(" ");
  const histPathD = pathD(histPts);
  const projPathD = pathD(histPts.length?[histPts[histPts.length-1],...projPts]:projPts);
  const baseY = GH-PB;
  const yTicks=[0,0.5,1].map(f=>{ const v=maxLevel*f; return {y:gpy(v), label: v.toFixed(1)+" "+c.unit}; });
  const xTickCount = tf==="2w"?3:4;
  const xTicks=[...Array(xTickCount)].map((_,i)=>{ const t=gStart+(i/(xTickCount-1))*(now-gStart); return {x:gpx(t), label:new Date(t).toLocaleDateString("en-CA",{month:"short",day:"numeric"})}; });
  const nowX=gpx(now);
  const gridLines = yTicks.map(t=>`<line x1="${PL}" y1="${t.y.toFixed(1)}" x2="${GW-PR}" y2="${t.y.toFixed(1)}" stroke="#fff" stroke-width="0.5" opacity="0.07"/><text x="${PL-5}" y="${(t.y+3).toFixed(1)}" fill="#666" font-size="8" font-family="monospace" text-anchor="end">${t.label}</text>`).join("");
  const xLabels = xTicks.map(t=>`<text x="${t.x.toFixed(1)}" y="${GH-5}" fill="#666" font-size="8" font-family="monospace" text-anchor="middle">${t.label}</text>`).join("");
  const graph=`<svg viewBox="0 0 ${GW} ${GH}" style="width:100%;height:auto;display:block">
    ${gridLines}
    <path d="${histPathD} L ${(histPts[histPts.length-1]?.[0]||0).toFixed(1)} ${baseY} L ${(histPts[0]?.[0]||0).toFixed(1)} ${baseY} Z" fill="url(#acc-grad)"/>
    <defs><linearGradient id="acc-grad" x1="0" y1="0" x2="0" y2="1"><stop offset="0%" stop-color="${c.color}" stop-opacity="0.3"/><stop offset="100%" stop-color="${c.color}" stop-opacity="0"/></linearGradient></defs>
    <path d="${histPathD}" fill="none" stroke="${c.color}" stroke-width="2.5" stroke-linejoin="round" stroke-linecap="round"/>
    <path d="${projPathD}" fill="none" stroke="${c.color}" stroke-width="2" stroke-dasharray="4,4" stroke-linejoin="round" opacity="0.65"/>
    <line x1="${nowX.toFixed(1)}" y1="${PT}" x2="${nowX.toFixed(1)}" y2="${baseY}" stroke="#fff" stroke-width="0.5" stroke-dasharray="2,3" opacity="0.2"/>
    <circle cx="${nowX.toFixed(1)}" cy="${gpy(currentLevel).toFixed(1)}" r="5" fill="${c.color}"/>
    <circle cx="${nowX.toFixed(1)}" cy="${gpy(currentLevel).toFixed(1)}" r="2" fill="#fff"/>
    ${xLabels}
  </svg>`;
  const tfBtn = (k,label) => `<button class="medlvl-tf" data-tf="${k}" style="flex:1;padding:6px 0;border-radius:8px;font-size:11px;font-weight:600;background:${tf===k?"var(--surface-3)":"transparent"};color:${tf===k?"var(--t1)":"var(--t4)"};border:none">${label}</button>`;

  const ph = c.phases ? currentPhase(c.phases, daysSince||0) : null;
  const phaseStr = ph ? `${ph.label} · Day ${Math.floor(daysSince)+1}` : "";

  return `
  <div style="display:flex;align-items:center;gap:6px;margin-bottom:12px">
    <div class="mono" style="font-size:10px;color:var(--t4);letter-spacing:2px">MEDICATION LEVELS</div>
    <button class="pkinfo" style="background:#8AB4FF18;border:1px solid #8AB4FF44;color:#8AB4FF;border-radius:5px;padding:2px 6px;font-size:9px">ℹ</button>
  </div>

  <div style="text-align:center;margin-bottom:4px">
    <div class="mono" style="font-size:9px;color:var(--t4);letter-spacing:1.5px;margin-bottom:3px">CURRENT LEVEL</div>
    <div style="font-size:24px;font-weight:700;color:var(--t1)">${currentLevel.toFixed(2)} ${c.unit}</div>
    <div style="font-size:11px;color:var(--t4);margin-top:2px">${pctOfPeak}% of recent peak${phaseStr?" · "+phaseStr:""}</div>
  </div>

  <div style="display:flex;gap:4px;background:var(--surface-3);border-radius:10px;padding:3px;margin:12px 0 14px">
    ${tfBtn("2w","2w")}${tfBtn("1m","1m")}${tfBtn("3m","3m")}${tfBtn("all","All")}
  </div>

  <div style="background:var(--surface-2);border:1px solid var(--border-sub);border-radius:16px;padding:14px 10px 8px;margin-bottom:8px">
    ${graph}
  </div>
  <div style="font-size:10px;color:var(--t5);text-align:center;margin-bottom:14px">Includes contribution from previous doses, decayed by half-life.</div>


  <div style="display:grid;grid-template-columns:1fr 1fr;gap:8px">
    <div style="background:${c.color}11;border:1px solid ${c.color}33;border-radius:10px;padding:10px 12px">
      <div style="display:flex;align-items:center;gap:5px;margin-bottom:4px">
        <span class="mono" style="font-size:9px;color:var(--t3);letter-spacing:1px">EXPECTED PEAK</span>
        <button class="metricinfo" data-title="Expected Peak" data-text="Highest estimated medication level after full accumulation at your current dose and schedule." style="width:14px;height:14px;border-radius:50%;background:var(--surface-3);color:var(--t3);font-size:9px;border:1px solid var(--border);display:inline-flex;align-items:center;justify-content:center;padding:0;flex-shrink:0">i</button>
      </div>
      <div style="font-size:17px;font-weight:700;color:${c.color}">${doseAmt?(ssPeak*doseAmt).toFixed(2)+" "+c.unit:ssPeak.toFixed(2)+"×"}</div>
      <div style="font-size:10px;color:var(--t3);margin-top:2px">After full accumulation</div>
    </div>
    <div style="background:var(--surface-2);border:1px solid var(--border-sub);border-radius:10px;padding:10px 12px">
      <div style="display:flex;align-items:center;gap:5px;margin-bottom:4px">
        <span class="mono" style="font-size:9px;color:var(--t3);letter-spacing:1px">EXPECTED TROUGH</span>
        <button class="metricinfo" data-title="Expected Trough" data-text="Lowest estimated medication level before your next scheduled dose after full accumulation." style="width:14px;height:14px;border-radius:50%;background:var(--surface-3);color:var(--t3);font-size:9px;border:1px solid var(--border);display:inline-flex;align-items:center;justify-content:center;padding:0;flex-shrink:0">i</button>
      </div>
      <div style="font-size:17px;font-weight:700;color:${c.color}cc">${doseAmt?(ssTrough*doseAmt).toFixed(2)+" "+c.unit:ssTrough.toFixed(2)+"×"}</div>
      <div style="font-size:10px;color:var(--t3);margin-top:2px">Before next dose</div>
    </div>
  </div>
  <div style="font-size:9px;color:var(--t5);line-height:1.4;margin-top:8px">Single-compartment PK estimate · t½ = ${c.halfLifeDays}d · Individual levels vary. Not a clinical reading.</div>`;
}

function healthLogSection() {
  // Only daily aggregate logs — exclude workout sessions (isWorkout flag)
  const allLogs = [...state.activityLogs]
    .filter(a=>!a.isWorkout&&(a.restingHR||a.hrv||a.avgHeartRate||a.walkingHR||a.basalCalories||a.exerciseMinutes||a.standHours||a.standMinutes||a.distanceKm||a.activeCalories))
    .sort((a,b)=>dayKey(b.date).localeCompare(dayKey(a.date)));

  if (!allLogs.length) return `<div style="color:var(--t4);font-size:12px;line-height:1.6;text-align:center;padding:20px 0">
    No health metrics imported yet.<br>
    <span style="font-size:11px">Profile → 🍎 Health Import → CSV → select your aggregate daily file.</span>
  </div>`;

  const period = state._healthPeriod||"3M";
  const cutoffDays = {all:null,"1M":30,"3M":90,"6M":180}[period];
  const cutoff = cutoffDays ? addDays(localDate(),-cutoffDays) : null;
  const logs = cutoff ? allLogs.filter(a=>dayKey(a.date)>=cutoff) : allLogs;

  // ── Stat helpers ───────────────────────────────────────────────────────────
  const vals = (k) => logs.filter(a=>a[k]!=null).map(a=>a[k]);
  const avg  = arr => arr.length ? Math.round(arr.reduce((a,b)=>a+b,0)/arr.length*10)/10 : null;
  const trend= arr => {
    if(arr.length<4) return "";
    const half=Math.floor(arr.length/2);
    const a1=avg(arr.slice(0,half)), a2=avg(arr.slice(half));
    const diff=a2-a1;
    if(Math.abs(diff)<1) return `<span style="color:var(--t4);font-size:10px"> →</span>`;
    return diff>0
      ? `<span style="color:#7DF9C0;font-size:10px"> ↑ +${Math.abs(diff).toFixed(1)}</span>`
      : `<span style="color:#FF7C7C;font-size:10px"> ↓ −${Math.abs(diff).toFixed(1)}</span>`;
  };

  // ── Sparkline ──────────────────────────────────────────────────────────────
  const sparkline = (arr, color, W=100, H=28) => {
    const chrono = [...arr].reverse(); // logs are desc; reverse for chronological chart
    if (chrono.length < 2) return `<div style="width:${W}px;height:${H}px"></div>`;
    const min=Math.min(...chrono), max=Math.max(...chrono), range=max-min||1;
    const pts = chrono.map((v,i)=>`${(i/(chrono.length-1)*W).toFixed(1)},${(H-1-(v-min)/range*(H-2)).toFixed(1)}`).join(" ");
    return `<svg viewBox="0 0 ${W} ${H}" style="width:${W}px;height:${H}px;flex-shrink:0"><polyline points="${pts}" fill="none" stroke="${color}" stroke-width="1.5" stroke-linejoin="round" opacity="0.9"/></svg>`;
  };

  // ── Metric summary cards ───────────────────────────────────────────────────
  const rhrArr=vals("restingHR"), hrvArr=vals("hrv"), avgHRArr=vals("avgHeartRate");
  const walkArr=vals("walkingHR"), activeArr=vals("activeCalories"), basalArr=vals("basalCalories");
  const exArr=vals("exerciseMinutes"), standArr=vals("standHours").concat(vals("standMinutes").map(v=>+(v/60).toFixed(1)));
  const distArr=vals("distanceKm");

  const statCard = (label, value, unit, arr, color) => !arr.length ? "" : `
    <div style="background:${color}11;border:1px solid ${color}33;border-radius:10px;padding:10px 12px;min-width:0">
      <div style="font-size:9px;color:var(--t4);letter-spacing:1.5px;margin-bottom:4px">${label}</div>
      <div style="font-size:18px;font-weight:700;color:${color}">${value!=null?value:"—"}<span style="font-size:11px;font-weight:400;color:var(--t3);margin-left:3px">${unit}</span>${trend(arr)}</div>
      <div style="margin-top:6px">${sparkline(arr,color)}</div>
      <div style="font-size:9px;color:var(--t5);margin-top:4px">${arr.length} days · avg ${avg(arr)!=null?avg(arr)+""+unit:"—"}</div>
    </div>`;

  const simpleCard = (label, value, unit, arr, color) => !arr.length ? "" : `
    <div style="background:var(--surface-2);border:1px solid var(--border-sub);border-radius:10px;padding:10px 12px;min-width:0">
      <div style="font-size:9px;color:var(--t4);letter-spacing:1.5px;margin-bottom:4px">${label}</div>
      <div style="font-size:16px;font-weight:700;color:${color}">${value!=null?value:"—"}<span style="font-size:11px;font-weight:400;color:var(--t3);margin-left:3px">${unit}</span></div>
      <div style="font-size:9px;color:var(--t5);margin-top:4px">${arr.length} days · avg ${avg(arr)!=null?+(avg(arr)).toFixed(1)+""+unit:"—"}</div>
    </div>`;

  // ── Day-by-day table ───────────────────────────────────────────────────────
  const hasCol = k => logs.some(a=>a[k]!=null&&a[k]!==undefined);
  const cols = [
    {h:"Date",   fn:a=>fmtShort(a.date),                                     always:true},
    {h:"RHR",    fn:a=>a.restingHR!=null?a.restingHR+" bpm":"—",             show:hasCol("restingHR")},
    {h:"HRV",    fn:a=>a.hrv!=null?a.hrv+" ms":"—",                          show:hasCol("hrv")},
    {h:"Avg HR", fn:a=>a.avgHeartRate!=null?a.avgHeartRate+" bpm":"—",       show:hasCol("avgHeartRate")},
    {h:"Walk HR",fn:a=>a.walkingHR!=null?a.walkingHR+" bpm":"—",             show:hasCol("walkingHR")},
    {h:"Active", fn:a=>a.activeCalories!=null?a.activeCalories+" cal":"—",   show:hasCol("activeCalories")},
    {h:"Basal",  fn:a=>a.basalCalories!=null?a.basalCalories+" cal":"—",     show:hasCol("basalCalories")},
    {h:"Exercise",fn:a=>a.exerciseMinutes!=null?a.exerciseMinutes+" min":"—",show:hasCol("exerciseMinutes")},
    {h:"Stand",  fn:a=>a.standHours!=null?a.standHours+" hr":(a.standMinutes!=null?a.standMinutes+" min":"—"), show:hasCol("standHours")||hasCol("standMinutes")},
    {h:"Steps",  fn:a=>a.steps!=null?a.steps.toLocaleString():"—",           show:hasCol("steps")},
    {h:"Dist",   fn:a=>a.distanceKm!=null?a.distanceKm.toFixed(1)+" km":"—",show:hasCol("distanceKm")},
  ].filter(c=>c.always||c.show);

  const thStyle = `text-align:left;padding:5px 8px;color:var(--t4);font-size:10px;letter-spacing:1px;border-bottom:1px solid var(--border-sub);white-space:nowrap;position:sticky;top:0;background:var(--surface-2)`;
  const tdStyle = (highlight) => `padding:5px 8px;font-size:11px;color:${highlight||"var(--t2)"};border-bottom:1px solid var(--surface);white-space:nowrap`;
  const rowColor = (a) => {
    // Highlight rows where RHR seems elevated or HRV seems low vs period avg
    const rhr=a.restingHR, hrv=a.hrv;
    const rhrAvg=avg(rhrArr), hrvAvg=avg(hrvArr);
    if(rhr&&rhrAvg&&rhr>rhrAvg+8) return "#FF7C7C18";
    if(hrv&&hrvAvg&&hrv<hrvAvg*0.7) return "#FF7C7C18";
    if(hrv&&hrvAvg&&hrv>hrvAvg*1.3) return "#7DF9C018";
    return "";
  };

  // Workout summary
  const workouts = [...state.activityLogs]
    .filter(a=>a.isWorkout)
    .sort((a,b)=>dayKey(b.date).localeCompare(dayKey(a.date)))
    .slice(0,20);
  const workoutSummary = workouts.length ? `
    <div style="margin-top:14px;border-top:1px solid var(--border-sub);padding-top:14px">
      <div class="mono" style="font-size:10px;color:#A78BFA;letter-spacing:1.5px;margin-bottom:10px">WORKOUT SESSIONS (${workouts.length} recent)</div>
      <div style="overflow-x:auto;border-radius:8px;border:1px solid var(--border-sub)">
        <table style="width:100%;border-collapse:collapse;font-size:11px">
          <thead><tr>${["Date","Activity","Duration","Cal","Avg HR","Max HR","Distance"].map(h=>`<th style="text-align:left;padding:5px 8px;color:var(--t4);font-size:10px;letter-spacing:1px;border-bottom:1px solid var(--border-sub);white-space:nowrap;background:var(--surface-2)">${h}</th>`).join("")}</tr></thead>
          <tbody>${workouts.map(w=>`<tr>
            <td style="padding:5px 8px;color:var(--t3);border-bottom:1px solid var(--surface);white-space:nowrap">${fmtShort(w.date)}</td>
            <td style="padding:5px 8px;color:var(--t2);border-bottom:1px solid var(--surface);white-space:nowrap">${esc(w.workoutType||"Workout")}</td>

    ${rhrArr.length>=3||hrvArr.length>=3?`<div style="font-size:11px;color:var(--t4);line-height:1.6;margin-bottom:12px">
      ${rhrArr.length>=3?`RHR avg ${Math.round(avg(rhrArr))} bpm over ${logs.length} days. `:""}
      ${hrvArr.length>=3?`HRV avg ${+(avg(hrvArr)).toFixed(1)} ms. `:""}
      ${rhrArr.length>=4&&avg(rhrArr.slice(0,Math.floor(rhrArr.length/2)))>avg(rhrArr.slice(Math.floor(rhrArr.length/2)))+4?"<span style='color:#7DF9C0'>RHR trending down — recovery improving.</span>":""}
      ${rhrArr.length>=4&&avg(rhrArr.slice(0,Math.floor(rhrArr.length/2)))<avg(rhrArr.slice(Math.floor(rhrArr.length/2)))-4?"<span style='color:#F9C87D'>RHR trending up — watch for fatigue or illness.</span>":""}
    </div>`:""}
    <div style="overflow-x:auto;border-radius:8px;border:1px solid var(--border-sub)">
      <table style="width:100%;border-collapse:collapse;font-size:11px">

function trendsView() {
  if(state._compoundIntel) return compoundIntelView(state._compoundIntel);
  const unit=state.settings.weightUnit, munit=state.settings.measureUnit, aps=allPeptides();
  const open = state._trendsOpen||{};
  const period = state._weightPeriod||"all";
  const accordionHdr=(key,label,color,badge,showIntel=false)=>`<div class="app-acc" style="border:1px solid ${open[key]?color+"44":"var(--border-sub)"};background:var(--surface)"><button class="tacc" data-key="${esc(key)}" style="display:flex;align-items:center;gap:10px;width:100%;padding:14px 16px;background:transparent"><div style="width:8px;height:8px;border-radius:50%;background:${color};opacity:${open[key]?1:0.4};flex-shrink:0"></div><span class="mono" style="font-size:13px;color:${open[key]?"var(--t1)":"var(--t3)"};letter-spacing:1px;flex:1">${esc(label)}</span>${badge?`<span class="pill" style="background:${color}18;color:${color};border:1px solid ${color}33;font-size:10px;flex-shrink:0">${badge}</span>`:""} ${showIntel?`<span class="compound-intel-btn" data-name="${esc(key)}" style="padding:4px 9px;border-radius:6px;background:${color}15;border:1px solid ${color}33;color:${color};font-size:10px;flex-shrink:0">Intel ›</span>`:""}<span style="color:${open[key]?color:"var(--t5)"};font-size:18px;flex-shrink:0">${open[key]?"∧":"∨"}</span></button>`;
  const accordionBody=(key,color,inner)=>`${open[key]?`<div class="app-acc-body" style="background:var(--surface-2);padding:18px">${inner}</div>`:""}</div>`;

  let html=`<h1 class="serif greet">Trends</h1><div class="hint" style="margin-bottom:18px">Tap any section to expand.</div>`;

  // Weight & measurements
  html+=accordionHdr("weight","Weight & Measurements","#8AB4FF",state.weightLogs.length?state.weightLogs.length+" entries":null);
  html+=accordionBody("weight","#8AB4FF",`
    <div class="seg" style="margin-bottom:14px" id="wperiod">
      ${["1M","3M","6M","all"].map(p=>`<button id="wp-${p}" class="${period===p?"on":""}">${p==="all"?"All":p}</button>`).join("")}
    </div>
    ${weightChart(state.weightLogs,unit,period)}
    ${state.weightLogs.length?`<div style="margin-top:10px;border-top:1px solid var(--border-sub);padding-top:10px">${[...state.weightLogs].sort((a,b)=>new Date(b.date)-new Date(a.date)).slice(0,6).map(w=>`<div style="display:flex;justify-content:space-between;padding:5px 0;font-size:12px;color:var(--t3)"><span>${fmtDate(w.date)}</span><span style="color:#8AB4FF">${esc(w.weight)} ${unit}</span><button class="delweight" data-id="${w.id}" style="color:var(--t5)">✕</button></div>`).join("")}</div>`:""}
    <div class="mono" style="font-size:10px;color:var(--t4);letter-spacing:2px;margin:18px 0 12px">BODY MEASUREMENTS</div>
    ${measureChart(state.measurementLogs,munit)}
    <div class="hint" style="margin-top:8px">On a triple-agonist while recomping, the scale lies — waist & glute are the honest signals.</div>
    ${state.measurementLogs.length?`<div style="margin-top:10px;border-top:1px solid var(--border-sub);padding-top:10px">${[...state.measurementLogs].sort((a,b)=>new Date(b.date)-new Date(a.date)).slice(0,5).map(m=>`<div style="display:flex;justify-content:space-between;align-items:center;padding:5px 0;font-size:12px;color:var(--t3)"><span>${fmtShort(m.date)}</span><span style="color:var(--t2)">${MEASURES.filter(([k])=>m[k]).map(([k,l])=>l[0]+" "+esc(m[k])).join("  ")}</span><button class="delmeasure" data-id="${m.id}" style="color:var(--t5)">✕</button></div>`).join("")}</div>`:""}
    ${recompSection(state.weightLogs, state.measurementLogs, unit, munit)}
    ${adherenceCalendar()}
  `);
  html+=`<div style="margin-bottom:10px"></div>`;

  // Health Log accordion
  const healthLogCount = state.activityLogs.filter(a=>a.restingHR||a.hrv||a.avgHeartRate||a.basalCalories||a.exerciseMinutes||a.standHours).length;
  html+=accordionHdr("healthlog","Health Log","#FF9CC8",healthLogCount?healthLogCount+" days":null);
  html+=accordionBody("healthlog","#FF9CC8",healthLogSection());
  html+=`<div style="margin-bottom:10px"></div>`;

  // Per-compound sections
  const startedPeps=Object.entries(aps).filter(([,d])=>(d.doses||[]).length>0);

    const c=cfg(name); const doses=data.doses||[];
    const sortedDoses=[...doses].sort((a,b)=>new Date(a.date)-new Date(b.date));
    const firstDoseDate=sortedDoses.length?sortedDoses[0].date:null;
    const pDays=firstDoseDate?Math.floor(daysSince(firstDoseDate)):null;
    const badge=doses.length?(doses.length+" doses"+(pDays!==null?" · "+pDays+"d on protocol":"")):null;
    html+=accordionHdr(name,name,c.color,badge,true);
    const subKey = k=>name+"_"+k;
    const subOpen = k=>{ const explicit=(state._trendsOpen||{})[subKey(k)]; if(explicit!==undefined)return explicit; return k==="pk"||k==="hist"||k==="trough"; };
    const subHdr = (k,label)=>`<div class="app-sub-acc" style="border:1px solid ${subOpen(k)?c.color+"33":"var(--border-sub)"};background:var(--surface-2)"><button class="tacc" data-key="${subKey(k)}" style="display:flex;align-items:center;justify-content:space-between;width:100%;padding:10px 14px;background:transparent"><span class="mono" style="font-size:10px;color:${subOpen(k)?c.color:"var(--t4)"};letter-spacing:2px">${label}</span><span style="color:${subOpen(k)?c.color:"var(--t5)"};font-size:16px">${subOpen(k)?"∧":"∨"}</span></button>`;
    const subBody = (k,content)=>`${subOpen(k)?`<div class="app-sub-body" style="background:var(--surface-2);padding:14px">${content}</div>`:""}</div>`;
    html+=accordionBody(name,c.color,`
      ${c.phases?subHdr("pk","PLASMA ACTIVITY")+subBody("pk",pkCurveFull(name,data)):""}
      ${c.halfLifeDays&&(c.halfLifeDays/data.scheduleDays)>0.3?subHdr("acc","ACCUMULATION")+subBody("acc",accumulationSection(name,data,c)):""}
      ${escalationCard(name,data)?subHdr("esc","ESCALATION READINESS")+subBody("esc",escalationCard(name,data)):""}
      ${subHdr("hist","DOSE HISTORY")+subBody("hist",escalationChart(doses,c)+`<div style="margin-top:10px;display:flex;gap:16px;flex-wrap:wrap">${[["TOTAL",doses.length],["ESCALATIONS",doses.filter(d=>d.escalation).length],["MAX",doses.length?Math.max(...doses.map(d=>parseFloat(d.dose)||0))+" "+c.unit:"—"]].map(([l,v])=>`<div><div class="mono" style="font-size:9px;color:var(--t4);letter-spacing:1.5px">${l}</div><div style="font-size:14px;color:var(--t2);font-weight:600">${v}</div></div>`).join("")}</div>`)}
      ${c.troughDay?subHdr("trough","TROUGH ANALYSIS")+subBody("trough",troughHTML(analyzeTrough(state.dailyLogs,doses,c.returnSymptoms),data.scheduleDays,c.color,c.troughDay)):""}
      ${subHdr("sites","INJECTION SITES")+subBody("sites",siteTrackerSection(name,doses))}
      ${subHdr("syms","SYMPTOM FREQUENCY")+subBody("syms",sideEffectsSection(name,doses))}
      ${subHdr("activity","ACTIVITY OVERLAY")+subBody("activity",activityChart(state.activityLogs,doses,c.color))}
      ${(state.supplementLogs||[]).length?subHdr("suppcorr","SUPPLEMENT CORRELATION")+subBody("suppcorr",supplementCorrelation(name,doses,state.supplementLogs||[],state.dailyLogs)):""}
    `);
    html+=`<div style="margin-bottom:10px"></div>`;
  });
  if(!startedPeps.length) html+=`<div style="color:var(--t4);font-size:13px;text-align:center;padding:30px 0">Log your first dose to start seeing compound trends.</div>`;
  return html;
}

function supplyEstimatorModal() {
  const aps = allPeptides();
  const allCompoundNames = [...new Set([...Object.keys(PEPTIDES), ...LIBRARY.map(l=>l.name), ...Object.keys(state.customPeptides)])].sort();
  const m = openModal(`
    <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:16px">
      <span class="mono" style="font-size:13px;color:#C9A0FF;letter-spacing:1.5px">🧮 SUPPLY ESTIMATOR</span>

    <label class="field-label">COMPOUND</label>
    <select id="ec" class="inp" style="margin-bottom:14px">
      ${allCompoundNames.map(n=>`<option value="${esc(n)}">${esc(n)}</option>`).join("")}
    </select>
    <div style="display:grid;grid-template-columns:1fr 1fr;gap:10px">
      <div><label class="field-label">DOSE PER INJECTION</label><input id="ed" type="number" step="0.1" class="inp" placeholder="e.g. 1.5" style="margin-bottom:14px"></div>
      <div><label class="field-label">INJECTIONS / WEEK</label><input id="ef" type="number" step="0.5" class="inp" placeholder="e.g. 1" value="1" style="margin-bottom:14px"></div>
      <div><label class="field-label">PROTOCOL LENGTH (weeks)</label><input id="ew" type="number" class="inp" placeholder="e.g. 12" style="margin-bottom:14px"></div>
      <div><label class="field-label">MG PER VIAL</label><input id="ev" type="number" class="inp" placeholder="e.g. 30" style="margin-bottom:14px"></div>
    </div>
    <label class="field-label">COST PER VIAL (optional)</label>
    <div style="display:flex;gap:10px;margin-bottom:18px">
      <input id="ecp" type="number" step="0.01" class="inp" placeholder="e.g. 20.00">
      <select id="ecur" class="inp" style="width:90px">${["CAD","USD","GBP","EUR","AUD"].map(c=>`<option>${c}</option>`).join("")}</select>
    </div>
    <div id="eresult" style="display:none;background:var(--surface-2);border-radius:12px;padding:16px;margin-bottom:16px"></div>
    <button id="ecalc" class="btn-primary" style="background:#C9A0FF">Calculate</button>
  `, "#C9A0FF");
  m.querySelector("#x").onclick = closeModal;

  const autoFill = () => {
    const name = m.querySelector("#ec").value;
    const c = cfg(name);
    if (c.unit === "mg") {
      // Try to pre-fill from last logged dose
      const doses = (aps[name]?.doses||[]);
      if (doses.length) {
        const last = [...doses].sort((a,b)=>new Date(b.date)-new Date(a.date))[0];
        if (last.dose) m.querySelector("#ed").value = last.dose;
      }
      // Pre-fill vial mg from stash
      const kit = state.supplies.find(s=>s.name===name);
      if (kit && kit.vialMg) m.querySelector("#ev").value = kit.vialMg;
      if (kit && kit.cost && kit.totalVials) m.querySelector("#ecp").value = (parseFloat(kit.cost)/kit.totalVials).toFixed(2);
    }
  };
  m.querySelector("#ec").onchange = autoFill;
  autoFill();

  m.querySelector("#ecalc").onclick = () => {
    const name    = m.querySelector("#ec").value;
    const dose    = parseFloat(m.querySelector("#ed").value);
    const freq    = parseFloat(m.querySelector("#ef").value)||1;
    const weeks   = parseFloat(m.querySelector("#ew").value);
    const vialMg  = parseFloat(m.querySelector("#ev").value);
    const costPer = parseFloat(m.querySelector("#ecp").value)||0;
    const cur     = m.querySelector("#ecur").value;
    if (!dose||!weeks||!vialMg) { m.querySelector("#eresult").innerHTML=`<div style="color:#ff7c7c;font-size:12px">Fill in dose, weeks, and mg per vial.</div>`; m.querySelector("#eresult").style.display="block"; return; }
    const totalInjections = Math.round(freq * weeks);
    const totalMg = dose * totalInjections;
    const vialsNeeded = Math.ceil(totalMg / vialMg);
    const totalCost = costPer ? vialsNeeded * costPer : null;
    // Check current stash
    const kit = state.supplies.find(s=>s.name===name);
    const _ecu=cfg(name)?.unit||"mg"; const stashMg = kit ? Math.max(0,(kit.totalVials||0)*(kit.vialMg||0) - (aps[name]?.doses||[]).reduce((a,d)=>a+doseToMg(d.dose,_ecu),0)) : 0;
    const stashCovers = stashMg >= totalMg;
    const shortfall = Math.max(0, totalMg - stashMg);
    const extraVials = shortfall > 0 ? Math.ceil(shortfall / vialMg) : 0;
    const c = cfg(name);
    m.querySelector("#eresult").innerHTML = `
      <div style="display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:14px">
        ${[["INJECTIONS",totalInjections,""],["TOTAL MG",totalMg.toFixed(1),"mg"],["VIALS NEEDED",vialsNeeded,""],totalCost?["EST. COST",totalCost.toLocaleString("en-CA",{minimumFractionDigits:2,maximumFractionDigits:2})+" "+cur,""]:[null]].filter(x=>x[0]).map(([l,v])=>`<div style="background:var(--surface);border-radius:8px;padding:10px 12px"><div class="mono" style="font-size:8px;color:var(--t5);letter-spacing:1.5px;margin-bottom:4px">${l}</div><div style="font-size:16px;font-weight:700;color:${c.color}">${v}</div></div>`).join("")}
      </div>
      <div style="background:${stashCovers?"#7DF9C011":"#ff7c7c11"};border:1px solid ${stashCovers?"#7DF9C033":"#ff7c7c33"};border-radius:10px;padding:12px 14px">
        <div style="font-size:13px;font-weight:600;color:${stashCovers?"#7DF9C0":"#ff7c7c"};margin-bottom:4px">${stashCovers?"✓ Current stash covers this protocol":"⚠ Need to restock"}</div>
        <div style="font-size:12px;color:var(--t3)">${stashCovers?`${stashMg.toFixed(1)} mg on hand — you have ${((stashMg-totalMg)/dose).toFixed(0)} injections to spare`:`${stashMg.toFixed(1)} mg on hand, ${shortfall.toFixed(1)} mg short — buy ${extraVials} more vial${extraVials===1?"":"s"}`}</div>
      </div>`;
    m.querySelector("#eresult").style.display = "block";
  };
}

// ─── Cycle Planner ───────────────────────────────────────────────────────────
function cyclePlannerModal() {
  const compoundOpts = [...new Set([...Object.keys(PEPTIDES),...LIBRARY.map(l=>l.name),...Object.keys(state.customPeptides||{})])].sort().map(n=>`<option value="${esc(n)}">${esc(n)}</option>`).join("");
  const today = localDate();
  const m = openModal(`
    <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:16px">
      <span class="mono" style="font-size:13px;color:#7DF9C0;letter-spacing:1.5px">📅 CYCLE COVERAGE</span>
      <button id="x" style="color:var(--t4);font-size:18px">✕</button>
    </div>
    <div style="font-size:12px;color:var(--t4);margin-bottom:16px">See how many on/off cycles your current stash covers — e.g. GHK-Cu 8 weeks on, 8 weeks off</div>
    <label class="field-label">COMPOUND</label>
    <select id="cc" class="inp" style="margin-bottom:14px">${compoundOpts}</select>
    <div style="display:grid;grid-template-columns:1fr 1fr;gap:10px">
      <div><label class="field-label">ON PERIOD (weeks)</label><input id="con" type="number" class="inp" value="8" style="margin-bottom:14px"></div>
      <div><label class="field-label">OFF PERIOD (weeks)</label><input id="coff" type="number" class="inp" value="8" style="margin-bottom:14px"></div>
      <div><label class="field-label">CYCLES TO SHOW</label><input id="cnum" type="number" class="inp" value="3" min="1" max="6" style="margin-bottom:14px"></div>
      <div><label class="field-label">FIRST CYCLE START</label><input id="cstart" type="date" class="inp" value="${today}" style="margin-bottom:14px"></div>
    </div>
    <div id="cresult" style="display:none"></div>
    <button id="ccalc" class="btn-primary" style="background:#7DF9C0;color:#000">Generate Timeline</button>
  `, "#7DF9C0");
  m.querySelector("#x").onclick = closeModal;

  m.querySelector("#ccalc").onclick = () => {
    const name  = m.querySelector("#cc").value;
    const onW   = parseFloat(m.querySelector("#con").value)||8;
    const offW  = parseFloat(m.querySelector("#coff").value)||8;
    const num   = Math.min(6, parseInt(m.querySelector("#cnum").value)||3);
    const start = m.querySelector("#cstart").value;
    if (!start) return;
    const c = cfg(name);
    const onDays  = Math.round(onW * 7);
    const offDays = Math.round(offW * 7);
    const aps = allPeptides();
    const stashKit = state.supplies.find(s=>s.name===name);
    const _scu=cfg(name)?.unit||"mg"; const stashMgAvail = stashKit ? Math.max(0,(stashKit.totalVials||0)*(stashKit.vialMg||0) - (aps[name]?.doses||[]).reduce((a,d)=>a+doseToMg(d.dose,_scu),0)) : null;

    let html = `<div style="margin-bottom:14px">`;
    let cur = start;
    const nowDate = today;
    for (let i = 0; i < num; i++) {
      const onStart = cur;
      const onEnd   = addDays(cur, onDays - 1);
      const offStart = addDays(cur, onDays);
      const offEnd   = addDays(cur, onDays + offDays - 1);
      const isActive = nowDate >= onStart && nowDate <= onEnd;
      const isOff    = nowDate >= offStart && nowDate <= offEnd;
      const isPast   = nowDate > offEnd;
      const isFuture = nowDate < onStart;
      const status   = isPast?"Past":isActive?"● Active":isOff?"◌ Off period":isFuture?"Upcoming":"";
      const statusCol = isActive?c.color:isOff?"var(--t4)":isPast?"var(--t5)":"var(--t3)";

      // Progress bar for active cycle
      let progressBar = "";
      if (isActive) {
        const elapsed = (new Date(nowDate) - new Date(onStart)) / 86400000;
        const pct = Math.round(elapsed / onDays * 100);
        const daysLeft = onDays - elapsed;
        progressBar = `<div style="margin:8px 0 4px"><div style="height:6px;background:var(--surface-3);border-radius:3px;overflow:hidden"><div style="height:100%;width:${pct}%;background:${c.color};border-radius:3px"></div></div><div style="font-size:10px;color:var(--t4);margin-top:3px">Day ${Math.round(elapsed)+1} of ${onDays} · ${Math.ceil(daysLeft)}d remaining</div></div>`;
      } else if (isFuture && i === 0) {
        const daysUntilStart = Math.ceil((new Date(onStart) - new Date(nowDate)) / 86400000);
        progressBar = `<div style="font-size:11px;color:var(--t3);margin-top:4px">Starts in ${daysUntilStart}d · ${fmtDate(onStart)}</div>`;
      }

      html += `<div style="background:${isActive?c.color+"11":"var(--surface-2)"};border:1px solid ${isActive?c.color+"33":"var(--border-sub)"};border-radius:10px;padding:12px 14px;margin-bottom:8px">
        <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:6px">
          <span style="font-size:13px;font-weight:600;color:${isActive?c.color:"var(--t2)"}">Cycle ${i+1} — ON</span>
          <span style="font-size:11px;color:${statusCol};font-weight:600">${status}</span>
        </div>
        <div style="display:flex;gap:16px;font-size:11px;color:var(--t3)">
          <span>${fmtDate(onStart)} → ${fmtDate(onEnd)}</span>
          <span style="color:var(--t4)">${onW}w on</span>
        </div>
        ${progressBar}
        <div style="margin-top:6px;padding-top:6px;border-top:1px solid var(--border-sub);display:flex;justify-content:space-between;font-size:11px">
          <span style="color:var(--t4)">Off: ${fmtDate(offStart)} → ${fmtDate(offEnd)}</span>
          <span style="color:var(--t5)">${offW}w off</span>
        </div>
      </div>`;
      cur = addDays(cur, onDays + offDays);
    }

    // Stash check
    if (stashMgAvail !== null) {
      const dosesPerDay = (aps[name]?.doses||[]).length >= 2
        ? 1 / ((allPeptides()[name]?.scheduleDays||7))
        : null;
      const mgPerCycle = dosesPerDay ? dosesPerDay * onDays * ((aps[name]?.doses||[]).length >= 1
        ? doseToMg([...(aps[name]?.doses||[])].sort((a,b)=>new Date(b.date)-new Date(a.date))[0]?.dose||1.5, cfg(name)?.unit||"mg")
        : 1.5) : null;
      if (mgPerCycle) {
        const cyclesCovered = Math.floor(stashMgAvail / mgPerCycle);
        html += `<div style="background:${cyclesCovered>=1?"#7DF9C011":"#ff7c7c11"};border:1px solid ${cyclesCovered>=1?"#7DF9C033":"#ff7c7c33"};border-radius:10px;padding:12px 14px;margin-top:4px">
          <div style="font-size:12px;font-weight:600;color:${cyclesCovered>=1?"#7DF9C0":"#ff7c7c"}">Stash: ~${stashMgAvail.toFixed(0)} mg on hand · covers ~${cyclesCovered} full cycle${cyclesCovered===1?"":"s"}</div>
        </div>`;
      }
    }
    html += `</div>`;
    m.querySelector("#cresult").innerHTML = html;
    m.querySelector("#cresult").style.display = "block";
  };
}

function openNewVialModal(supplyId) {
  const s = state.supplies.find(x=>x.id===supplyId); if(!s) return;
  const c = cfg(s.name);
  const today = localDate();
  const vialNum = ((s.reconHistory||[]).length)+1;
  const m = openModal(`
    <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:16px">
      <span class="mono" style="font-size:13px;color:${c.color};letter-spacing:1.5px">OPEN NEW VIAL</span>

    <div style="background:${c.color}11;border:1px solid ${c.color}33;border-radius:10px;padding:14px;margin-bottom:16px">
      <div style="font-size:11px;color:${c.color};font-weight:600;margin-bottom:10px">VIAL ${vialNum} DETAILS</div>
      <div style="display:grid;grid-template-columns:1fr 1fr 1fr;gap:10px">
        <div>
          <label class="field-label">VIALS IN KIT</label>
          <input id="rv-totalvials" type="number" class="inp" value="${s.totalVials||""}" placeholder="e.g. 10" style="padding:6px 8px;font-size:12px">
        </div>
        <div>
          <label class="field-label">MG PER VIAL</label>
          <input id="rv-vialmg" type="number" class="inp" value="${s.vialMg||""}" placeholder="e.g. 30" style="padding:6px 8px;font-size:12px">
        </div>
        <div>
          <label class="field-label">BAC WATER (mL)</label>
          <input id="rv-bacml" type="number" step="0.1" class="inp" value="${s.bacMl||""}" placeholder="e.g. 3" style="padding:6px 8px;font-size:12px">
        </div>
      </div>
      <div id="rv-conc-preview" style="font-size:11px;color:var(--t4);margin-top:8px;text-align:center"></div>
    </div>
    <label class="field-label">RECONSTITUTION DATE</label>
    <input id="rvd" type="date" class="inp" value="${today}" style="margin-bottom:14px">
    <label class="field-label">NOTES (lot #, batch, anything notable)</label>
    <input id="rvn" class="inp" placeholder="optional" style="margin-bottom:18px">
    <button id="rvsave" class="btn-primary" style="background:${c.color}">Log Reconstitution</button>
  `, c.color);
  m.querySelector("#x").onclick = closeModal;

  // Live concentration preview
  const updatePreview = () => {
    const mg = parseFloat(m.querySelector("#rv-vialmg").value)||0;
    const bac = parseFloat(m.querySelector("#rv-bacml").value)||0;
    const tv = parseInt(m.querySelector("#rv-totalvials").value)||0;
    const prev = m.querySelector("#rv-conc-preview");
    if(mg && bac) {
      const conc = (mg/bac).toFixed(2);
      const unit = PEPTIDES[s.name]?.unit||"mg";
      prev.textContent = `Concentration: ${conc} mg/mL · 1 ${unit} ≈ ${(1/conc*1000).toFixed(1)} units${tv?" · "+tv+" vials total":""}`;
      prev.style.color = c.color;
    } else { prev.textContent = ""; }
  };
  m.querySelector("#rv-vialmg").oninput = updatePreview;
  m.querySelector("#rv-bacml").oninput = updatePreview;
  m.querySelector("#rv-totalvials").oninput = updatePreview;
  updatePreview();

  m.querySelector("#rvsave").onclick = () => {
    const entry = state.supplies.find(x=>x.id===supplyId); if(!entry) return;
    // Save any edits back to the kit
    const newMg = parseFloat(m.querySelector("#rv-vialmg").value);
    const newBac = parseFloat(m.querySelector("#rv-bacml").value);
    const newTv = parseInt(m.querySelector("#rv-totalvials").value);
    if(!isNaN(newMg)) entry.vialMg = newMg;
    if(!isNaN(newBac)) entry.bacMl = newBac;
    if(!isNaN(newTv)) entry.totalVials = newTv;
    if(!entry.reconHistory) entry.reconHistory = entry.reconDate ? [{id:uid(),date:entry.reconDate,notes:""}] : [];
    entry.reconHistory.push({id:uid(), date:m.querySelector("#rvd").value, notes:m.querySelector("#rvn").value});
    entry.reconDate = m.querySelector("#rvd").value;
    const sealed = Math.max(0,(entry.totalVials||0)-(entry.openedVials||0)-(entry.emptyVials||0));
    if(sealed > 0) { entry.openedVials = (entry.openedVials||0)+1; }
    saveState(); closeModal(); render();
  };
}

function equipmentView() {
  const items = state.equipmentItems || [];
  const EQ_TYPES = ["BAC Water","Syringes","Needles","Alcohol Wipes","Sharps Container","Labels / Stickers","Storage Supplies","Other"];

  const bacItems = items.filter(e=>e.type==="BAC Water");
  const otherItems = items.filter(e=>e.type!=="BAC Water");

  const statusColor = {unopened:"#7DF9C0",open:"#F9C87D",empty:"#ff7c7c",discarded:"var(--t5)"};
  const statusLabel = {unopened:"Unopened",open:"Open",empty:"Empty",discarded:"Discarded"};

  const bacCard = (e) => {
    const daysSinceOpen = e.openedDate ? Math.floor(daysSince(e.openedDate)) : null;
    const USE_BY_DAYS = 28; // conservative BAC water use-by window once opened
    const suggestedUseBy = e.openedDate ? addDays(e.openedDate, USE_BY_DAYS) : null;
    const daysUntilUseBy = suggestedUseBy ? Math.ceil((new Date(suggestedUseBy)-Date.now())/86400000) : null;
    const warnUseBy = daysUntilUseBy !== null && daysUntilUseBy <= 7;
    const expiredUseBy = daysUntilUseBy !== null && daysUntilUseBy < 0;
    const sc = statusColor[e.status||"unopened"];
    return `<div style="background:var(--surface-2);border:1px solid ${warnUseBy||expiredUseBy?"#F9C87D44":"var(--border-sub)"};border-radius:12px;padding:12px 14px;margin-bottom:8px">
      <div style="display:flex;align-items:center;gap:8px;margin-bottom:8px">
        <div style="width:8px;height:8px;border-radius:50%;background:${sc};flex-shrink:0"></div>
        <div style="flex:1">
          <div style="font-size:13px;font-weight:600;color:var(--t1)">${esc(e.brand||"BAC Water")}</div>
          <div style="font-size:10px;color:var(--t4)">${e.volumeMl||"?"}mL · ${statusLabel[e.status||"unopened"]}</div>
        </div>
        <button class="eq-edit" data-id="${e.id}" style="font-size:11px;color:var(--t4);border:1px solid var(--border-sub);border-radius:6px;padding:3px 8px">Edit</button>
        <button class="eq-del" data-id="${e.id}" style="font-size:13px;color:var(--t5)">✕</button>
      </div>
      ${e.status==="open"?`
        <div style="display:flex;gap:12px;flex-wrap:wrap;margin-bottom:8px">
          ${e.openedDate?`<div style="font-size:11px;color:var(--t4)">Opened: <span style="color:var(--t2)">${fmtDate(e.openedDate)}</span> (${daysSinceOpen}d ago)</div>`:""}
          ${e.mlRemaining!=null?`<div style="font-size:11px;color:var(--t4)">Remaining: <span style="color:#7DF9C0">${e.mlRemaining}mL</span></div>`:""}
        </div>
        ${suggestedUseBy?`<div style="font-size:11px;color:${expiredUseBy?"#FF7C7C":warnUseBy?"#F9C87D":"var(--t4)"}">
          ${expiredUseBy?`⚠ Consider replacing — opened ${Math.abs(daysUntilUseBy)}d past the suggested ${USE_BY_DAYS}-day window.`:
            warnUseBy?`⚠ Consider replacing soon — ${daysUntilUseBy}d remaining in suggested window.`:
            `Suggested use-by: ${fmtDate(suggestedUseBy)} (${daysUntilUseBy}d remaining)`}
        </div>`:""}
      `:""}
      ${e.notes?`<div style="font-size:11px;color:var(--t5);margin-top:6px;font-style:italic">${esc(e.notes)}</div>`:""}
    </div>`;
  };

  const supplyCard = (e) => {
    const sc = statusColor[e.status||"open"];
    return `<div style="display:flex;align-items:center;gap:10px;padding:10px 12px;background:var(--surface-2);border:1px solid var(--border-sub);border-radius:10px;margin-bottom:6px">
      <div style="width:8px;height:8px;border-radius:50%;background:${sc};flex-shrink:0"></div>
      <div style="flex:1"><div style="font-size:12px;font-weight:600;color:var(--t2)">${esc(e.type)}${e.brand?` · ${esc(e.brand)}`:""}</div>
        ${e.quantity?`<div style="font-size:11px;color:var(--t4)">Qty: ${esc(e.quantity)}</div>`:""}
        ${e.notes?`<div style="font-size:11px;color:var(--t5);font-style:italic">${esc(e.notes)}</div>`:""}
      </div>
      <button class="eq-edit" data-id="${e.id}" style="font-size:11px;color:var(--t4);border:1px solid var(--border-sub);border-radius:6px;padding:3px 8px">Edit</button>
      <button class="eq-del" data-id="${e.id}" style="font-size:13px;color:var(--t5)">✕</button>
    </div>`;
  };

  const bacWarnCount = bacItems.filter(e=>{
    if(e.status!=="open"||!e.openedDate) return false;
    return daysSince(e.openedDate)>21;
  }).length;

  return `<button id="add-equipment" style="width:100%;padding:10px;border-radius:10px;background:#7DF9C018;border:1px dashed #7DF9C055;color:#7DF9C0;font-size:12px;font-weight:600;margin-bottom:14px">+ Add Supply / Equipment</button>
    ${bacWarnCount?`<div style="background:#F9C87D11;border:1px solid #F9C87D44;border-radius:10px;padding:10px 14px;margin-bottom:12px;font-size:11px;color:#F9C87D">⚠ ${bacWarnCount} BAC water vial${bacWarnCount>1?"s":""} may be past the suggested use window. Consider replacing before next reconstitution.</div>`:""}
    ${bacItems.length?`<div class="mono" style="font-size:9px;color:var(--t4);letter-spacing:1.5px;margin-bottom:8px">BAC WATER</div>${bacItems.map(bacCard).join("")}`:""}
    ${otherItems.length?`<div class="mono" style="font-size:9px;color:var(--t4);letter-spacing:1.5px;margin-bottom:8px;margin-top:${bacItems.length?12:0}px">SUPPLIES & EQUIPMENT</div>${otherItems.map(supplyCard).join("")}`:""}
    ${!items.length?`<div style="text-align:center;padding:30px 0;color:var(--t4);font-size:12px">No supplies tracked yet.<br><span style="font-size:11px;color:var(--t5)">Add BAC water, syringes, wipes and other supplies here.</span></div>`:""}`;
}

function stashView() {
  const sort = state._stashSort || "name";
  const currency = state._stashCurrency || "CAD";
  const aps = allPeptides();

  // Sort entries
  let entries = [...state.supplies];
  if (sort==="name")      entries.sort((a,b)=>a.name.localeCompare(b.name));
  if (sort==="remaining") entries.sort((a,b)=>stashRemPct(b,aps)-stashRemPct(a,aps));
  if (sort==="expiry")    entries.sort((a,b)=>stashExpiryMs(a)-stashExpiryMs(b));
  if (sort==="cost")      entries.sort((a,b)=>(parseFloat(b.cost)||0)-(parseFloat(a.cost)||0));

  // Total invested
  const totalCost = state.supplies.reduce((acc,s)=>acc+(parseFloat(s.cost)||0),0);

  const sortBtn = (id,label) => `<button class="sstab${sort===id?" on":""}" data-s="${id}" style="flex:1;padding:7px;border-radius:7px;font-size:11px;background:${sort===id?"var(--surface-3)":"transparent"};border:1px solid ${sort===id?"var(--border)":"var(--border-sub)"};color:${sort===id?"var(--t1)":"var(--t4)"}">${label}</button>`;

  const stashSub = state._stashSub || "kits";
  const stashSubBtn=(id,label)=>`<button class="stash-sub-btn" data-sub="${id}" style="flex:1;padding:9px;border-radius:10px;font-size:12px;font-weight:600;border:1px solid ${stashSub===id?"#C9A0FF44":"var(--border-sub)"};background:${stashSub===id?"#C9A0FF18":"transparent"};color:${stashSub===id?"#C9A0FF":"var(--t4)"}">${label}</button>`;
  let html = `<h1 class="serif greet">Stash</h1>
  <div style="display:flex;gap:6px;margin-bottom:16px">
    ${stashSubBtn("kits","💊 Compound Kits")}
    ${stashSubBtn("equipment","🧪 Supplies")}
  </div>
`;

  if(stashSub==="equipment") return html + equipmentView();

  html += `<div style="display:flex;gap:8px;margin-bottom:14px">
    <button id="openestimator" style="flex:1;padding:10px;border-radius:10px;background:#C9A0FF18;border:1px solid #C9A0FF44;color:#C9A0FF;font-size:12px;font-weight:600">🧮 Estimator</button>
    <button id="opencycleplanner" style="flex:1;padding:10px;border-radius:10px;background:#7DF9C018;border:1px solid #7DF9C044;color:#7DF9C0;font-size:12px;font-weight:600">📅 Cycle Coverage</button>
  </div>
  <div style="display:flex;gap:8px;margin-bottom:16px">
    <div style="flex:1;background:var(--surface);border:1px solid var(--border-sub);border-radius:12px;padding:12px 14px">
      <div class="mono" style="font-size:9px;color:var(--t4);letter-spacing:1.5px;margin-bottom:4px">TOTAL INVESTED</div>
      <div style="font-size:20px;font-weight:700;color:#C9A0FF">${totalCost?totalCost.toLocaleString("en-CA",{minimumFractionDigits:2,maximumFractionDigits:2})+" "+currency:"—"}</div>
    </div>
    <div style="background:var(--surface);border:1px solid var(--border-sub);border-radius:12px;padding:12px 14px;text-align:center">
      <div class="mono" style="font-size:9px;color:var(--t4);letter-spacing:1.5px;margin-bottom:4px">KITS</div>
      <div style="font-size:20px;font-weight:700;color:var(--t2)">${state.supplies.length}</div>
    </div>
  </div>
  <div style="display:flex;gap:5px;margin-bottom:16px">
    ${sortBtn("name","Name")}${sortBtn("remaining","Remaining")}${sortBtn("expiry","Expiry")}${sortBtn("cost","Cost")}
  </div>`;

  if (!entries.length) html += `<div style="color:var(--t4);font-size:13px;text-align:center;padding:30px 0">No kits tracked yet. Add your first one below.</div>`;

  entries.forEach(s=>{
    const c = cfg(s.name);
    const sameCompoundKits=state.supplies.filter(k=>k.name===s.name);
    const allCompDoses=(aps[s.name] ? (aps[s.name].doses||[]) : []);
    const compDoses = allCompDoses.filter(d=>d.dose&&parseFloat(d.dose)>0&&(d.kitId===s.id||(sameCompoundKits.length===1&&!d.kitId)));
    const conc = (parseFloat(s.vialMg||0)>0&&parseFloat(s.bacMl||0)>0) ? parseFloat(s.vialMg)/parseFloat(s.bacMl) : null;

    // ── Current reconstituted vial ─────────────────────────────────────────────
    const sCompUnit = cfg(s.name)?.unit || "mg"; // compound's native unit for doseToMg conversion
    const currentReconDate = s.reconDate || null;
    const reconDoses = currentReconDate ? compDoses.filter(d=>new Date(d.date)>=new Date(currentReconDate)) : [];
    const usedFromCurrent = reconDoses.reduce((a,d)=>a+doseToMg(d.dose, sCompUnit),0);
    const vialRem = s.vialMg>0 ? Math.max(0, s.vialMg - usedFromCurrent) : null;
    const vialPct = s.vialMg>0 ? Math.round(vialRem/s.vialMg*100) : null;
    const barColor = vialPct===null?"var(--t4)":vialPct>60?"#7DF9C0":vialPct>20?"#F9C87D":"#ff7c7c";
    const lastDoseAmt = compDoses.length ? doseToMg(compDoses[compDoses.length-1].dose, sCompUnit) : 0;
    const shotsEst = (vialRem&&lastDoseAmt>0) ? Math.floor(vialRem/lastDoseAmt) : null;

    // ── Expiry (whole days) ────────────────────────────────────────────────────
    const expiryDate = currentReconDate&&s.expiryDays ? addDays(currentReconDate, s.expiryDays) : null;
    const expiryMs = expiryDate ? new Date(expiryDate).getTime() - Date.now() : null;
    const expiryDaysLeft = expiryMs !== null ? Math.ceil(expiryMs/86400000) : null;
    const expColor = expiryDaysLeft===null?"var(--t4)":expiryDaysLeft<0?"#ff4d4d":expiryDaysLeft<=5?"#ff8c00":"#7DF9C0";

    // ── Kit totals ─────────────────────────────────────────────────────────────
    const totalMg = (s.totalVials||0) * (s.vialMg||0);
    const totalUsedMg = compDoses.reduce((a,d)=>a+doseToMg(d.dose, sCompUnit),0);
    const kitRemMg = Math.max(0, totalMg - totalUsedMg);
    const sealed = Math.max(0,(s.totalVials||0)-(s.openedVials||0)-(s.emptyVials||0));

    // ── Supply Intelligence — all values normalized to mg via doseToMg ──

    const avgDoseAmt = recentDoses.length ? recentDoses.reduce((a,d)=>a+doseToMg(d.dose, sCompUnit),0)/recentDoses.length : 0;
    const scheduleDays = (allPeptides()[s.name]?.scheduleDays)||7;
    const mgPerWeek = avgDoseAmt>0 ? avgDoseAmt*(7/scheduleDays) : 0;
    const weeksRemaining = (s.activeKit && kitRemMg>0 && mgPerWeek>0) ? kitRemMg/mgPerWeek : null;
    const depletionDate = weeksRemaining!=null ? addDays(localDate(), Math.round(weeksRemaining*7)) : null;
    const isFrozenUnopened = !s.activeKit && !currentReconDate;
    // Estimated start date for a frozen/unopened kit: when the currently active kit is projected to deplete
    let frozenStartEst = null;
    if(isFrozenUnopened){
      const activeKit = sameCompoundKits.find(k=>k.activeKit);
