<!DOCTYPE html>
<html lang="en">
<head>

<title>Peptide Tracker</title>

<style>
  @import url('https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600;700&family=DM+Mono:wght@400;500&family=Fraunces:opsz,wght@9..144,400;9..144,500;9..144,600&display=swap');

  /* ── Theme variables ──────────────────────────────────────────────────────── */
  :root {
    --bg:           #1A1728;
    --bg-deep:      #120F1E;
    --surface:      #221E35;
    --surface-2:    #2C2845;
    --surface-3:    #332F52;
    --border:       #3E3A5E;
    --border-sub:   #2C2845;
    --t1:           #F4F5FC;
    --t2:           #C8C6DF;
    --t3:           #8A87A8;
    --t4:           #5A5775;
    --t5:           #3E3A5E;
    --modal-bg:     #1E1A30;
    --modal-border: #3E3A5E;
    --seg-active:   #2C2845;
    --seg-border:   #3E3A5E;
    --input-bg:     #1E1A30;
    --pill-bg:      rgba(255,255,255,0.06);
    --shadow:       rgba(0,0,0,0.5);
    --tabbar-bg:    rgba(22,19,36,0.95);
    --tabbar-bdr:   #2C2845;
    --tabbar-txt:   #5A5775;
    --tabbar-act:   #7DF9C0;
    --card-glow:    rgba(167,139,250,0.04);
  }
  [data-theme="light"] {
    --bg:           #F4F5FC;
    --bg-deep:      #EDEAF8;
    --surface:      #FFFFFF;
    --surface-2:    #EAE8F5;
    --surface-3:    #D4D0E8;
    --border:       #A8A4C4;
    --border-sub:   #C8C4DC;
    --t1:           #1A1728;
    --t2:           #2E2B4A;
    --t3:           #4A4768;
    --t4:           #6B6888;
    --t5:           #8A87A8;
    --modal-bg:     #FFFFFF;
    --modal-border: #D0CCE8;
    --seg-active:   #EAE8F5;
    --seg-border:   #A8A4C4;
    --input-bg:     #F0EEF8;
    --pill-bg:      rgba(0,0,0,0.05);
    --shadow:       rgba(100,90,160,0.12);
    --tabbar-bg:    rgba(244,245,252,0.96);
    --tabbar-bdr:   #B8B4D0;
    --tabbar-txt:   #6B6888;
    --tabbar-act:   #6B5FCF;
    --card-glow:    rgba(167,139,250,0.03);
    color-scheme: light;

    /* Remap neon accent text to darker readable versions in light mode */
    --accent-green:  #1A7A4A;
    --accent-teal:   #0D6B7A;
    --accent-blue:   #2853A8;
    --accent-purple: #5B3FA8;
    --accent-amber:  #8A5A00;
    --accent-red:    #A83030;
  }

  * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
  html, body { margin: 0; padding: 0; background: var(--bg); }
  body { font-family: 'DM Sans', -apple-system, sans-serif; color: var(--t1); overscroll-behavior: none; transition: background 0.25s, color 0.25s; }
  input, select, textarea, button { font-family: inherit; }
  input[type=number]::-webkit-inner-spin-button { -webkit-appearance: none; }
  ::-webkit-scrollbar { width: 0; height: 0; }
  @keyframes pulse { 0%,100% { opacity: 1 } 50% { opacity: .4 } }
  @keyframes slideUp { from { transform: translateY(20px); opacity: 0 } to { transform: translateY(0); opacity: 1 } }
  .serif { font-family: 'Fraunces', Georgia, serif; }
  .mono { font-family: 'DM Mono', monospace; }
  #app { max-width: 560px; margin: 0 auto; min-height: 100vh; padding: calc(env(safe-area-inset-top) + 8px) 16px calc(90px + env(safe-area-inset-bottom)); }
  button { cursor: pointer; border: none; background: none; }
  /* Prevent heading text running under theme toggle */
  input[type="date"], input[type="datetime-local"], input[type="time"] { max-width: 100%; min-width: 0; width: 100%; box-sizing: border-box; appearance: none; -webkit-appearance: none; }
  .tabbar { position: fixed; bottom: 0; left: 50%; transform: translateX(-50%); width: 100%; max-width: 560px; background: var(--tabbar-bg); backdrop-filter: blur(20px); border-top: 1px solid var(--tabbar-bdr); display: flex; justify-content: space-around; padding: 10px 0 calc(8px + env(safe-area-inset-bottom)); z-index: 50; }
  .tabbar button { display: flex; flex-direction: column; align-items: center; gap: 3px; color: var(--tabbar-txt); font-size: 10px; letter-spacing: 0.3px; padding: 4px 12px; transition: color 0.2s; }
  .tabbar button.active { color: var(--tabbar-act); }
  .tabbar svg { width: 22px; height: 22px; }
  .modal-bg { position: fixed; inset: 0; background: rgba(0,0,0,0.75); backdrop-filter: blur(6px); display: flex; align-items: flex-end; justify-content: center; z-index: 100; }
  .modal { background: var(--modal-bg); border: 1px solid var(--modal-border); border-radius: 22px 22px 0 0; padding: 24px 22px calc(24px + env(safe-area-inset-bottom)); width: 100%; max-width: 560px; max-height: 92vh; overflow-y: auto; animation: slideUp 0.25s ease; transition: background 0.25s; }
  @media (min-width: 561px) { .modal-bg { align-items: center; } .modal { border-radius: 20px; max-width: 440px; } }
  .field-label { display: block; font-size: 10px; color: var(--t3); letter-spacing: 1px; margin-bottom: 6px; font-family: 'DM Mono', monospace; }
  .inp { width: 100%; background: var(--input-bg); border: 1px solid var(--border); border-radius: 10px; padding: 11px 13px; color: var(--t1); font-size: 15px; outline: none; transition: background 0.2s, border-color 0.2s; }
  input[type="date"].inp, input[type="time"].inp { display: flex; align-items: center; line-height: normal; height: 46px; padding-top: 0; padding-bottom: 0; -webkit-appearance: none; appearance: none; }

  /* Light mode: remap neon text colors to readable equivalents */
  [data-theme="light"] .card { background: var(--surface); }
  [data-theme="light"] [style*="color:#7DF9C0"], [data-theme="light"] [style*="color: #7DF9C0"] { color: #1A7A4A !important; }
  [data-theme="light"] [style*="color:#C8FF9C"], [data-theme="light"] [style*="color: #C8FF9C"] { color: #2A7A00 !important; }
  [data-theme="light"] [style*="color:#8AB4FF"], [data-theme="light"] [style*="color: #8AB4FF"] { color: #2853A8 !important; }
  [data-theme="light"] [style*="color:#A78BFA"], [data-theme="light"] [style*="color: #A78BFA"] { color: #5B3FA8 !important; }
  [data-theme="light"] [style*="color:#F9C87D"], [data-theme="light"] [style*="color: #F9C87D"] { color: #8A5A00 !important; }
  [data-theme="light"] [style*="color:#ff7c7c"], [data-theme="light"] [style*="color: #ff7c7c"] { color: #A83030 !important; }
  [data-theme="light"] [style*="color:#9DC8FF"], [data-theme="light"] [style*="color: #9DC8FF"] { color: #2853A8 !important; }
  [data-theme="light"] [style*="color:#9CC8FF"], [data-theme="light"] [style*="color: #9CC8FF"] { color: #2853A8 !important; }
  [data-theme="light"] [style*="color:#FF9CC8"], [data-theme="light"] [style*="color: #FF9CC8"] { color: #A83060 !important; }
  [data-theme="light"] [style*="color:#C9A0FF"], [data-theme="light"] [style*="color: #C9A0FF"] { color: #5B3FA8 !important; }
  [data-theme="light"] .mono { color: var(--t3); }
  [data-theme="light"] .pill { border-color: rgba(0,0,0,0.15) !important; }
  [data-theme="light"] .btn-primary { color: #fff !important; }
  .inp:focus { border-color: var(--t3); }
  .pill { display: inline-block; padding: 3px 10px; border-radius: 99px; font-size: 11px; font-family: 'DM Mono', monospace; font-weight: 500; }
  .card { background: var(--surface); border: 1px solid var(--border-sub); border-radius: 16px; padding: 20px; margin-bottom: 14px; transition: background 0.25s, border-color 0.25s; }
  .btn-primary { width: 100%; padding: 14px; border-radius: 12px; font-weight: 700; font-size: 14px; letter-spacing: 0.5px; font-family: 'DM Mono', monospace; color: #000; }
  .seg { display: flex; gap: 6px; }
  .seg button { flex: 1; padding: 9px; border-radius: 9px; font-size: 13px; background: transparent; border: 1px solid var(--seg-border); color: var(--t3); transition: all 0.2s; }
  .seg button.on { background: var(--seg-active); color: var(--t1); border-color: var(--border); }
  h1.greet { font-size: 22px; font-weight: 500; margin: 4px 0 2px; color: var(--t1); padding-right: 50px; }
  .hint { font-size: 13px; color: var(--t3); line-height: 1.5; }
  /* ── Unified accordion system ────────────────────────────────────────────── */
  .app-acc { border-radius: 14px; overflow: hidden; margin-bottom: 12px; transition: border-color 0.2s; }
  .app-acc > .tacc { border: none !important; border-radius: 0 !important; width: 100%; text-align: left; }
  .app-acc-body { border-top: 1px solid var(--border-sub); }
  .app-sub-acc { border-radius: 10px; overflow: hidden; margin-bottom: 8px; }
  .app-sub-acc > .tacc { border: none !important; border-radius: 0 !important; width: 100%; text-align: left; }
  .app-sub-body { border-top: 1px solid var(--border-sub); }
  details.app-detail { border: 1px solid var(--border-sub); border-radius: 12px; overflow: hidden; margin-bottom: 10px; }
  details.app-detail > summary { list-style: none; display: flex; align-items: center; gap: 10px; padding: 10px 14px; cursor: pointer; user-select: none; background: var(--surface-2); }
  details.app-detail > summary::-webkit-details-marker { display: none; }
  details.app-detail[open] > summary { border-bottom: 1px solid var(--border-sub); }
  details.app-detail > .app-detail-body { padding: 12px 14px; background: var(--surface-2); }

  .quick-actions { display: grid; grid-template-columns: repeat(5, 1fr); gap: 6px; margin: 14px 0; }
  .quick-actions button { padding: 11px 4px 10px; border-radius: 12px; font-size: 10px; font-weight: 600; text-align: center; width: 100%; display:flex; flex-direction:column; align-items:center; gap:5px; }
  .quick-actions button .qa-icon { font-size: 18px; line-height: 1; }
  .quick-actions button .qa-label { font-size: 10px; line-height: 1.2; letter-spacing: 0.2px; }
  /* ── Day tooltip ──────────────────────────────────────────────────────────── */
  #cal-tip { display:none; position:fixed; z-index:200; background:var(--surface); border:1px solid var(--border); border-radius:12px; padding:12px 14px; min-width:170px; max-width:230px; font-size:12px; box-shadow:0 6px 24px var(--shadow); pointer-events:none; transition:opacity 0.1s; }
  #cal-tip .tip-date { font-size:10px; color:var(--t4); font-family:'DM Mono',monospace; letter-spacing:1px; margin-bottom:8px; }
  #cal-tip .tip-row { display:flex; align-items:flex-start; gap:8px; margin-bottom:6px; }
  #cal-tip .tip-dot { width:7px; height:7px; border-radius:50%; flex-shrink:0; margin-top:3px; }
  #cal-tip .tip-empty { color:var(--t5); font-style:italic; }
  #theme-toggle { width: 32px; height: 32px; border-radius: 50%; background: var(--surface-2); border: 1px solid var(--border); color: var(--t2); font-size: 15px; display: flex; align-items: center; justify-content: center; flex-shrink: 0; }
  /* ── Light mode inline-style overrides ───────────────────────────────────── */
  [data-theme="light"] #body { color: var(--t1); }
  [data-theme="light"] .card { box-shadow: 0 2px 16px var(--shadow); }
  [data-theme="light"] .mono { color: var(--t3); }
  [data-theme="light"] .hint { color: var(--t3); }
  .inp::placeholder { color: var(--t5); font-style: italic; }
  [data-theme="light"] .inp::placeholder { color: #B0ACC8; font-style: italic; }
  [data-theme="light"] .field-label { color: var(--t3); }
  [data-theme="light"] .pill { background: rgba(0,0,0,0.07); color: var(--t2); border-color: var(--border); }
  [data-theme="light"] .card { border-color: var(--border-sub) !important; }
  [data-theme="light"] .inp { background: var(--input-bg); color: var(--t1); border-color: var(--border); }
</style>

<body>
<div id="app"><div style="min-height:100vh;display:flex;align-items:center;justify-content:center;color:#7DF9C0" class="mono">LOADING…</div></div>
<div id="demo-banner" style="display:none;position:fixed;top:0;left:0;right:0;z-index:200;background:#F9C87D;color:#000;font-size:11px;font-weight:700;text-align:center;padding:8px 16px;padding-top:calc(8px + env(safe-area-inset-top));letter-spacing:1px">🧪 DEVELOPER DEMO MODE — Sample Data Active &nbsp;<button onclick="demoPickerModal()" style="background:#00000022;border:1px solid #00000033;border-radius:5px;padding:1px 8px;font-size:10px;color:#000">Change</button>&nbsp;<button onclick="exitDemoMode()" style="background:#00000022;border:1px solid #00000033;border-radius:5px;padding:1px 8px;font-size:10px;color:#000">Exit</button></div>
<div id="cal-tip"></div>

<script>
"use strict";

// ─── Theme ────────────────────────────────────────────────────────────────────
(function() {
  const saved = localStorage.getItem('pep-theme') || 'dark';
  if (saved === 'light') document.documentElement.dataset.theme = 'light';
  const btn = document.getElementById('theme-toggle');
  if (btn) btn.textContent = saved === 'light' ? '🌙' : '☀️';
})();
function toggleTheme() {
  const isLight = document.documentElement.dataset.theme === 'light';
  const next = isLight ? 'dark' : 'light';
  if (next === 'dark') delete document.documentElement.dataset.theme;
  else document.documentElement.dataset.theme = 'light';
  localStorage.setItem('pep-theme', next);
  const btn = document.getElementById('theme-toggle');
  if (btn) btn.textContent = next === 'light' ? '🌙' : '☀️';
}

// ─── Persistence (localStorage) ────────────────────────────────────────────
const STORE_KEY = "peptide-tracker-html-v1";
function loadState() {
  try { const r = localStorage.getItem(STORE_KEY); return r ? JSON.parse(r) : null; } catch { return null; }
}
// ── DEVELOPER DEMO MODE ──────────────────────────────────────────────────────
let _realState = null;
let _demoActive = false;

function isDemoMode() { return _demoActive; }

function saveState() {
  if(_demoActive) return; // never write demo data to localStorage
  try { localStorage.setItem(STORE_KEY, JSON.stringify(state)); } catch(e) { console.error(e); }
}

function enterDemoMode(scenario) {
  if(_demoActive) return;
  _realState = JSON.parse(JSON.stringify(state)); // deep clone real state
  _demoActive = true;
  state = buildDemoState(scenario||"weight_loss");
  render();
}

function exitDemoMode() {
  if(!_demoActive) return;
  _demoActive = false;
  state = _realState;
  _realState = null;
  render();
}

function buildDemoState(scenario) {
  const now = new Date();
  const daysAgo = n => new Date(now.getTime()-n*86400000).toISOString().slice(0,10);
  const uid2 = () => Math.floor(Math.random()*1e9)+1;
  const randBetween = (a,b) => Math.random()*(b-a)+a;

  // ── Demo helpers ──────────────────────────────────────────────────────────
  // Weekly compound: date only (calendar-day logic is fine)
  const mkDose = (name,daysBack,dose,site) => ({id:uid2(),date:daysAgo(daysBack)+"T08:00:00",dose:String(dose),site:site||"Abdomen",symptoms:[],notes:"",escalation:false});
  // Daily compound: include proper time so 24h datetime logic works correctly
  const mkDoseDaily = (name,daysBack,dose,site,hh=20) => ({id:uid2(),date:daysAgo(daysBack)+"T"+String(hh).padStart(2,"0")+":00:00",dose:String(dose),site:site||"Abdomen",symptoms:[],notes:"",escalation:false});
  const mkLog = (daysBack,mood,symptoms,compound,notes,symptomTags,compoundNotes) => ({
    id:uid2(), date:daysAgo(daysBack), mood:mood||3,
    symptoms:(symptoms||[]).map(s=>({name:s,intensity:2})),
    compound:compound||null,
    symptomTags:symptomTags||{},
    compoundNotes:compoundNotes||{},
    notes:notes||""
  });
  const mkWeight = (daysBack,lbs) => ({id:uid2(),date:daysAgo(daysBack),weight:lbs.toFixed(1),sourceType:"manual"});
  const mkMeasure = (daysBack,waist) => ({id:uid2(),date:daysAgo(daysBack),waist:waist.toFixed(1),hips:"",chest:"",sourceType:"manual"});
  const mkMacro = (daysBack,cal,p,c,f) => ({id:uid2(),date:daysAgo(daysBack)+"T12:00:00",calories:cal,protein:p,carbs:c,fat:f,sourceType:"aggregate_csv",importBatchId:"demo_batch_1"});
  const mkSupp = (daysBack,taken) => ({id:uid2(),date:daysAgo(daysBack),taken});
  const mkActivity = (daysBack,steps,activeCalories,restingHR,hrv,basalCalories) => ({
    id:uid2(), date:daysAgo(daysBack)+"T12:00:00",
    sourceType:"aggregate_csv", importBatchId:"demo_batch_1",
    ...(steps!=null&&{steps}), ...(activeCalories!=null&&{activeCalories}),
    ...(restingHR!=null&&{restingHR}), ...(hrv!=null&&{hrv}),
    ...(basalCalories!=null&&{basalCalories})
  });
  const mkWorkout = (daysBack,activity,durationMin,workoutCal,avgHR,maxHR,distKm,hh=8) => ({
    id:uid2(), date:daysAgo(daysBack)+"T"+String(hh).padStart(2,"0")+":00:00",
    sourceType:"workout_csv", importBatchId:"demo_batch_2",
    isWorkout:true, workoutType:activity,
    workoutStart:daysAgo(daysBack)+"T"+String(hh).padStart(2,"0")+":00:00",
    workoutEnd:daysAgo(daysBack)+"T"+String(hh+Math.floor(durationMin/60)).padStart(2,"0")+":"+String(durationMin%60).padStart(2,"0")+":00",
    durationMin, workoutActiveCalories:workoutCal, avgHR, maxHR,
    ...(distKm!=null&&{distanceKm:distKm})
  });

  // Shared base
  const base = defaultState();
  base.profile = {name:"Demo User",startDate:daysAgo(90),startWeight:"188",goalWeight:"165",height:"",age:"",gender:"",onboardingDone:true};
  base.settings = {...base.settings,weightUnit:"lbs",graceHours:3,supplements:["Magnesium Citrate","Psyllium Husk","Peppermint Oil (Enteric)","Betaine HCl","Vitamin C","Berberine HCl","L-Carnitine","Taurine"]};

  if(scenario==="weight_loss") {
    // 90 days of Retatrutide, titrated 0.5→1→1.5→2mg
    const retaDoses = [
      mkDose("Retatrutide",91,0.5,"Abdomen — upper L"),
      mkDose("Retatrutide",84,0.5,"Abdomen — lower R"),
      mkDose("Retatrutide",77,1.0,"Abdomen — upper R"),
      mkDose("Retatrutide",70,1.0,"Abdomen — lower L"),
      mkDose("Retatrutide",63,1.5,"Thigh — outer L"),
      mkDose("Retatrutide",56,1.5,"Abdomen — upper L"),
      mkDose("Retatrutide",49,1.5,"Abdomen — lower R"),
      mkDose("Retatrutide",42,2.0,"Abdomen — upper R"),
      mkDose("Retatrutide",35,2.0,"Abdomen — lower L"),
      mkDose("Retatrutide",28,2.0,"Thigh — outer R"),
      mkDose("Retatrutide",21,2.0,"Abdomen — upper L"),
      mkDose("Retatrutide",14,2.0,"Abdomen — lower R"),
      mkDose("Retatrutide",7,2.0,"Abdomen — upper R"),
    ];
    retaDoses[2].escalation=true; retaDoses[4].escalation=true; retaDoses[7].escalation=true;
    base.peptides["Retatrutide"] = {doses:retaDoses,scheduleDays:7,status:"active"};

    // Weight logs: 188 → 174 over 90 days
    base.weightLogs = Array.from({length:18},(_, i)=>mkWeight(90-i*5, 188-i*0.78));

    // Measurements: waist shrinking
    base.measurementLogs = Array.from({length:6},(_,i)=>mkMeasure(90-i*15, 36.5-i*0.4));

    // Symptom logs — realistic GLP-1 pattern
    const symptomPatterns = [
      [88,4,["Nausea","Food noise quiet"]],[86,4,["Reduced appetite","Nausea"]],[85,3,["Constipation","Food noise quiet"]],
      [81,4,["Food noise quiet","Good energy"]],[80,3,["Constipation"]],[79,4,["Food noise quiet"]],
      [77,3,["Appetite return","Food noise return"]],[76,3,["Cravings"]],
      [74,4,["Nausea","Food noise quiet"]],[72,4,["Food noise quiet","Good mood"]],[71,3,["Constipation"]],
      [70,3,["Appetite return","Cravings","Food noise return"]],
      [67,5,["Food noise quiet","Good energy","Good mood"]],[65,4,["Food noise quiet"]],[64,4,["Reduced appetite"]],
      [63,3,["Appetite return","Food noise return"]],
      [60,4,["Food noise quiet","Good energy"]],[58,4,["Reduced appetite"]],[57,3,[]],
      [56,3,["Appetite return","Cravings"]],
      [53,4,["Food noise quiet","Good energy","Good mood"]],[52,4,["Reduced appetite"]],[51,5,["Food noise quiet"]],
      [50,3,["Appetite return","Food noise return"]],
      [47,5,["Good energy","Food noise quiet","Good mood"]],[46,4,["Reduced appetite"]],[45,4,[]],
      [44,3,["Appetite return"]],
      [41,4,["Food noise quiet","Good energy"]],[40,4,["Reduced appetite"]],[39,5,["Food noise quiet","Mental clarity"]],
      [38,3,["Food noise return","Cravings"]],
      [34,5,["Food noise quiet","Good energy","Good mood"]],[33,4,["Reduced appetite"]],[32,4,[]],
      [31,3,["Appetite return","Food noise return"]],
      [27,5,["Food noise quiet","Good energy","Good mood"]],[26,4,["Reduced appetite"]],[25,4,["Food noise quiet"]],
      [24,3,["Appetite return"]],
      [20,5,["Food noise quiet","Good mood"]],[19,5,["Reduced appetite"]],[18,5,["Food noise quiet","Good energy"]],
      [17,3,["Food noise return"]],
      [13,5,["Food noise quiet","Good energy","Good mood"]],[12,4,["Reduced appetite"]],[11,5,[]],
      [10,3,["Appetite return","Cravings"]],

  { icon:"🚀", title:"Getting Started — The Workflow", min:"4 min", cat:"Tutorial", body:[
    ["The natural order","This app follows a lifecycle: Plan → Prepare → Execute → Review. Each step builds on the last. Skipping ahead works, but following this order gets you the most value fastest."],
    ["Step 1 — Complete your profile","Go to Profile (👤 button). Set your name, weight, goal weight, and units. This personalises the app and starts your baseline — you can't measure progress without a starting point."],

  { icon:"⚗️", title:"mg, mcg, mL & Units — Dosing Math Explained", min:"5 min", cat:"Dosing", body:[
    ["Why this matters","A decimal slip or unit confusion is the single most common peptide dosing error. 1 mg = 1000 mcg. 'Units' on a syringe is a volume, not a weight. Mixing them up can mean a 10× dose."],
    ["mg — milligrams","The amount of medication in the vial. A vial labelled 10mg contains 10 milligrams of peptide powder. This is fixed — you can't change it by adding more or less water."],
    ["mcg — micrograms","One thousandth of a milligram. 1 mg = 1000 mcg. 500 mcg = 0.5 mg. Some compounds (BPC-157, GHK-Cu) are dosed in mcg; GLP-1s are usually dosed in mg. Always confirm which unit your protocol uses."],
    ["mL — millilitres","The volume of liquid (BAC water) you add to the vial. This controls concentration. The peptide amount doesn't change — spreading it across more water makes each mL weaker, giving you more measurable volume per dose."],
    ["Units — syringe markings","On a U-100 insulin syringe, 100 units = 1mL. Units measure volume, not medication. '10 units' means you drew 0.1mL — nothing about the peptide amount without knowing concentration."],
    ["Concentration — the link between mg and units","Concentration (mg/mL) = vial mg ÷ BAC water mL. Then: units to draw = (dose mg ÷ concentration) × 100. Example: 10mg vial + 2mL BAC = 5mg/mL. For a 1mg dose: (1 ÷ 5) × 100 = 20 units."],
    ["Quick reference — 10mg vial","1mL BAC → 10mg/mL: 250mcg=2.5u · 500mcg=5u · 1mg=10u · 1.5mg=15u · 2mg=20u\n2mL BAC → 5mg/mL: 250mcg=5u · 500mcg=10u · 1mg=20u · 1.5mg=30u · 2mg=40u\n3mL BAC → 3.33mg/mL: 250mcg=7.5u · 500mcg=15u · 1mg=30u · 1.5mg=45u · 2mg=60u"],
    ["Quick reference — 30mg vial","1mL BAC → 30mg/mL: 0.5mg=1.7u · 1mg=3.3u · 1.5mg=5u · 2mg=6.7u · 3mg=10u\n2mL BAC → 15mg/mL: 0.5mg=3.3u · 1mg=6.7u · 1.5mg=10u · 2mg=13.3u · 3mg=20u\n3mL BAC → 10mg/mL: 0.5mg=5u · 1mg=10u · 1.5mg=15u · 2mg=20u · 3mg=30u"],
    ["Step-by-step calculation","1. Check your vial size (mg). 2. Decide BAC water amount (mL). 3. Calculate concentration: mg ÷ mL. 4. Enter your dose (in same unit as step 1). 5. Divide dose by concentration. 6. Multiply by 100 to get syringe units. Always double-check before drawing."],
    ["Common mistakes","• Converting mg to mcg: move decimal 3 places right (1mg → 1000mcg). • Assuming 'units' = mg — they don't. • Using different BAC amounts each time — always log your BAC water in Stash so your unit math stays consistent across vials."],
  ]},
  { icon:"⚠️", title:"Mistakes to Avoid — The Big 10", min:"4 min", cat:"Safety", body:[
    ["1 · Shaking the vial","Shaking forces micro-bubbles through the solution and the mechanical shear can damage the peptide's structure. Swirl gently in slow circles instead — most peptides dissolve in 30–60 seconds of swirling."],
    ["2 · Spraying water onto the powder","Blasting BAC water directly onto the powder foams it and can denature it on impact. Aim the stream down the inside glass wall so it runs gently into the powder."],
    ["3 · Reconstituting a cold vial","Cold peptide doesn't dissolve cleanly. Let the vial come to room temperature (15–20 min out of the fridge) before adding water."],
    ["4 · Wrong injection angle","Too shallow and you're intradermal (stings, welts); too deep and you hit muscle. Pinch a fold of fat and go in at roughly 45–90° depending on needle length — the pinch test keeps you in the SubQ layer."],
    ["5 · Injecting before the alcohol dries","Wet alcohol stings going in and, if you rub it, can actually carry surface bacteria toward the site. Swab, then give it ~10 seconds to air-dry."],
    ["6 · Skipping the label","An unlabeled vial is a dosing error waiting to happen — especially if you run more than one compound. Label every vial with name, mg, mL/concentration, and reconstitution date. Log it in your Stash and the app tracks expiry for you."],
    ["7 · Not logging events","If you don't log doses, symptoms, and sites, you can't troubleshoot later — you lose the ability to connect a bad week to a dose change or a site to a reaction. The whole point of the tracker is the paper trail."],
    ["8 · Pushing the dose too fast","Climbing before your body has adapted is the fast track to nausea and quitting. Hold each titration step its full window; let symptoms (and the Trough analysis) tell you when — or whether — to go up."],
    ["9 · Reading the wrong edge of the plunger","Insulin syringe plungers have a rubber stopper with two edges. Always read your dose from the same edge (the top/front edge where it meets the barrel markings) every single time, so your doses are consistent."],
    ["10 · Mixing up mg vs mcg vs units","The single most dangerous error — 1 mg = 1000 mcg, and 'units' on a U-100 syringe are a volume, not a mass. Always convert step by step and double-check with the Reconstitution Calculator before you draw. A decimal slip here is a 10× dose."],
  ]},
  { icon:"🚩", title:"Red Flags & Quality Control", min:"7 min", cat:"Safety", body:[
    ["Sterile technique — the offenders","The mistakes that bite you: reusing needles/syringes (one use, every time), skipping alcohol wipes or not letting them dry, touching the needle tip or vial septum after cleaning, shaking instead of swirling, spraying water onto powder, reconstituting cold vials, not labeling, and using the same syringe between vials. Build pro habits: a dedicated washable prep tray, single direction of flow (clean supplies → mix → inject → sharps), wash hands first, alcohol pads kept at the workspace, sharps container always visible."],
    ["Supply quality — on arrival","Question a batch if you see: vials cloudy or with sediment before reconstitution (powder should be a small white/off-white pellet), powder that looks melted/sticky (heat exposure in shipping), unexpected color shifts, damaged packaging or seals, missing batch numbers/labels/COA, or inconsistent fill levels across vials of the same order."],
    ["Supply quality — vendor red flags","Be wary of a vendor who: refuses third-party testing (Janoshik, Peptide Test), is brand new with no community history, prices far below market (testing is expensive — cheap is a signal), has no COA, gives vague/evasive answers, pushes you to buy more before you've tested the current batch, or is cagey about tracking/shipping. Protect yourself: test independently when you can (~$50/test is worth it), buy small first from new vendors, keep your first good vial as a reference baseline, and document everything."],
    ["BAC water specifics","Real bacteriostatic water (0.9% benzyl alcohol) keeps an opened vial usable ~28 days; plain 'sterile water for injection' has no preservative and only a ~24-hour window once opened — don't use it as a long-term substitute. Discard BAC water showing particulates, cloudiness, color change, a broken seal, or past expiry."],
    ["Injection site — ✅ normal","No action needed: a small fluid bleb right after injecting (dissolves in minutes), mild redness for a few hours, slight bruising in fatty areas, a pinprick mark for a day or two, mild itching in the first 24 hours."],
    ["Injection site — ⚠️ watch","Monitor and adjust technique: redness lasting over 24 hours, persistent itching, a hard lump under the skin (lengthen your rotation gap), tenderness past 48 hours, repeated bruising in one area (lower the angle, push slower), or irritation that builds over multiple injections at one site."],
    ["Injection site — 🛑 stop & consult","Pause the cycle and contact a clinician for: redness spreading beyond the site, warmth + redness worsening over days, pus/drainage/an open wound, a hard lump growing over 48–72 hours, fever alongside site issues, or numbness/tingling around the site."],
    ["Injection site — 🚨 ER now","Go immediately for: red streaking radiating from the site (possible lymphatic infection), fever + chills + site symptoms, difficulty using the limb you injected, or severe pain that doesn't respond to ice and elevation."],
    ["Equipment & storage red flags","Replace/discard: sticky syringe plungers, needles that bend easily or have burrs/bent tips, a damaged sharps container, expired alcohol wipes (the active ingredient evaporates), and insulin syringes without clear unit markings. Storage problems: reconstituted vials sitting in light or a clear container, inconsistent fridge temps, vials on the fridge door (temperature swings), using past-due reconstituted vials 'to not waste,' worn-off date labels, or storing alongside food. A dedicated mini-fridge ($100–200) eliminates door-opening swings and is worth it for serious use."],
    ["When to pause ANY protocol","Universal stop triggers regardless of compound: persistent symptoms beyond the expected adaptation window, a vendor/batch change causing new reactions, lab work trending the wrong way, major life stress making sterile consistency hard, current cold/flu/illness, travel that breaks the cold chain, surgery or a procedure within 2–4 weeks, pregnancy or trying to conceive, starting new prescriptions (unknown interactions), worsening mood/anxiety/depression, or simply losing trust in your supply chain. Pause = skip 1–2 doses and resume at the same dose; Stop = end the cycle (taper weekly compounds like reta if you've been on >12 weeks); Restart later = treat as a new protocol and return to the starting dose for titrated peptides. Don't push through serious symptoms, don't skip the stop-and-seek-care signs because the cycle's been good, and don't restart at full dose after weeks off — your tolerance has reset."],
  ]},
  { icon:"🧪", title:"How to Reconstitute", cat:"How-To", min:"5 min", body:[
    ["What you need","Your peptide vial, a vial of bacteriostatic water (BAC water), two insulin syringes (one for transfer, one for injecting), alcohol wipes, and a clean surface. Never use plain sterile water or saline — they lack the bacteriostatic agent that keeps multi-use vials safe between doses."],
    ["Clean & prep","Wipe both rubber stoppers with a fresh alcohol wipe and let air-dry ~10 seconds. Don't blow on them or touch the cleaned surface. Draw up the BAC water you plan to add — a common choice for a 5 mg vial is 2 mL, giving 2.5 mg/mL."],
    ["Add the water","Insert the needle through the stopper at a slight angle and slowly run the water down the inside glass wall rather than blasting the powder directly. This prevents foaming and protein degradation."],
    ["Dissolve","Gently swirl in slow circles. Do not shake — shaking creates micro-bubbles and can denature the peptide. Most dissolve in 30–60 seconds. If cloudiness lingers, refrigerate 15 min and swirl again."],
    ["Label & store","Label with compound, date reconstituted, concentration, and use-by (typically ~30 days refrigerated). Store upright at 2–8 °C, away from light. Unmixed powder often keeps at room temp for weeks; once mixed, refrigeration is required."],
  ]},
  { icon:"💉", title:"Injection Basics", cat:"How-To", min:"4 min", body:[
    ["Subcutaneous, not deep","Most research peptides are dosed SubQ — into the fat layer just under the skin, not muscle. A short insulin needle (e.g. 29–31g, 1/2\") at a 45–90° pinch is standard."],
    ["Clean the site","Swab with alcohol, let it dry. Pinch a fold of fat, insert smoothly, draw back very slightly to check (optional for SubQ), then push slowly and steadily."],
    ["After","Withdraw, light pressure with a clean cotton pad. Mild redness or a tiny bleb is normal. Log the site so you rotate next time."],
  ]},
  { icon:"🔁", title:"Site Rotation", cat:"How-To", min:"3 min", body:[
    ["Why it matters","Repeatedly pinning the same spot causes irritation, scar tissue, and lipohypertrophy (lumpy fat) that changes absorption. Rotating keeps absorption consistent and tissue healthy."],
    ["A simple system","Work around the available sites — abdomen quadrants, thighs, flanks, delts — moving at least an inch from the last spot. This app shows your last 3 sites in the dose logger so you always know where you've been."],
  ]},
  { icon:"🧊", title:"Storage & Shelf Life", cat:"How-To", min:"4 min", body:[
    ["Reconstituted","Keep refrigerated at 2–8 °C, upright, away from light. Most peptides hold potency ~28–35 days once mixed. Log your reconstitution date — this app warns you as use-by approaches."],
    ["Lyophilized (powder)","Unmixed powder is far more stable — often weeks at room temp, months to years frozen. Check your specific compound."],
    ["Signs a vial's gone bad","Cloudiness that won't clear, floating particulate, discoloration, or a vial left warm too long. When in doubt, don't use it."],
    ["Travel","Use an insulated pouch with a cool pack; avoid freezing the reconstituted solution and avoid heat. Keep vials upright."],
  ]},
  { icon:"📐", title:"Dosing Math", cat:"How-To", min:"5 min", body:[
    ["Concentration","Concentration (mg/mL) = vial strength (mg) ÷ BAC water (mL). A 10 mg vial + 2 mL water = 5 mg/mL."],
    ["Units on a U-100 syringe","A U-100 insulin syringe has 100 units per 1 mL. Units to draw = (your dose ÷ concentration) × 100. So 2 mg at 5 mg/mL = (2÷5)×100 = 40 units = 0.4 mL."],
    ["Use the calculator","The built-in Reconstitution Calculator does this for you with a live syringe visual — vial size, water, dose in, units out."],
  ]},
  { icon:"💧", title:"What is BAC Water?", min:"2 min", cat:"How-To", body:[
    ["Bacteriostatic water","Sterile water with 0.9% benzyl alcohol added. The benzyl alcohol suppresses bacterial growth, which is what makes a multi-dose vial safe to enter repeatedly over weeks."],
    ["Vs other waters","Sterile water and saline have no preservative — fine for single use but not for vials you'll draw from many times. BAC water is the standard for reconstituting research peptides."],
  ]},
  { icon:"🧱", title:"Stacking Basics", min:"5 min", cat:"How-To", body:[
    ["What stacking means","Running two or more compounds together to target complementary goals — e.g. a GLP-1 for fat loss alongside a GH secretagogue for recovery and lean-mass preservation. The logic is synergy, but every addition also adds variables and side-effect surface area."],
    ["One change at a time","The cardinal rule. If you start two new compounds at once and feel off, you can't tell which one did it. Introduce one, give it a couple of weeks, log how you respond, then layer the next."],
    ["Common pairings","Fat-loss + muscle-sparing: a GLP-1/GIP agonist with CJC-1295/Ipamorelin. Recovery: BPC-157 with TB-500. Skin/longevity: GHK-Cu solo or alongside a GH secretagogue. These are popular community combinations, not validated clinical regimens."],
    ["Watch for overlap","Stacking compounds that hit the same pathway (e.g. two GH secretagogues) rarely doubles benefit and can blunt your own signaling. Stacking two things that both suppress appetite can push intake too low — which sabotages the muscle-sparing goal."],
    ["The honest caveat","Almost no peptide stacks have been studied as combined products in humans. You're combining single-agent data and community experience. Track objective markers, not vibes, and keep your clinician in the loop — especially when a GLP-1 is involved."],
  ]},
  { icon:"🔄", title:"Cycling Explained", min:"4 min", cat:"How-To", body:[
    ["Why people cycle","Some compounds lose effect with continuous use (receptor downregulation), some carry cumulative risk, and some are simply used in defined blocks. Cycling means running a compound for a set period, then pausing — 'on' and 'off' phases."],
    ["Healing vs metabolic","Healing peptides (BPC-157, TB-500) are often run in short blocks — e.g. 4–6 weeks during an injury, then off. GLP-1 agonists like retatrutide are different: they're typically titrated and run continuously toward a maintenance dose, more like a medication than a cycle."],
    ["GH secretagogues","CJC-1295/Ipamorelin protocols often use cycles (e.g. 8–12 weeks on, a few weeks off) on the theory of preserving pituitary responsiveness — though the evidence for mandatory cycling is thin."],
    ["Don't cold-turkey a GLP-1","Stopping a GLP-1/GIP agonist abruptly tends to bring appetite and often weight back fast. If you're coming off, a gradual taper (see Weaning Off) is gentler — and a clinician conversation, not a guess."],

  { icon:"🪡", title:"Choosing a Syringe", min:"4 min", cat:"How-To", body:[
    ["U-100 insulin syringes","The standard for SubQ peptide dosing. 'U-100' means 100 units per mL, so the unit markings line up directly with the reconstitution math. Common sizes: 0.3 mL (30 units), 0.5 mL (50 units), 1 mL (100 units) — pick one that comfortably holds your draw."],
    ["Needle gauge & length","Higher gauge = thinner needle. 29–31g is typical for SubQ and nearly painless. Length 5/16\" to 1/2\" (8–13 mm) is plenty for the fat layer — you don't want to reach muscle."],
    ["Reading the markings","Each small line is usually 1 unit on a 0.3 mL syringe, 2 units on a 1 mL. Always confirm what one tick equals on your specific syringe before drawing — it's the #1 source of accidental 10x dosing errors."],
    ["Transfer vs inject","Some people use a slightly larger needle to draw (faster) and a fresh fine one to inject (comfort). One needle per injection — never reuse; they dull and contaminate fast."],
  ]},
  { icon:"🧫", title:"Filtering & Drawing", min:"4 min", cat:"How-To", body:[
    ["Do you need to filter?","Most home users don't filter reconstituted peptide — if it's fully dissolved and clear, you draw and inject. Filtering (with a 0.22 micron sterile filter) is an extra sterility step some take, especially with larger batch prep, but it adds handling and loss."],
    ["Drawing cleanly","Swab the stopper, let it dry. Pull a little air into the syringe equal to your draw, inject that air into the vial (equalizes pressure), then invert and draw your dose slowly. Tap out bubbles, push them back, re-draw to your exact unit mark."],
    ["Bubbles","Small bubbles in a SubQ insulin syringe aren't dangerous the way an IV air embolism would be — but they throw off your dose accuracy. Flick them to the top and push them out before you set your final unit count."],
    ["If you filter","Draw through the filter into a clean syringe, then swap to your injecting needle. Expect a little product loss in the filter. Only worth it if you have a sterility reason; otherwise it's added risk of fumbling a sterile field."],
  ]},
  { icon:"📦", title:"I Just Got My Peptides — Now What?", min:"5 min", cat:"Getting Started", body:[
    ["What's in the box","Typically a lyophilized (freeze-dried) peptide vial — a small amount of white powder or a barely-visible film at the bottom. That's normal; the dose is tiny. You'll also need BAC water, insulin syringes, and alcohol wipes, usually bought separately."],
    ["The order of operations","1) Read the reconstitution guide. 2) Mix the vial with BAC water. 3) Use the calculator to find your units. 4) Read injection basics. 5) Log your first dose here. It's a lot the first time and routine by the third."],
    ["Before your first dose","Know your number — run the Reconstitution Calculator so you know exactly how many units to draw. Have your injection site picked. And if a clinician is involved in your protocol, this is the moment to confirm your starting dose with them."],
    ["Storage from day one","Unmixed powder is stable; once you reconstitute, it lives in the fridge with a ~30-day clock. Log the reconstitution date in your Stash so the app tracks the expiry for you."],
  ]},
  { icon:"📈", title:"Titration Schedules", min:"5 min", cat:"Getting Started", body:[
    ["Why titrate","Starting low and increasing gradually lets your body adapt and keeps side effects (especially GI, with GLP-1s) manageable. Jumping straight to a maintenance dose is the fast track to nausea, fatigue, and quitting."],
    ["Retatrutide example","Published trial protocols commonly start around 2 mg weekly and step up every 4 weeks toward a 12 mg maintenance dose. A typical research ladder: 2 → 4 → 6 → 9 → 12 mg, holding each step ~4 weeks. Your tolerance dictates pace — there's no prize for rushing."],
    ["Listen to the data, not the calendar","If a step brings strong nausea or your appetite is already well-controlled, holding longer (or not climbing) is reasonable. The Trends → Trough analysis here helps you see whether you even need more drug yet."],
    ["This is a clinician conversation","Titration pace, target dose, and whether to climb at all are exactly the decisions worth making with a prescriber — not off a generic ladder. The app gives you the data to bring to that conversation."],
  ]},
  { icon:"📉", title:"Weaning Off", min:"4 min", cat:"Getting Started", body:[
    ["Why taper instead of stop","For GLP-1/GIP agonists, stopping cold typically brings appetite — and often weight — back quickly, because the drug was doing the appetite-suppression work. A gradual step-down gives your own regulation time to take back over."],
    ["A gentle approach","The mirror image of titration: step the dose down over several weeks rather than dropping it, while deliberately locking in the habits (protein, training, sleep) that have to carry the maintenance once the drug is gone."],
    ["Healing peptides","Short-block compounds (BPC-157, TB-500) don't generally need a taper — you finish the block and stop. The weaning concern is mostly about the metabolic agonists."],
    ["Plan it with your clinician","When and how to come off — especially the timeline and whether to bridge with anything — is a prescriber decision. Bring your weight trend and measurement data from Trends so it's an informed one."],
  ]},

  { name:"NAD+", sub:"Coenzyme (cellular energy)", color:"#9CC8FF", tags:["Longevity","Energy","Recovery"], evidence:"emerging",

    mechanism:"NAD+ is a required cofactor for mitochondrial energy production and for sirtuins and PARPs involved in repair and aging pathways. Restoring levels is the longevity thesis — clinical proof of meaningful outcomes is still emerging.",
    meta:{ dose:"Varies widely (mg–hundreds)", freq:"Several×/week or IV", route:"SubQ or IV", halfLife:"Short", storage:"Refrigerated", cycle:"Ongoing or in blocks" },
    timeline:[["Acute","SubQ/IV can cause flushing or chest tightness if pushed fast."],["Weeks","Energy/clarity benefits reported anecdotally."],["Ongoing","Longevity rationale is long-horizon."],["Note","Go slow — infusion rate drives side effects."]],
    cycleInfo:"Often run continuously at lower doses (2–3×/week SubQ) or as periodic IV loading sessions (e.g. monthly). No defined off-cycle for the longevity use case.",
    timingInfo:"Morning or early afternoon — some report stimulating energy effects that can interfere with sleep if dosed late. IV: go very slow on the drip rate to avoid flushing and chest tightness.",
    stacks:["MOTS-c","5-Amino-1MQ"],
    safety:"The notable acute issue is dose/rate-dependent flushing, nausea, and chest tightness — going slow mitigates it. Long-term outcome evidence in humans is limited. Precursors (NMN/NR) are an oral alternative with their own evidence debate. Reasonable to involve a clinician." },

  { name:"Sermorelin", sub:"GHRH analog", color:"#7DF9C0", tags:["GH","Sleep","Anti-aging"], evidence:"emerging",
    overview:"One of the older GHRH analogs, historically used (and once FDA-approved) for growth-hormone testing and pediatric GH deficiency. Popular in anti-aging clinics for gently supporting natural GH.",
    mechanism:"Stimulates pituitary GH release like other GHRH analogs, but shorter-acting than CJC-1295. The appeal is a physiological, pulsatile nudge rather than exogenous GH.",
    meta:{ dose:"100–300 mcg", freq:"Daily (often bedtime)", route:"SubQ", halfLife:"~10–20 min", storage:"Reconstituted: 2–8 °C", cycle:"Ongoing or 3-month blocks" },
    timeline:[["Wk 1–4","Sleep quality often the first reported change."],["Wk 4–12","Recovery and body-composition effects build slowly."],["Ongoing","Clinic protocols often run multi-month."],["Note","Gentler/shorter-acting than CJC-1295."]],
    cycleInfo:"Often run in 3–6 month blocks (especially in clinic settings), then reassess. Shorter cycles (8–12 weeks) are also common. Annual use with breaks is the typical long-term pattern.",
    timingInfo:"Bedtime is the standard — aligns with natural GH release during deep sleep. Fasted injection preferred (2h post-meal). Bedtime routine makes compliance easier for daily dosing.",
    stacks:["Ipamorelin"],
    safety:"Has a longer human track record than most peptides here. Possible injection-site reactions, flushing, head-rush. Standard GH-axis cautions (glucose, abnormal growths). Often clinic-prescribed; clinician involvement is the norm." },

  { name:"Melanotan II", sub:"Melanocortin agonist", color:"#F9C87D", tags:["Tanning","Libido","Research"], evidence:"investigational",
    overview:"A synthetic melanocortin agonist used recreationally for tanning and libido effects. Notably different risk profile from the metabolic/recovery peptides — more side-effect-prone and entirely unregulated for these uses.",
    mechanism:"Activates melanocortin receptors, stimulating melanin production (darker skin) and influencing sexual-arousal pathways. The same receptor activity drives many of its side effects.",
    meta:{ dose:"Low (e.g. 250–500 mcg)", freq:"Variable / as-needed", route:"SubQ", halfLife:"Short", storage:"Reconstituted: refrigerated", cycle:"As needed (caution)" },
    timeline:[["Early","Nausea and facial flushing common at first doses."],["Weeks","Skin darkening develops with UV exposure."],["Caution","Existing moles can darken/change — monitor."],["Note","Higher nuisance-side-effect rate than most."]],
    cycleInfo:"No standard protocol — typically used in short loading blocks (daily for 1–2 weeks) to achieve tanning effect, then as-needed maintenance. Prolonged continuous use not recommended.",
    timingInfo:"Evening often preferred to sleep through initial nausea and flushing. Low starting dose (0.1–0.25 mg) until tolerance is established.",
    stacks:[],
    safety:"More side-effect-prone than the metabolic peptides: nausea, flushing, spontaneous erections, and darkening of moles/freckles — the last is a real concern because changes in pigmented lesions can mask or mimic melanoma. Not approved; unregulated. Dermatologist monitoring is genuinely sensible if used. Avoid in pregnancy." },

  { name:"Glutathione", sub:"Master antioxidant tripeptide", color:"#C8FF9C", tags:["Antioxidant","Detox","Skin"], evidence:"emerging",
    overview:"A tripeptide (glutamate-cysteine-glycine) that's the body's primary endogenous antioxidant, central to detoxification and cellular redox balance. Injected/IV glutathione is popular for skin brightening, recovery, and 'detox' support; oral forms are poorly absorbed, which is why injectable interest exists.",
    mechanism:"Neutralizes free radicals and supports phase-II liver detoxification by donating electrons via its cysteine thiol group. Also recycles other antioxidants (vitamins C and E). Levels fall with age, stress, and illness.",
    meta:{ dose:"100–600 mg (varies widely)", freq:"1–3×/week or IV", route:"SubQ, IM, or IV", halfLife:"Short", storage:"Reconstituted: 2–8 °C, protect from light", cycle:"Ongoing or in blocks" },
    timeline:[["Acute","No dramatic 'feel'; some report clarity/energy."],["Wk 2–4","Skin tone/brightening effects reported (anecdotal)."],["Ongoing","Antioxidant support is a long-horizon rationale."],["Note","Very light-sensitive — keep vials dark."]],
    cycleInfo:"Flexible — many run 2–3×/week SubQ as ongoing maintenance, or do periodic IV loading sessions. No defined off-cycle for antioxidant support. Light-sensitive — short shelf life once reconstituted.",
    timingInfo:"Any time of day. Morning or post-workout are common choices. Space 30+ min from other injectables. Protect vial from light at all times — even brief UV exposure degrades it.",
    stacks:["NAD+","Vitamin C (co-administered in some IV protocols)"],
    safety:"Generally well-tolerated; injection-site reactions and rare hypersensitivity possible. The skin-lightening effect (reduced melanin) is cosmetic, not a health benefit, and high-dose chronic use is under-studied. IV administration carries the usual infusion risks and should be clinically supervised. Quality and sterility matter especially for IV." },

  { name:"Epithalon", sub:"Telomerase-activating tetrapeptide", color:"#C9A0FF", tags:["Longevity","Sleep","Research"], evidence:"investigational",
    overview:"A synthetic tetrapeptide (a fragment of the pineal peptide epitalamin) studied — mostly by a single Russian research group — for longevity, telomere maintenance, and sleep/circadian effects. Intriguing animal and small-human data, but far from independently validated.",
    mechanism:"Reported to stimulate telomerase (the enzyme that maintains chromosome end-caps) and to support pineal/melatonin regulation. The telomere-lengthening claim is the headline and also the least independently replicated.",
    meta:{ dose:"5–10 mg", freq:"Daily during a short course", route:"SubQ", halfLife:"Short", storage:"Reconstituted: 2–8 °C", cycle:"~10–20 day courses, 1–2×/year" },
    timeline:[["Course start","Run daily for a short defined block."],["During","Sleep quality improvements most commonly reported."],["After","Typically paused for months before repeating."],["Note","Longevity claims are not independently confirmed."]],
    cycleInfo:"Short intensive courses: 10–20 daily injections, 1–2 times per year. Not run continuously — the protocol is specifically course-based with long gaps between. The short-course model is central to the longevity rationale.",
    timingInfo:"Evening preferred by most — DSIP-like sleep/circadian effects are part of the appeal. Consistent daily timing for the duration of the course.",
    stacks:["MOTS-c","NAD+"],
    safety:"Human safety data is limited and largely from one research lineage. Telomerase activation is theoretically double-edged — the same mechanism is relevant to cancer biology — so caution with any cancer history is warranted. Not approved for human use. Treat longevity claims skeptically; this is experimental." },

  { name:"KPV", sub:"Alpha-MSH tripeptide fragment", color:"#FF9CC8", tags:["Anti-inflammatory","Gut","Skin","Research"], evidence:"investigational",
    overview:"KPV (Lys-Pro-Val) is the C-terminal tripeptide fragment of alpha-melanocyte stimulating hormone (α-MSH). It carries the anti-inflammatory signaling properties of the full peptide — without the tanning, libido, or melanocortin side effects that come with longer fragments like Melanotan II. Used in the community primarily for gut inflammation, skin conditions, and systemic anti-inflammatory support.",
    mechanism:"Binds melanocortin receptors (particularly MC1R and MC3R) to suppress NF-κB signaling and pro-inflammatory cytokines (IL-1β, TNF-α, IL-6). Also appears to directly interact with immune cells in the gut mucosa — which is why oral delivery has local gut efficacy without requiring systemic absorption. Systemic SubQ use produces broader anti-inflammatory effects.",
    meta:{ dose:"250–750 mcg/day", freq:"Daily or 2× daily", route:"SubQ or oral", halfLife:"Very short (~2h)", storage:"Reconstituted: 2–8 °C, protect from light", cycle:"4–8 week blocks" },
    cycleInfo:"4–8 week active blocks with 2–4 week breaks. Daily dosing is standard; twice-daily for acute gut flares. Continuous use is not typical — the anti-inflammatory effect doesn't require constant presence once the cycle has done its work.",
    timingInfo:"Flexible — no strong circadian rationale. For gut use: between meals or 30 min before eating. For skin/systemic: any time of day. Oral capsule form is taken with water away from food. SubQ near skin target for localized use is a common approach.",
    timeline:[["Wk 1–2","No dramatic acute effect. Gut comfort and reduced bloating are usually the first signals."],["Wk 2–4","Skin redness/acne reduction and improved texture reported; anti-inflammatory effects accumulate."],["Wk 4–8","Full block; reassess symptoms and decide whether to continue or pause."],["Note","Effects are subtle and cumulative — track daily to find your signal."]],
    stacks:["BPC-157","GHK-Cu","Glutathione"],
    safety:"Well-tolerated in animal models with a clean safety profile given its short sequence. Human data is limited and largely anecdotal. Because it hits melanocortin receptors, theoretical interaction with melanin/tanning is possible at high doses but rarely reported at typical community doses. Oral form avoids injection risks for gut-specific use. Not approved; experimental. Clinician involvement advisable for chronic inflammatory conditions." },

  { name:"GLOW", sub:"GHK-Cu + BPC-157 + TB-500 blend", color:"#C8FF9C", tags:["Skin","Recovery","Blend","Research"], evidence:"investigational",
    overview:"GLOW is a compounded triple-peptide blend combining GHK-Cu (copper tripeptide), BPC-157, and TB-500 in a single vial. Popular in the compounding pharmacy and research community for skin regeneration, tissue repair, and anti-aging applications. Not a single molecule — it's a formulation. Each component has its own independent research history; the combination is designed for multi-pathway synergy.",
    mechanism:"Three complementary mechanisms in one vial: GHK-Cu stimulates collagen and elastin via copper-mediated gene expression; BPC-157 promotes angiogenesis and tissue repair through nitric oxide and VEGF pathways; TB-500 mobilizes actin-binding proteins (thymosin beta-4) to support cell migration and reduce inflammation. Together they target skin structure, vascular support, and cellular repair simultaneously.",
    meta:{ composition:"GHK-Cu (50mg) + BPC-157 (10mg) + TB-500 (10mg)", freq:"1–3× weekly (common protocol)", route:"SubQ", storage:"Reconstituted: 2–8 °C, protect light", cycle:"4–8 week blocks", source:"Compounding pharmacy / research suppliers" },
    cycleInfo:"4–8 week active blocks, 2–4 week breaks. Most protocols run 2–3× per week during the block. Frequency can be daily during an acute skin or injury focus period.",
    timingInfo:"No strong circadian requirement. Morning or evening — consistency matters more than exact timing. Protect from light; GHK-Cu is photosensitive. SubQ in the abdomen is standard; some inject near target areas (e.g. near a scar).",
    timeline:[["Wk 1–2","No immediate visible effect — GHK-Cu and BPC-157 work cumulatively."],["Wk 2–4","Skin texture, tone, and wound healing improvements typically emerge first."],["Wk 4–8","Fuller collagen and recovery benefits. Most protocols reassess at 8 weeks."],["Note","Response is highly individual — log weekly photos and symptom scores."]],
    stacks:["KPV","Glutathione","NAD+"],
    safety:"Each component has its own safety profile — see GHK-Cu, BPC-157, and TB-500 individual entries. The blend amplifies each compound's effects; start conservatively. No RCT data on the combination exists. WADA-prohibited (BPC-157, TB-500). Compounding pharmacy access requires a prescription in most jurisdictions. Experimental for all unlabelled cosmetic/anti-aging uses." },

  { name:"KLOW", sub:"GHK-Cu + KPV + BPC-157 + TB-500 blend", color:"#FF9CC8", tags:["Anti-inflammatory","Skin","Recovery","Blend","Research"], evidence:"investigational",
    overview:"KLOW is an expanded version of the GLOW blend — it adds KPV (the alpha-MSH anti-inflammatory tripeptide) to the GHK-Cu + BPC-157 + TB-500 base. The addition of KPV extends the formulation's scope from structural remodeling into immune modulation and gut/skin inflammation. Often chosen over GLOW when inflammation — gut, skin, or systemic — is a primary target.",
    mechanism:"All of GLOW's mechanisms (collagen via GHK-Cu, angiogenesis via BPC-157, cell migration via TB-500) plus KPV's NF-κB suppression and cytokine reduction (IL-1β, TNF-α, IL-6). KPV's anti-inflammatory action complements BPC-157's cytoprotective effect, making KLOW particularly relevant for inflammatory gut conditions, acne, rosacea, eczema, and post-inflammatory repair.",
    meta:{ composition:"GHK-Cu (50mg) + KPV (10mg) + BPC-157 (10mg) + TB-500 (10mg)", freq:"1–3× weekly", route:"SubQ or oral (KPV component)", storage:"Reconstituted: 2–8 °C, protect light", cycle:"4–8 week blocks", source:"Compounding pharmacy / research suppliers" },
    cycleInfo:"4–8 week active blocks, 2–4 weeks off. Daily frequency during acute inflammatory flares; 2–3× weekly for maintenance/remodeling cycles. KPV's anti-inflammatory effects are fast enough that daily use during a flare is justified.",
    timingInfo:"Flexible timing — no strict circadian rationale. For gut inflammation focus: between meals or 30 min before eating. For skin/systemic: any time of day. Same light-protection requirements as GLOW (GHK-Cu photosensitivity).",
    timeline:[["Wk 1–2","KPV's anti-inflammatory effect may show faster than the structural components — reduced gut discomfort, skin redness/acne can emerge early."],["Wk 2–4","Skin texture and wound healing improvements from GHK-Cu and BPC-157 build."],["Wk 4–8","Full multi-pathway benefit; assess whether to continue or move to GLOW maintenance."],["Note","If inflammation was the primary driver, KLOW's advantage over GLOW is most visible here."]],
    stacks:["Glutathione","NAD+","Retatrutide (for skin during GLP-1 weight loss)"],
    safety:"Carries all the individual compound safety considerations of GHK-Cu, KPV, BPC-157, and TB-500. WADA-prohibited (BPC-157, TB-500). KPV's melanocortin receptor activity is generally minimal at typical doses but relevant with prolonged high-dose use. No combination RCT data exists. Prescription required for compounding pharmacy sourcing. Experimental." },


  { name:"DSIP", sub:"Delta Sleep-Inducing Peptide", color:"#9CC8FF", tags:["Sleep","Stress","Research"], evidence:"investigational",
    overview:"A neuropeptide first isolated for its association with delta-wave (deep) sleep. Used in the community for sleep quality and stress resilience. Decades-old discovery but still poorly characterized; human evidence is thin and inconsistent.",
    mechanism:"Proposed to modulate sleep architecture and the stress/HPA axis, possibly influencing delta-wave sleep and stress-hormone regulation. The exact mechanism and even reliable effect size remain unclear.",
    meta:{ dose:"~100–300 mcg", freq:"Evening, as needed", route:"SubQ", halfLife:"Very short", storage:"Reconstituted: 2–8 °C", cycle:"As needed / short blocks" },
    timeline:[["Acute","Taken before bed; effect is subtle and variable."],["Nightly","Some report deeper or more restorative sleep."],["Note","Response is inconsistent person-to-person."],["Caution","Don't combine sedatives without clinician input."]],
    cycleInfo:"As-needed or short blocks (1–2 weeks). Not typically run continuously. Best used situationally for sleep disruption rather than as a daily supplement.",
    timingInfo:"30–60 min before bed is the only timing that makes sense given its purpose. Do not combine with alcohol, sleep medications, or other sedatives without clinician input.",
    stacks:["Selank"],
    safety:"Limited human data; reported side effects are mild (headache, grogginess) but the evidence base is genuinely sparse. Not approved for human use. Because it touches sleep and stress pathways, stacking with other sedatives or psychoactive medications is an interaction risk worth a clinician conversation. Experimental." },

  { name:"Selank", sub:"Anxiolytic / nootropic peptide", color:"#7DD4F9", tags:["Anxiety","Focus","Research"], evidence:"investigational",
    overview:"A synthetic peptide derived from the immune peptide tuftsin, studied (again mostly in Russia) as an anti-anxiety and cognitive agent. Often used intranasally. Some human research exists but it's limited and not widely replicated.",
    mechanism:"Thought to modulate GABA and serotonin signaling and to influence BDNF and enkephalin systems — producing a calming, mildly nootropic effect without the sedation or dependence of benzodiazepines.",
    meta:{ dose:"~250–500 mcg/day", freq:"Daily or as needed", route:"Intranasal (or SubQ)", halfLife:"Short", storage:"Reconstituted: 2–8 °C", cycle:"Short blocks" },
    timeline:[["Acute","Subtle calming effect, often within an hour."],["Days","Anxiety/focus benefits build with consistent use."],["Block","Usually run for a few weeks then paused."],["Note","Frequently paired with Semax."]],
    cycleInfo:"Short blocks of 10–14 days are common; some run 2–3 weeks on, 1–2 weeks off. Tolerance development with extended daily use is reported anecdotally — breaks seem to preserve effect.",
    timingInfo:"Morning for cognitive/focus use; evening for anxiety relief or sleep support. Intranasal acts faster than SubQ (minutes vs. 30+ min). Avoid combining with psychiatric medications without clinician input.",
    stacks:["Semax","DSIP"],
    safety:"Reported as well-tolerated in the limited studies available, but human data is sparse and mostly from one research tradition. Not approved for human use outside a few countries. Effects on neurotransmitter systems mean interaction caution with psychiatric medications — worth a clinician conversation if you take any. Experimental." },

  { name:"Semax", sub:"Nootropic / neuroprotective peptide", color:"#9CDC5C", tags:["Focus","Neuroprotection","Research"], evidence:"investigational",
    overview:"A synthetic peptide based on a fragment of ACTH, developed in Russia (where it's actually approved for stroke and cognitive indications) and used elsewhere as a nootropic. More clinical history than most research peptides, but little of it is Western/independent.",
    mechanism:"Increases BDNF and other neurotrophic factors, modulates dopamine and serotonin, and shows neuroprotective effects in models — the basis for both its cognitive-enhancement and stroke-recovery uses.",
    meta:{ dose:"~300–600 mcg/day", freq:"Daily or as needed", route:"Intranasal (or SubQ)", halfLife:"Short", storage:"Reconstituted: 2–8 °C", cycle:"Short blocks" },
    timeline:[["Acute","Focus/alertness often noticed within an hour."],["Days","Cognitive and mood benefits build with use."],["Block","Run for a few weeks then pause."],["Note","Commonly stacked with Selank."]],
    stacks:["Selank","DSIP"],
    cycleInfo:"Typically 10–14 day active blocks, then a break of equal length. Continuous daily use is uncommon and not recommended — cycling preserves the cognitive effect and avoids adaptation.",
    timingInfo:"Morning is strongly preferred — BDNF-related cognitive window is 4–6 hours post-dose. Empty stomach or light breakfast. Avoid afternoon/evening (can interfere with sleep). Intranasal acts fastest.",
    safety:"Has a longer clinical track record than most peptides here (approved for specific uses in Russia), but Western/independent safety data is limited. Generally well-tolerated; possible irritability or overstimulation at higher doses. Neurotransmitter effects mean interaction caution with psychiatric meds. Not FDA-approved. Clinician input wise if combining with other actives." },

  { name:"AHK-Cu", aliases:["AHK copper peptide"], sub:"Copper tripeptide — follicle & scalp focus", color:"#C8FF9C", tags:["Skin","Hair","Recovery","Research"], evidence:"investigational",
    overview:"AHK-Cu (Ala-His-Lys copper peptide) is a naturally occurring copper-binding tripeptide similar to GHK-Cu but with a distinct amino acid sequence and a stronger affinity for hair follicle biology. Used topically or via subcutaneous micro-dosing for hair loss and scalp health.",
    mechanism:"Activates follicular stem cells, prolongs anagen phase, and increases dermal papilla size. Copper binding enables collagen/elastin synthesis and anti-inflammatory signaling similar to GHK-Cu but with more follicle-directed tropism.",
    meta:{ dose:"100–500 mcg/day (subQ or topical)", freq:"Daily", route:"SubQ, topical, or intradermal", halfLife:"Short", storage:"Reconstituted: 2–8 °C, protect from light", cycle:"8–12 weeks" },
    cycleInfo:"8–12 week blocks with 4–6 week breaks. Often stacked with GHK-Cu for complementary skin + hair coverage.",
    timingInfo:"Flexible — no circadian requirement. Topical: apply to scalp or skin 1× daily. SubQ: any time, consistency matters more than exact timing.",
    stacks:["GHK-Cu","BPC-157","Sermorelin"],
    safety:"Very limited human safety data. Well-tolerated topically in most users. SubQ use is off-label and experimental. Avoid with active skin infection at injection site. Not approved for human use." },

  { name:"AOD-9604", aliases:["Anti-Obesity Drug 9604","HGH Fragment 177-191 variant"], sub:"HGH lipolytic fragment", color:"#F9C87D", tags:["Fat Loss","Metabolic","Research"], evidence:"investigational",
    overview:"AOD-9604 is a modified fragment of human growth hormone (hGH) designed to retain the fat-burning properties of growth hormone without the IGF-1-driven side effects (glucose dysregulation, tissue growth). Has Phase II/III human trial history — more clinical data than most research peptides.",
    mechanism:"Stimulates lipolysis (fat breakdown) and inhibits lipogenesis via beta-adrenergic receptors without binding the GH receptor. Does not raise IGF-1, blood glucose, or cause tissue proliferation at typical doses.",
    meta:{ dose:"250–500 mcg/day", freq:"Daily", route:"SubQ", halfLife:"~30 min", storage:"Reconstituted: 2–8 °C", cycle:"12–16 weeks" },
    cycleInfo:"Continuous daily use or cycling 5 on/2 off. Phase III trials ran for 12–24 weeks. Fat loss effects are modest; works best combined with calorie deficit and exercise.",
    timingInfo:"Fasted morning injection is most commonly used — lipolysis effect may be enhanced in the fasted state. Pre-workout is also common.",
    stacks:["CJC-1295 no DAC","Ipamorelin","5-Amino-1MQ"],
    safety:"Completed Phase III trials with a generally clean safety profile — no significant metabolic disruption or IGF-1 elevation at studied doses. Not FDA-approved despite trial history. Experimental for off-label use." },

  { name:"CJC-1295 with DAC", aliases:["CJC-1295 DAC","Drug Affinity Complex"], sub:"Long-acting GHRH analog", color:"#7DF9C0", tags:["GH","Recovery","Sleep","Research"], evidence:"investigational",
    overview:"CJC-1295 with DAC is a GHRH analog with a Drug Affinity Complex attached that binds to albumin and dramatically extends its half-life to ~8 days. This creates a sustained elevation of GH levels rather than the pulsatile release from the no-DAC version. Less common than CJC-1295 no DAC due to the less physiological pattern.",
    mechanism:"Binds GHRH receptors on the pituitary, stimulating GH release. The DAC modification causes the peptide to bind albumin in the bloodstream, extending half-life from ~30 min (no DAC) to ~8 days. Creates a sustained GH 'bleed' rather than pulsatile release.",
    meta:{ dose:"1–2 mg/week", freq:"1–2× per week", route:"SubQ", halfLife:"~8 days", storage:"Lyophilized: −20 °C; reconstituted: 2–8 °C", cycle:"12–16 weeks" },
    cycleInfo:"1–2 injections per week. Typical cycles 12–16 weeks followed by 4–8 week break. Often paired with Ipamorelin to amplify GH pulse without excessive cortisol/prolactin.",
    timingInfo:"Day-of-week consistency more important than time of day due to long half-life. Many prefer to time dose for a non-training day.",
    stacks:["Ipamorelin","BPC-157","TB-500"],
    safety:"Less physiological than pulsatile GHRH protocols. Sustained GH elevation increases long-term risk monitoring burden. Not approved for human use. Clinician involvement recommended." },

  { name:"GHRP-2", aliases:["Growth Hormone Releasing Peptide-2"], sub:"GH secretagogue (ghrelin mimetic)", color:"#9DC8FF", tags:["GH","Recovery","Appetite","Research"], evidence:"investigational",
    overview:"GHRP-2 is a potent synthetic GH secretagogue that strongly stimulates pituitary GH release. More potent than GHRP-6 with less appetite stimulation. Used for GH optimization, recovery, and anti-aging purposes.",
    mechanism:"Binds the ghrelin receptor (GHSR-1a) in the pituitary and hypothalamus, stimulating GH release independent of GHRH. Also increases cortisol and prolactin at higher doses — a key differentiator from peptide-based GHRH analogs.",
    meta:{ dose:"100–300 mcg", freq:"2–3× daily (or once before bed)", route:"SubQ or intranasal", halfLife:"~15–30 min", storage:"Reconstituted: 2–8 °C", cycle:"8–12 weeks" },
    cycleInfo:"Often run in 8–12 week blocks. Stacked with CJC-1295 no DAC or Sermorelin for synergistic GH amplification. 2–3 daily injections maximizes GH pulsatility.",
    timingInfo:"Fasted state for best GH response (avoid carbs/fat 1–2h before and 30 min after). Pre-sleep injection for natural sleep-associated GH pulse.",
    stacks:["CJC-1295 no DAC","Sermorelin","Ipamorelin"],
    safety:"Raises cortisol and prolactin at higher doses — relevant for stress-sensitive individuals. More side effects than Ipamorelin (water retention, tingling, appetite increase). Not approved." },

  { name:"GHRP-6", aliases:["Growth Hormone Releasing Peptide-6"], sub:"GH secretagogue (strong appetite stimulation)", color:"#9DC8FF", tags:["GH","Recovery","Appetite","Research"], evidence:"investigational",
    overview:"GHRP-6 was one of the first synthetic GH secretagogues studied. Effective but notable for causing significant appetite stimulation (via ghrelin mimicry) — which is either a benefit or drawback depending on goals.",
    mechanism:"Binds GHSR-1a, stimulating GH release and strongly increasing appetite. Also stimulates cortisol and prolactin to a degree. Less commonly used now that Ipamorelin and GHRP-2 are available with fewer side effects.",
    meta:{ dose:"100–300 mcg", freq:"2–3× daily", route:"SubQ", halfLife:"~15–30 min", storage:"Reconstituted: 2–8 °C", cycle:"8–12 weeks" },
    cycleInfo:"8–12 week cycles with breaks. Stacked with GHRH analogs. Less often chosen as a primary GH secretagogue now due to appetite side effect, but used intentionally by those who want the appetite stimulus.",
    timingInfo:"Fasted state preferred. Pre-sleep and morning injections most common.",
    stacks:["CJC-1295 no DAC","Sermorelin"],
    safety:"Significant appetite increase is expected and can undermine fat-loss goals. Cortisol/prolactin elevation. Water retention. Not approved for human use." },

  { name:"Hexarelin", aliases:["Examorelin"], sub:"Potent GH secretagogue", color:"#9DC8FF", tags:["GH","Cardiac","Recovery","Research"], evidence:"investigational",
    overview:"Hexarelin is one of the most potent synthetic GHRP-class peptides, stimulating strong GH release. Uniquely, it also has direct cardioprotective properties studied independently of GH. Desensitization with continuous use limits long-term protocols.",
    mechanism:"Binds GHSR-1a with high affinity, producing robust GH release. Also binds cardiac receptors directly (CD36/scavenger receptor), producing anti-fibrotic and cardioprotective effects independent of GH elevation.",
    meta:{ dose:"100–200 mcg", freq:"2× daily (limited duration)", route:"SubQ", halfLife:"~15–30 min", storage:"Reconstituted: 2–8 °C", cycle:"4–6 weeks max" },
    cycleInfo:"Shorter cycles (4–6 weeks) recommended due to desensitization. Receptor downregulation occurs faster than with Ipamorelin. Requires complete off-time before re-running.",
    timingInfo:"Fasted state. Same timing logic as other GHRPs.",
    stacks:["CJC-1295 no DAC","BPC-157"],
    safety:"Desensitization limits utility. Cortisol/prolactin elevation. More potent = more side effect potential. Not approved." },

  { name:"HGH Fragment 176-191", aliases:["HGH Frag 176-191","Fragment 176-191"], sub:"Lipolytic HGH C-terminal fragment", color:"#F9C87D", tags:["Fat Loss","Metabolic","Research"], evidence:"investigational",
    overview:"A truncated fragment of human growth hormone (amino acids 176–191) that retains HGH's fat-burning properties without the growth-promoting or insulin-desensitizing effects of full HGH. Note: AOD-9604 covers residues 177–191 with a slight modification — they're closely related.",
    mechanism:"Stimulates lipolysis via beta-adrenergic pathways without binding the GH receptor or elevating IGF-1. Does not cause glucose dysregulation or tissue proliferation.",
    meta:{ dose:"250–500 mcg/day", freq:"Once or twice daily", route:"SubQ", halfLife:"~30 min", storage:"Reconstituted: 2–8 °C", cycle:"12 weeks" },
    cycleInfo:"Continuous daily use, often in 12-week cycles. Best results with calorie deficit. Works synergistically with GH secretagogues.",
    timingInfo:"Fasted morning and/or pre-workout for maximum lipolytic effect. Avoid post-meal dosing.",

function migrate(d) {
  if (!d) return defaultState();
  const base = defaultState();
  // Forward-migrate: ensure status field on all peptide entries
  const ensureStatus = obj => { Object.keys(obj||{}).forEach(k => { if (!obj[k].status) obj[k].status = "active"; }); };
  ensureStatus(d.peptides); ensureStatus(d.customPeptides);
  const merged = { ...base, ...d,
    settings: { ...base.settings, ...(d.settings||{}) },
    profile:  { ...base.profile,  ...(d.profile||{}) },
    plans: { goals:(d.plans?.goals||[]), research:(d.plans?.research||[]), shopping:(d.plans?.shopping||[]) },
    protocols: d.protocols||[],
    activityLogs: d.activityLogs||[], measurementLogs: d.measurementLogs||[], macroLogs: d.macroLogs||[], supplementLogs: d.supplementLogs||[], supplies: d.supplies||[], equipmentItems: d.equipmentItems||[] };
  // Backfill legacy doses (no kitId) — assign to the kit reconstituted/added earliest for that compound
  const allCompounds = { ...(merged.peptides||{}), ...(merged.customPeptides||{}) };
  Object.entries(allCompounds).forEach(([name, p]) => {
    const legacyDoses = (p.doses||[]).filter(dd=>!dd.kitId);
    if (!legacyDoses.length) return;
    const kits = merged.supplies.filter(s=>s.name===name);
    if (!kits.length) return;
    const target = kits.length===1 ? kits[0]
      : [...kits].sort((a,b)=>new Date(a.reconDate||a.id||0)-new Date(b.reconDate||b.id||0))[0];
    legacyDoses.forEach(dd=>{ dd.kitId = target.id; });
  });
  return merged;
}

// ─── Date helpers ─────────────────────────────────────────────────────────────
// Parse any date string safely — date-only strings get T12:00 to avoid UTC-midnight timezone shift
const safeDate = iso => iso ? (/^\d{4}-\d{2}-\d{2}$/.test(String(iso)) ? new Date(iso+'T12:00:00') : new Date(iso)) : null;
const fmtDate  = iso => iso ? safeDate(iso).toLocaleDateString("en-CA",{month:"short",day:"numeric",year:"numeric"}) : "—";
const fmtShort = iso => iso ? safeDate(iso).toLocaleDateString("en-CA",{month:"short",day:"numeric"}) : "—";
const fmtDT    = iso => iso ? new Date(iso).toLocaleString("en-CA",{month:"short",day:"numeric",hour:"2-digit",minute:"2-digit"}) : "—";
const daysSince = iso => iso ? ((Date.now()-safeDate(iso).getTime())/86400000) : null;
const daysUntil = iso => iso ? ((safeDate(iso).getTime()-Date.now())/86400000) : null;
const addDays   = (iso,n) => { const d=safeDate(iso); d.setDate(d.getDate()+n); return d.getFullYear()+'-'+String(d.getMonth()+1).padStart(2,'0')+'-'+String(d.getDate()).padStart(2,'0'); };
// ─── Shared dose unit normalizer ─────────────────────────────────────────────
// ALL supply/reconstitution math MUST go through this — never use raw parseFloat(d.dose)
function doseToMg(dose, unit) {
  const n = parseFloat(dose || 0);
  if (!n || isNaN(n)) return 0;
  const u = (unit||"mg").toLowerCase().trim();
  if (u === "mcg") return n / 1000;
  if (u === "mg")  return n;
  if (u === "iu")  return n * 0.001;
  return n; // unknown unit — pass through
}

const dayKey = d => {
  // Date-only strings (YYYY-MM-DD) must NOT go through new Date() — that parses as UTC midnight
  // which shifts to the previous day in negative-offset timezones (e.g. Toronto UTC-4/UTC-5)
  if (typeof d === 'string' && /^\d{4}-\d{2}-\d{2}$/.test(d)) return d;
  const dt = new Date(d);
  return dt.getFullYear()+'-'+String(dt.getMonth()+1).padStart(2,'0')+'-'+String(dt.getDate()).padStart(2,'0');
};
// Always returns today's date in LOCAL time (avoids UTC midnight trap)
const localDate = () => { const d=new Date(); return d.getFullYear()+'-'+String(d.getMonth()+1).padStart(2,'0')+'-'+String(d.getDate()).padStart(2,'0'); };
// Local datetime string for datetime-local inputs
const localDatetime = () => { const d=new Date(); return localDate()+'T'+String(d.getHours()).padStart(2,'0')+':'+String(d.getMinutes()).padStart(2,'0'); };
function startOfWeek(d){ const x=new Date(d); x.setHours(0,0,0,0); x.setDate(x.getDate()-x.getDay()); return x; }
const DAY_LABELS=["S","M","T","W","T","F","S"];
