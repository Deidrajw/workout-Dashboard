          <button class="del-batch" data-bid="${esc(b.batchId)}" style="background:#FF7C7C18;border:1px solid #FF7C7C44;color:#FF7C7C;border-radius:7px;padding:5px 12px;font-size:11px">🗑 Delete this batch</button>
        </div>`;
      }).join("")}

      ${legacyEntries.length?`<div class="mono" style="font-size:10px;color:var(--t4);letter-spacing:1px;margin:${batchList.length?"14px":0} 0 8px">LEGACY IMPORTS (no batch tracking)</div>
      <div style="font-size:11px;color:var(--t5);line-height:1.5;margin-bottom:10px">These were imported before batch tracking was added. They can still be deleted by type below.</div>`:""}
      ${legacyEntries.map(([srcType,v])=>`
        <div style="background:var(--surface-2);border:1px solid var(--border-sub);border-radius:10px;padding:12px 14px;margin-bottom:8px;display:flex;align-items:center;gap:10px">
          <div style="flex:1">
            <div style="font-size:12px;font-weight:600;color:var(--t2)">${srcLabel[srcType]||srcType}</div>
            <div style="font-size:11px;color:var(--t4);margin-top:2px">${countStr(v.counts)}</div>
          </div>
          <button class="del-type" data-type="${srcType}" style="background:#FF7C7C18;border:1px solid #FF7C7C44;color:#FF7C7C;border-radius:7px;padding:5px 10px;font-size:11px;white-space:nowrap">🗑 Delete all</button>
        </div>`).join("")}

      ${batchList.length||legacyEntries.length?`<div style="margin-top:14px;border-top:1px solid var(--border-sub);padding-top:14px">
        <div class="mono" style="font-size:10px;color:var(--t4);letter-spacing:1px;margin-bottom:10px">DELETE ALL BY TYPE</div>
        <div style="display:flex;flex-direction:column;gap:8px">
          ${["apple_health_xml","aggregate_csv","workout_csv"].map(t=>`<button class="del-type" data-type="${t}" style="background:var(--surface-2);border:1px solid var(--border);border-radius:8px;padding:9px 14px;font-size:12px;color:var(--t3);text-align:left">🗑 Delete all ${srcLabel[t]} imports</button>`).join("")}
        </div>
      </div>`:""}`;

    body.querySelector("#bp").onclick = pick;
    body.querySelectorAll(".del-batch").forEach(b=>b.onclick=()=>deleteByBatch(b.dataset.bid));
    body.querySelectorAll(".del-type").forEach(b=>b.onclick=()=>deleteByType(b.dataset.type));
  }

  pick();
}

function weightChart(logs, unit, period) {
  let filtered = [...logs].sort((a,b)=>new Date(a.date)-new Date(b.date));
  if (period && period !== "all") {
    const days = period==="1M"?30:period==="3M"?90:180;
    const cutoff = Date.now() - days*86400000;
    filtered = filtered.filter(w=>new Date(w.date).getTime()>=cutoff);
  }
  if(filtered.length<2) return `<div style="color:var(--t4);font-size:12px;text-align:center;padding:16px 0">Log at least 2 weigh-ins to see your trend.</div>`;
  const W=480,H=130,pad=28;
  const xs=filtered.map(d=>new Date(d.date).getTime());
  const ys=filtered.map(d=>parseFloat(d.weight));
  const minX=Math.min(...xs),maxX=Math.max(...xs),minY=Math.min(...ys),maxY=Math.max(...ys),rY=(maxY-minY)||1;
  const px=t=>pad+((t-minX)/((maxX-minX)||1))*(W-pad*2), py=v=>pad+(1-(v-minY)/rY)*(H-pad*2);
  const path=filtered.map((d,i)=>`${i?"L":"M"} ${px(xs[i])} ${py(ys[i])}`).join(" ");
  const first=ys[0],last=ys[ys.length-1],ch=(last-first).toFixed(1);
  const goalW = parseFloat(state.profile.goalWeight||0);
  const distGoal = goalW ? (last-goalW).toFixed(1) : null;
  const weeks = filtered.length>1 ? Math.max(1,(new Date(filtered[filtered.length-1].date)-new Date(filtered[0].date))/86400000/7) : 1;
  const weeklyAvg = filtered.length>1 ? ((last-first)/weeks).toFixed(1) : null;
  return `<div style="display:grid;grid-template-columns:repeat(2,1fr);gap:10px;margin-bottom:12px">
    ${[["CHANGE",(ch>0?"+":"")+ch+" "+unit,ch<=0?"#7DF9C0":"#ff9c5c"],
       ["FROM GOAL",distGoal!=null?(distGoal>0?"+":"")+distGoal+" "+unit:"—",distGoal!=null&&distGoal<=0?"#7DF9C0":"#ff9c5c"],
       ["WEEKLY AVG",weeklyAvg?(weeklyAvg>0?"+":"")+weeklyAvg+" "+unit:"—",weeklyAvg&&weeklyAvg<=0?"#7DF9C0":"#ff9c5c"],
       ["ENTRIES",filtered.length,"#ccc"]].map(([l,v,col])=>`<div style="background:var(--surface);border:1px solid var(--border-sub);border-radius:10px;padding:10px 12px"><div style="font-size:14px;font-weight:700;color:${col}">${v}</div><div class="mono" style="font-size:8px;color:var(--t4);letter-spacing:1.5px;margin-top:3px">${l}</div></div>`).join("")}
  </div>
  <svg viewBox="0 0 ${W} ${H}" style="width:100%;height:auto"><defs><linearGradient id="wg" x1="0" y1="0" x2="0" y2="1"><stop offset="0%" stop-color="#8AB4FF" stop-opacity="0.3"/><stop offset="100%" stop-color="#8AB4FF" stop-opacity="0"/></linearGradient></defs>
    <path d="${path} L ${px(maxX)} ${H-pad} L ${px(minX)} ${H-pad} Z" fill="url(#wg)"/>
    <path d="${path}" fill="none" stroke="#8AB4FF" stroke-width="2" stroke-linejoin="round"/>
    ${filtered.map((d,i)=>`<circle cx="${px(xs[i])}" cy="${py(ys[i])}" r="2.5" fill="#8AB4FF"/>`).join("")}
    ${goalW&&goalW>=minY&&goalW<=maxY?`<line x1="${pad}" y1="${py(goalW)}" x2="${W-pad}" y2="${py(goalW)}" stroke="#7DF9C0" stroke-width="1" stroke-dasharray="4,3" opacity="0.5"/><text x="${W-pad+2}" y="${py(goalW)+4}" fill="#7DF9C0" font-size="8" font-family="monospace">goal</text>`:""}
  </svg>`;
}

  if(logs.length<2||!present.length) return `<div style="color:var(--t4);font-size:12px;text-align:center;padding:20px 0">Log at least 2 measurement entries to see trends.</div>`;

  const xs=s.map(d=>new Date(d.date).getTime()),minX=Math.min(...xs),maxX=Math.max(...xs);
  const vals=s.flatMap(l=>present.map(([k])=>parseFloat(l[k])).filter(v=>!isNaN(v))); const minY=Math.min(...vals),maxY=Math.max(...vals),rY=(maxY-minY)||1;
  const px=t=>pad+((t-minX)/((maxX-minX)||1))*(W-pad*2),py=v=>pad+(1-(v-minY)/rY)*(H-pad*2);

  <div style="display:flex;gap:14px;flex-wrap:wrap;margin-top:8px">${present.map(([k,l,col])=>{const pts=s.filter(x=>x[k]!=null&&x[k]!=="");const ch=(parseFloat(pts[pts.length-1][k])-parseFloat(pts[0][k])).toFixed(1);return `<div style="display:flex;align-items:center;gap:6px"><span style="width:10px;height:3px;background:${col};border-radius:2px;display:inline-block"></span><span style="font-size:11px;color:var(--t3)">${l} <b style="color:${ch<=0?"#7DF9C0":"#ff9c5c"}">${ch>0?"+":""}${ch} ${unit}</b></span></div>`;}).join("")}</div>`;
}
function escalationChart(doses, c) {
  const e=doses.filter(d=>d.dose).sort((a,b)=>new Date(a.date)-new Date(b.date));
  if(!e.length) return `<div style="color:var(--t4);font-size:12px;text-align:center;padding:12px 0">No doses logged yet.</div>`;
  const max=Math.max(...e.map(d=>parseFloat(d.dose))); const bw=Math.max(22,Math.min(46,Math.floor(280/e.length)));
  return `<div style="display:flex;align-items:flex-end;gap:4px;height:80px;padding-top:14px;overflow-x:auto">${e.map(d=>{const h=Math.max(4,(parseFloat(d.dose)/max)*62);return `<div style="display:flex;flex-direction:column;align-items:center;gap:2px;flex-shrink:0"><div class="mono" style="font-size:9px;color:${c.color}">${esc(d.dose)}</div><div style="width:${bw}px;height:${h}px;border-radius:4px 4px 0 0;background:${d.escalation?`linear-gradient(180deg,${c.color},${c.color}88)`:c.color+"55"}"></div></div>`;}).join("")}</div>`;
}
function supplementCorrelation(compoundName, doses, suppLogs, dailyLogs) {
  if(!suppLogs.length || !dailyLogs.length) return "";
  // Find all supplements logged while this compound was active
  if(!doses.length) return "";
  const firstDoseDate = [...doses].sort((a,b)=>safeDate(a.date)-safeDate(b.date))[0].date;
  // Supplement adherence days
  const suppDays = new Set(suppLogs.map(s=>dayKey(s.date)));
  // Build: for each supplement, compare symptom rates on days taken vs not taken
  const allSupps = [...new Set(suppLogs.flatMap(s=>s.taken||[]))];
  if(!allSupps.length) return "";
  // Get symptom logs after protocol start
  const logs = dailyLogs.filter(l=>dayKey(l.date)>=dayKey(firstDoseDate));
  if(logs.length < 3) return "";
  const rows = allSupps.map(supp=>{
    const takenDays = suppLogs.filter(s=>(s.taken||[]).includes(supp)).map(s=>dayKey(s.date));
    const takenSet = new Set(takenDays);
    const logsWithSupp = logs.filter(l=>takenSet.has(dayKey(l.date)));
    const logsWithout  = logs.filter(l=>!takenSet.has(dayKey(l.date)));
    if(!logsWithSupp.length||!logsWithout.length) return null;
    // Count symptom occurrences per day
    const symRate = arr => {
      const total = arr.reduce((a,l)=>(a+(l.symptoms||[]).length),0);
      return arr.length ? (total/arr.length).toFixed(1) : "0";
    };
    const rateWith = symRate(logsWithSupp);
    const rateWithout = symRate(logsWithout);
    const diff = (parseFloat(rateWith)-parseFloat(rateWithout)).toFixed(1);
    const better = parseFloat(diff) < 0;
    return {supp, rateWith, rateWithout, diff, better, days:takenDays.length};
  }).filter(Boolean);
  if(!rows.length) return "";
  return `<div>
    <div style="font-size:10px;color:var(--t5);margin-bottom:10px">Avg symptoms/day: taken vs not taken</div>
    ${rows.map(r=>`<div style="display:flex;align-items:center;gap:10px;padding:8px 0;border-bottom:1px solid var(--surface-2)">
      <div style="flex:1;font-size:12px;color:var(--t2)">💊 ${esc(r.supp)}</div>
      <div style="font-size:11px;color:var(--t4)">${r.days}d logged</div>
      <div style="font-size:11px;color:#C8FF9C">With: ${r.rateWith}</div>
      <div style="font-size:11px;color:var(--t4)">Without: ${r.rateWithout}</div>
      <div style="font-size:11px;font-weight:700;color:${r.better?"#7DF9C0":"#ff7c7c"}">${r.better?"↓":"↑"}${Math.abs(parseFloat(r.diff))}</div>
    </div>`).join("")}
    <div style="font-size:10px;color:var(--t5);margin-top:8px">↓ fewer symptoms on days taken · ↑ more symptoms</div>
  </div>`;
}

function activityChart(activityLogs, doses, color) {
  if(activityLogs.length<3) return `<div style="color:var(--t4);font-size:12px;text-align:center;padding:12px 0">Import Apple Health step data to see activity patterns across your dose cycle.</div>`;
  // Exclude workout sessions — daily aggregate only for phase analysis
  const recent=[...activityLogs].filter(a=>!a.isWorkout).sort((a,b)=>new Date(a.date)-new Date(b.date)).slice(-90);
  const hasSteps=recent.some(a=>a.steps);
  if(!hasSteps) return `<div style="color:var(--t4);font-size:12px;text-align:center;padding:12px 0">No step data found. Enable step tracking in Apple Health and re-import.</div>`;

  // ── Phase bucketing ────────────────────────────────────────────────────────
  const sortedDoses=[...doses].sort((a,b)=>new Date(a.date)-new Date(b.date));
  const buckets={dose:[],peak:[],cruise:[],wearoff:[]};
  recent.forEach(log=>{
    if(!log.steps) return;
    const logT=new Date(log.date).getTime();
    const prev=sortedDoses.filter(d=>new Date(d.date).getTime()<=logT);
    if(!prev.length) return;
    const last=prev[prev.length-1];
    const ds=(logT-new Date(last.date).getTime())/86400000;
    if(ds<0||ds>14) return;
    if(ds<=1)        buckets.dose.push(log.steps);
    else if(ds<=3)   buckets.peak.push(log.steps);
    else if(ds<=5.5) buckets.cruise.push(log.steps);
    else             buckets.wearoff.push(log.steps);
  });
  const avg=arr=>arr.length?Math.round(arr.reduce((a,b)=>a+b,0)/arr.length):null;
  const doseAvg=avg(buckets.dose), peakAvg=avg(buckets.peak), cruiseAvg=avg(buckets.cruise), wearAvg=avg(buckets.wearoff);
  const fmt=n=>n!=null?n.toLocaleString():"—";

  // ── Pattern detection ──────────────────────────────────────────────────────
  const allAvgs=[doseAvg,peakAvg,cruiseAvg,wearAvg].filter(v=>v!=null);
  const overallAvg=allAvgs.length?Math.round(allAvgs.reduce((a,b)=>a+b,0)/allAvgs.length):null;
  let interpretation="";
  const hasSufficient=allAvgs.length>=3&&(buckets.dose.length+buckets.peak.length+buckets.cruise.length+buckets.wearoff.length)>=10;
  if(!hasSufficient){
    interpretation=`<div style="background:var(--surface-2);border:1px solid var(--border-sub);border-radius:10px;padding:12px 14px;margin-bottom:12px;font-size:12px;color:var(--t4);line-height:1.6">Not enough phase data yet. Log more dose cycles with step tracking to detect a pattern.</div>`;
  } else {
    const minPhase=[["Dose day",doseAvg],["Peak (Days 1–3)",peakAvg],["Cruise (Days 3–5)",cruiseAvg],["Wear-off (Day 5+)",wearAvg]].filter(([,v])=>v!=null).sort((a,b)=>a[1]-b[1])[0];
    const maxPhase=[["Dose day",doseAvg],["Peak (Days 1–3)",peakAvg],["Cruise (Days 3–5)",cruiseAvg],["Wear-off (Day 5+)",wearAvg]].filter(([,v])=>v!=null).sort((a,b)=>b[1]-a[1])[0];
    const spread=maxPhase[1]-minPhase[1];
    const pct=overallAvg>0?Math.round(spread/overallAvg*100):0;
    let msg="";
    if(pct<15){
      msg=`Activity is <b style="color:#7DF9C0">stable across your dose cycle</b> — no consistent phase-linked step pattern detected.`;
    } else if(doseAvg!=null&&doseAvg===minPhase[1]){
      msg=`Steps are lowest on <b style="color:#F9C87D">dose day</b> (~${fmt(doseAvg)}) — ${pct}% below your cycle average. This may reflect intentional rest after injection.`;
    } else if(wearAvg!=null&&wearAvg===minPhase[1]){
      msg=`Steps are lowest during <b style="color:#FF7C7C">wear-off (Day 5+)</b> (~${fmt(wearAvg)}) — ${pct}% below your highest phase. Lower energy as levels drop is a common pattern.`;
    } else {
      msg=`Highest steps during <b style="color:${color}">${maxPhase[0]}</b> (~${fmt(maxPhase[1])}), lowest during <b>${minPhase[0]}</b> (~${fmt(minPhase[1])}). ${pct}% spread across the cycle.`;
    }
    interpretation=`<div style="background:${color}10;border:1px solid ${color}33;border-radius:10px;padding:12px 14px;margin-bottom:12px">
      <div style="font-size:12px;color:var(--t2);line-height:1.6;margin-bottom:8px">${msg}</div>
      <div style="display:flex;gap:8px;flex-wrap:wrap">
        ${[["💉 Dose",doseAvg,"#A78BFA"],["⚡ Peak",peakAvg,color],["🛤 Cruise",cruiseAvg,"#7DF9C0"],["📉 Wear-off",wearAvg,"#FF7C7C"]].map(([l,v,c2])=>v!=null?`<div style="flex:1;min-width:72px;background:var(--surface-2);border-radius:8px;padding:7px 10px;text-align:center"><div style="font-size:9px;color:var(--t4);margin-bottom:3px">${l}</div><div style="font-size:13px;font-weight:700;color:${c2}">${fmt(v)}</div><div style="font-size:9px;color:var(--t5)">avg steps</div></div>`:"").join("")}
      </div>
    </div>`;
  }

  // ── Chart (unchanged visual, interpretation above) ─────────────────────────
  const W=480,H=90,padL=8;
  const xs=recent.map(d=>new Date(d.date).getTime()),minX=Math.min(...xs),maxX=Math.max(...xs);
  const px=t=>padL+((t-minX)/((maxX-minX)||1))*(W-padL*2);
  const maxStep=Math.max(...recent.map(a=>a.steps||0))||1;
  const path=recent.filter(a=>a.steps).map((a,i)=>`${i?"L":"M"} ${px(new Date(a.date).getTime())} ${padL+(1-a.steps/maxStep)*(H-padL*2)}`).join(" ");
  const dl=(doses||[]).filter(d=>{const t=new Date(d.date).getTime();return t>=minX&&t<=maxX;});
  return interpretation+`<svg viewBox="0 0 ${W} ${H}" style="width:100%;height:auto">${dl.map(d=>{const x=px(new Date(d.date).getTime());return `<line x1="${x}" y1="0" x2="${x}" y2="${H}" stroke="${color}" stroke-width="1.5" stroke-dasharray="3,3" opacity="0.6"/>`;}).join("")}<path d="${path}" fill="none" stroke="#7DF9C0" stroke-width="1.5" stroke-linejoin="round" opacity="0.85"/></svg>
  <div style="display:flex;gap:14px;margin-top:6px"><div style="display:flex;align-items:center;gap:5px"><span style="width:16px;height:2px;background:#7DF9C0;display:inline-block;border-radius:1px"></span><span style="font-size:11px;color:var(--t3)">Steps (90 days)</span></div><div style="display:flex;align-items:center;gap:5px"><span style="font-size:10px">💉</span><span style="font-size:11px;color:var(--t3)">Injection</span></div></div>`;
}


function analyzeTrough(dailyLogs, doses, returnSymptoms) {
  if (!doses.length || !dailyLogs.length) return [];
  const sorted = [...doses].sort((a,b)=>new Date(a.date)-new Date(b.date));
  const results = [];
  dailyLogs.forEach(log => {
    const logDate = new Date(log.date);
    const prevDoses = sorted.filter(d=>new Date(d.date)<=logDate);
    if (!prevDoses.length) return;
    const lastDose = prevDoses[prevDoses.length-1];
    const doseIdx = sorted.indexOf(lastDose); // track which cycle this belongs to
    const daysSince = (logDate-new Date(lastDose.date))/86400000;
    if (daysSince<0||daysSince>14) return;
    const allSyms = log.symptoms||[];
    const matching = returnSymptoms ? allSyms.filter(s=>{const n=typeof s==="string"?s:s.name; return returnSymptoms.some(rs=>n.toLowerCase().includes(rs.toLowerCase()));}) : allSyms;
    if (matching.length) results.push({day:Math.round(daysSince*2)/2, symptoms:matching, logDate:log.date, doseIdx});
  });
  return results;
}

function troughHTML(data, scheduleDays, color, troughDay) {
  const MIN_CYCLES = 3;
  const distinctCycles = new Set((data||[]).map(r=>r.doseIdx)).size;

  // ── Not enough data ────────────────────────────────────────────────────────
  if (!data.length || distinctCycles < MIN_CYCLES) {
    const cycleWord = distinctCycles === 1 ? "1 dose cycle" : `${distinctCycles} dose cycles`;
    return `
      <div style="background:var(--surface-2);border:1px solid var(--border-sub);border-radius:10px;padding:14px 16px;margin-bottom:10px">
        <div style="font-size:13px;font-weight:600;color:var(--t2);margin-bottom:6px">Not enough trough data yet</div>
        <div style="font-size:12px;color:var(--t4);line-height:1.6">
          ${data.length===0
            ? "No return symptoms logged yet."
            : `${data.length} event${data.length>1?"s":""} logged across ${cycleWord} — need at least ${MIN_CYCLES} to detect a pattern.`}
          <br>Log daily check-ins and tag symptoms like <b style="color:${color}">appetite return</b>, <b style="color:${color}">food noise</b>, <b style="color:${color}">cravings</b>, or <b style="color:${color}">fatigue</b> across ${MIN_CYCLES}+ dose cycles.
        </div>
        <div style="font-size:10px;color:var(--t5);margin-top:10px;line-height:1.5">Trough Analysis shows when wear-off symptoms typically return in your cycle — helping you assess whether your schedule is well-timed.</div>
      </div>`;
  }

  // ── Enough data — compute statistics ─────────────────────────────────────
  const days = data.map(r=>r.day);
  const avgDay = days.reduce((a,b)=>a+b,0)/days.length;
  const minDay = Math.min(...days);
  const maxDay = Math.max(...days);
  const variance = days.reduce((a,b)=>a+(b-avgDay)**2,0)/days.length;
  const stdDev = Math.sqrt(variance);
  const wearOffDays = Math.max(0, scheduleDays - avgDay);

  // Interpretation
  let interp, interpColor;
  if (wearOffDays >= 2) {
    interp = `Wear-off symptoms return around <b style="color:${color}">Day ${avgDay.toFixed(1)}</b> on average — leaving roughly <b style="color:#FF7C7C">${wearOffDays.toFixed(1)} days</b> of wear-off before your next dose.`;
    interpColor = "#FF7C7C";
  } else if (wearOffDays >= 0.5) {
    interp = `Return symptoms appear close to your next dose (~Day ${avgDay.toFixed(1)}). Your ${scheduleDays}-day schedule appears reasonably timed.`;
    interpColor = "#F9C87D";
  } else {
    interp = `Return symptoms occur at or after your scheduled dose day. Timing appears well-controlled.`;
    interpColor = "#7DF9C0";
  }

  // Bar chart data
  const bins={};
  data.forEach(({day})=>{bins[day]=(bins[day]||0)+1;});
  const maxBin = Math.max(...Object.values(bins));
  const totalDays = Math.ceil(scheduleDays);

  // Phase zone boundaries (approximate)
  const peakEnd = Math.min(3, troughDay ? troughDay*0.4 : 3);
  const cruiseEnd = troughDay ? troughDay-0.5 : scheduleDays*0.7;
  const returnStart = Math.floor(minDay);

  const chartBars = [...Array(totalDays+1)].map((_,i)=>{
    const cnt = bins[i]||0;
    const h = cnt ? Math.max(10,Math.round(cnt/maxBin*52)) : 0;
    const inWindow = i>=returnStart && i<=Math.ceil(maxDay);
    const barColor = cnt ? (inWindow ? color : color+"88") : "transparent";
    const dayLabel = i===0?"💉":String(i);
    const isAvg = Math.abs(i-Math.round(avgDay))<0.6;
    return `<div style="display:flex;flex-direction:column;align-items:center;gap:2px;min-width:20px;flex:1">
      ${cnt
        ? `<div style="width:14px;height:${h}px;background:${barColor};border-radius:3px 3px 0 0;${isAvg?`box-shadow:0 0 8px ${color}88`:""};transition:height 0.3s"></div>`
        : `<div style="width:14px;height:4px"></div>`}
      <div class="mono" style="font-size:8px;color:${isAvg?color:cnt?"var(--t3)":"var(--t5)"};font-weight:${isAvg?"700":"400"}">${dayLabel}</div>
    </div>`;
  }).join("");

  // Typical return window highlight bar
  const windowPct = totalDays>0 ? ((maxDay-minDay)/totalDays*100).toFixed(1) : 0;
  const windowLeft = totalDays>0 ? (minDay/totalDays*100).toFixed(1) : 0;

  return `
    <div style="background:${color}10;border:1px solid ${color}33;border-radius:10px;padding:12px 14px;margin-bottom:12px">
      <div style="font-size:12px;color:var(--t2);line-height:1.6;margin-bottom:4px">${interp}</div>
      <div style="font-size:10px;color:var(--t4)">Based on <b>${distinctCycles}</b> dose cycles · ${days.length} logged events · ±${stdDev.toFixed(1)}d spread</div>
    </div>
    <div style="position:relative;margin-bottom:4px">
      <div style="display:flex;align-items:flex-end;height:70px;padding-top:14px;gap:0">${chartBars}</div>
      ${wearOffDays>=1?`<div style="position:absolute;top:0;right:0;font-size:9px;color:#FF7C7C;opacity:0.8">⚠ wear-off zone</div>`:""}
    </div>
    <div style="display:flex;gap:12px;flex-wrap:wrap;margin-top:8px">
      <div style="display:flex;align-items:center;gap:5px"><div style="width:10px;height:10px;border-radius:2px;background:${color}"></div><span style="font-size:10px;color:var(--t4)">Return event</span></div>
      <div style="display:flex;align-items:center;gap:5px"><span style="font-size:10px">💉</span><span style="font-size:10px;color:var(--t4)">Dose day (Day 0)</span></div>
      <div style="display:flex;align-items:center;gap:5px"><span style="font-size:10px;color:var(--t4)">Bold day = avg return</span></div>
    </div>
    <div style="font-size:10px;color:var(--t5);margin-top:10px;line-height:1.5">⚕ Pattern analysis only. Discuss schedule adjustments with your clinician.</div>`;
}

// ─── Escalation Readiness ────────────────────────────────────────────────────
function escalationReadiness(name, data) {
  const doses = [...(data.doses||[])].sort((a,b)=>new Date(a.date)-new Date(b.date));
  if (doses.length < 2) return null;
  const c = cfg(name);
  // Weeks at current dose (since last escalation or start)
  const lastEscIdx = [...doses].reverse().findIndex(d=>d.escalation);
  const currentStart = lastEscIdx >= 0 ? doses[doses.length-1-lastEscIdx] : doses[0];
  const weeksAtDose = (Date.now()-new Date(currentStart.date).getTime()) / (7*86400000);
  const currentDose = parseFloat([...doses].reverse()[0].dose||0);
  // Recent logs tagged to this compound (last 14 days)
  const recentLogs = state.dailyLogs.filter(l=>{
    return (Date.now()-new Date(l.date).getTime()) < 14*86400000 && (l.compound===name||!l.compound);
  });
  const SEVERE = ["Nausea","Vomiting","Diarrhea","Heartburn / reflux"];
  const severeCount = recentLogs.reduce((acc,l)=>{
    return acc + (l.symptoms||[]).filter(s=>{
      const nm=typeof s==="string"?s:s.name, intensity=typeof s==="string"?1:(s.intensity||1);
      return SEVERE.some(sv=>nm.includes(sv)) && intensity>=2;
    }).length;
  },0);
  const troughData = analyzeTrough(state.dailyLogs, doses, c.returnSymptoms||[]);
  const hasTrough = troughData.length >= 2;
  // Signal logic
  if (weeksAtDose < 3 || severeCount >= 3) {
    return { signal:"not_ready", color:"#ff7c7c", label:"Not Ready", icon:"🔴",
      detail: severeCount>=3 ? "Frequent high-intensity side effects in the past 2 weeks — your body is still adjusting." : `Only ${weeksAtDose.toFixed(1)} weeks at this dose. Most protocols suggest at least 3–4 weeks before considering an increase.`,
      weeksAtDose, currentDose };
  }
  if (weeksAtDose >= 4 && severeCount === 0) {
    return { signal:"may_be_ready", color:"#7DF9C0", label:"May Be Ready", icon:"🟢",
      detail: `${weeksAtDose.toFixed(1)} weeks at ${currentDose} ${c.unit} with manageable side effects.${hasTrough?" Trough symptoms suggest appetite is returning before your next shot — a common signal for escalation consideration.":""} Always confirm with your clinician.`,
      weeksAtDose, currentDose };
  }
  return { signal:"getting_there", color:"#F9C87D", label:"Getting There", icon:"🟡",
    detail: `${weeksAtDose.toFixed(1)} weeks at ${currentDose} ${c.unit}. Aim for 4+ weeks minimum. ${severeCount>0?`${severeCount} high-intensity side effects in the past 2 weeks — let those settle first.`:"Side effects appear manageable — keep monitoring."}`,
    weeksAtDose, currentDose };
}

function escalationCard(name, data) {
  const r = escalationReadiness(name, data);
  if (!r) return "";
  return `<div style="background:${r.color}0f;border:1px solid ${r.color}33;border-radius:12px;padding:14px 16px">
    <div style="display:flex;align-items:center;gap:10px;margin-bottom:8px">
      <span style="font-size:16px">${r.icon}</span>
      <span style="font-size:13px;font-weight:600;color:${r.color}">${r.label}</span>
      <span class="mono" style="font-size:10px;color:var(--t4);margin-left:auto">${r.weeksAtDose.toFixed(1)}w at dose</span>
    </div>
    <div style="font-size:12px;color:var(--t3);line-height:1.55">${r.detail}</div>

// ─── Site Rotation Warning ────────────────────────────────────────────────────
function siteRotationWarning(doses) {
  const recent = [...doses].sort((a,b)=>new Date(b.date)-new Date(a.date)).slice(0,6).filter(d=>d.site);
  if (recent.length < 3) return null;
  const lastSite = recent[0].site;
  const consecutive = recent.findIndex(d=>d.site!==lastSite);
  const countInLast5 = recent.slice(0,5).filter(d=>d.site===lastSite).length;
  if (consecutive === -1 || consecutive >= 3 || countInLast5 >= 3) {
    return { site:lastSite, consecutive: consecutive===-1?recent.length:consecutive, countInLast5 };
  }
  return null;
}

// ─── Body Recomposition ──────────────────────────────────────────────────────
function recompSection(weightLogs, measurementLogs, unit, munit) {
  const wSorted = [...weightLogs].sort((a,b)=>new Date(a.date)-new Date(b.date));
  const mSorted = [...measurementLogs].sort((a,b)=>new Date(a.date)-new Date(b.date));
  if (wSorted.length < 2 && mSorted.length < 2) return "";
  const wFirst=wSorted.length>=2?parseFloat(wSorted[0].weight):null;
  const wLast =wSorted.length>=2?parseFloat(wSorted[wSorted.length-1].weight):null;
  const wPct  = wFirst&&wLast ? ((wLast-wFirst)/wFirst*100) : null;
  const waistFirst = mSorted.length>=2&&mSorted[0].waist   ? parseFloat(mSorted[0].waist)   : null;
  const waistLast  = mSorted.length>=2&&mSorted[mSorted.length-1].waist ? parseFloat(mSorted[mSorted.length-1].waist) : null;
  const waistPct = waistFirst&&waistLast ? ((waistLast-waistFirst)/waistFirst*100) : null;
  if (wPct===null && waistPct===null) return "";
  // Recomp signal: waist shrinking faster than weight loss = body composition improving
  let recompSignal = null;
  if (wPct!==null && waistPct!==null) {
    if (waistPct < 0 && (wPct >= -1 || waistPct < wPct)) {
      recompSignal = { label:"Recomping ✓", color:"#7DF9C0", detail:"Your waist is shrinking faster than your weight is dropping — a sign you're losing fat while preserving or gaining muscle." };
    } else if (wPct < -2 && waistPct < 0) {
      recompSignal = { label:"Fat Loss ↓", color:"#8AB4FF", detail:"Both weight and waist are declining together — solid fat loss progress." };
    } else if (wPct < -0.5 && waistPct===null) {
      recompSignal = { label:"Weight Trending Down ↓", color:"#8AB4FF", detail:"Add measurement logs to track body composition, not just scale weight." };
    }
  }
  const statBox = (label, value, color) => `<div style="background:var(--surface);border:1px solid var(--border-sub);border-radius:10px;padding:10px 12px;text-align:center"><div style="font-size:16px;font-weight:700;color:${color}">${value}</div><div class="mono" style="font-size:8px;color:var(--t4);letter-spacing:1.5px;margin-top:3px">${label}</div></div>`;
  return `<div style="margin-top:18px;padding-top:14px;border-top:1px solid var(--border-sub)">
    <div class="mono" style="font-size:10px;color:var(--t4);letter-spacing:2px;margin-bottom:12px">BODY RECOMPOSITION</div>
    <div style="display:grid;grid-template-columns:repeat(${wPct!==null&&waistPct!==null?2:1},1fr);gap:10px;margin-bottom:${recompSignal?12:0}px">
      ${wPct!==null?statBox("WEIGHT CHANGE",(wPct>0?"+":"")+wPct.toFixed(1)+"%",wPct<=0?"#7DF9C0":"#ff9c5c"):""}
      ${waistPct!==null?statBox("WAIST CHANGE",(waistPct>0?"+":"")+waistPct.toFixed(1)+"%",waistPct<=0?"#7DF9C0":"#ff9c5c"):""}
    </div>
    ${recompSignal?`<div style="background:${recompSignal.color}11;border:1px solid ${recompSignal.color}33;border-radius:10px;padding:12px 14px">
      <div style="font-size:13px;font-weight:600;color:${recompSignal.color};margin-bottom:4px">${recompSignal.label}</div>
      <div style="font-size:12px;color:var(--t3);line-height:1.5">${recompSignal.detail}</div>
    </div>`:""}
    <div style="font-size:11px;color:var(--t4);margin-top:10px;line-height:1.5">The scale is only part of the story on a triple-agonist. Waist and glute measurements are the honest signal for body composition change.</div>
  </div>`;
}

    <div style="margin-bottom:14px"></div>`:""}

    ${moodObj?`<div class="mono" style="font-size:9px;color:var(--t4);letter-spacing:2px;margin-bottom:8px">MOOD</div>
    <div style="display:flex;align-items:center;gap:10px;margin-bottom:14px;padding:10px 14px;background:var(--surface-2);border-radius:10px">
      <span style="font-size:28px">${moodObj.emoji}</span>
      <div><div style="font-size:14px;color:${moodObj.color};font-weight:600">${moodObj.label}</div><div style="font-size:11px;color:var(--t4)">Average over ${weekLogs.length} check-in${weekLogs.length===1?"":"s"}</div></div>
    </div>`:""}

    ${topSyms.length?`<div class="mono" style="font-size:9px;color:var(--t4);letter-spacing:2px;margin-bottom:8px">TOP SYMPTOMS</div>
    <div style="display:flex;gap:6px;flex-wrap:wrap;margin-bottom:18px">
      ${topSyms.map(([n,c])=>`<span class="pill" style="background:var(--surface-2);color:var(--t3);border:1px solid var(--border)">${esc(n)} ×${c}</span>`).join("")}
    </div>`:""}

    <button id="copydigest" class="btn-primary" style="background:#A78BFA;margin-bottom:8px">📋 Copy for Clinician</button>
    <div style="font-size:10px;color:var(--t4);text-align:center">Copies a plain-text summary to your clipboard</div>
  `, "#A78BFA");
  m.querySelector("#x").onclick = closeModal;
  m.querySelector("#copydigest").onclick = () => {
    navigator.clipboard.writeText(plainText).then(()=>{
      const btn = m.querySelector("#copydigest");
      btn.textContent = "✓ Copied!";
      setTimeout(()=>{ btn.textContent = "📋 Copy for Clinician"; }, 2000);
    }).catch(()=>{ alert("Copy failed — try manually selecting the text."); });
  };
}

// ─── Shared dose status helper — single source of truth for all dose status displays ──
function getDoseStatus(name, data) {
  const today = localDate();
  const nowMs = Date.now();
  const graceMs = (state.settings.graceHours||3)*3600000;
  const schedule = data.scheduleDays||7;
  const sorted = [...(data.doses||[])].sort((a,b)=>new Date(a.date)-new Date(b.date));
  const last = sorted[sorted.length-1];
  const c2 = cfg(name);
  const fmtT = dt=>dt.toLocaleTimeString("en-CA",{hour:"numeric",minute:"2-digit"});
  const sl = s=>s===1?"daily":s===7?"weekly":s===14?"every 2 wks":`every ${s}d`;
  if(!last) return {status:"no_doses",label:"No doses logged",color:"var(--t5)",showLogBtn:false,left:null,nextDueMs:null,nextDueStr:null,lastDoseMs:null};
  if(schedule===1){
    const lastMs=new Date(last.date).getTime(), nextMs=lastMs+86400000;
    const nextDate=new Date(nextMs), nextDk=dayKey(nextDate);
    const leftDays=(nextMs-nowMs)/86400000;
    if(dayKey(last.date)===today) return {status:"taken_today",label:"Taken "+fmtT(new Date(last.date)),color:c2.color,showLogBtn:false,left:leftDays,nextDueMs:nextMs,nextDueStr:nextDk,lastDoseMs:lastMs};
    if(nowMs>=nextMs+graceMs){const h=Math.round((nowMs-nextMs)/3600000);return {status:"overdue",label:`Overdue · ${h}h late`,color:"#FF7C7C",showLogBtn:true,left:leftDays,nextDueMs:nextMs,nextDueStr:nextDk,lastDoseMs:lastMs,hoursLate:h};}
    if(nowMs>=nextMs) return {status:"due_now",label:`Due now · ${sl(schedule)}`,color:"#F9C87D",showLogBtn:true,left:leftDays,nextDueMs:nextMs,nextDueStr:nextDk,lastDoseMs:lastMs};
    if(nextDk===today){const h=nextDate.getHours();return {status:"due_later_today",label:`${h>=18?"Due tonight":"Due at"} ${fmtT(nextDate)} · ${sl(schedule)}`,color:"var(--t3)",showLogBtn:false,left:leftDays,nextDueMs:nextMs,nextDueStr:nextDk,lastDoseMs:lastMs};}
    return {status:"upcoming",label:`Due tomorrow · ${sl(schedule)}`,color:"var(--t4)",showLogBtn:false,left:leftDays,nextDueMs:nextMs,nextDueStr:nextDk,lastDoseMs:lastMs};
  } else {
    const nextDueStr=addDays(dayKey(last.date),schedule);
    const leftDays=(safeDate(nextDueStr).getTime()-nowMs)/86400000;
    const lastMs=new Date(last.date).getTime();
    if(dayKey(last.date)===today) return {status:"taken_today",label:"Taken "+fmtT(new Date(last.date)),color:c2.color,showLogBtn:false,left:leftDays,nextDueMs:null,nextDueStr,lastDoseMs:lastMs};
    if(nextDueStr<today){const d=Math.round(daysSince(nextDueStr))||1;return {status:"overdue",label:`Overdue · ${d}d past due`,color:"#FF7C7C",showLogBtn:true,left:leftDays,nextDueMs:null,nextDueStr,lastDoseMs:lastMs,daysLate:d};}
    if(nextDueStr===today) return {status:"due_now",label:`Due today · ${sl(schedule)}`,color:"#F9C87D",showLogBtn:true,left:leftDays,nextDueMs:null,nextDueStr,lastDoseMs:lastMs};
    if(nextDueStr===addDays(today,1)) return {status:"upcoming",label:`Due tomorrow · ${sl(schedule)}`,color:"var(--t3)",showLogBtn:false,left:leftDays,nextDueMs:null,nextDueStr,lastDoseMs:lastMs};
    return {status:"upcoming",label:`Next dose ${fmtDate(nextDueStr)} · ${sl(schedule)}`,color:"var(--t4)",showLogBtn:false,left:leftDays,nextDueMs:null,nextDueStr,lastDoseMs:lastMs,daysUntil:Math.ceil(leftDays)};
  }
}

  const firstDose = doses.length ? doses[doses.length-1] : null;

  );
  const protocolStart = compProtocol?.startDate

  const siteWarn = siteRotationWarning(doses);
  const escalation = escalationReadiness(name, data);
  let ring = "";
  if (left !== null) {

    const ringColor=od?"#ff4d4d":c.color;

      <button class="archivepep" data-name="${esc(name)}" title="Remove from Home" style="color:var(--t5);font-size:16px;padding:2px 6px;border-radius:6px;border:1px solid var(--border-sub);margin-left:4px">✕</button>
    </div>
    <div style="display:flex;gap:14px;margin-bottom:14px;flex-wrap:wrap">${ring}<div style="flex:1;display:flex;flex-direction:column;gap:8px;justify-content:center;min-width:170px">
      <div style="display:flex;gap:16px;flex-wrap:wrap">${(()=>{const nextDueDisplay=doseStatus.nextDueStr?fmtShort(doseStatus.nextDueStr):doseStatus.nextDueMs?fmtShort(new Date(doseStatus.nextDueMs)):"—";return [["LAST",last?fmtShort(last.date):"—"],["SINCE",since!=null?(Math.round(since*10)/10)+"d":"—"],["NEXT",nextDueDisplay],["DOSES",doses.length],...(protocolDays!==null?[["ON PROTOCOL",protocolDays+"d"]]:[])]})().map(([l,v])=>`<div><div class="mono" style="font-size:9px;color:var(--t4);letter-spacing:1.5px">${l}</div><div style="font-size:14px;color:var(--t2);font-weight:600;margin-top:2px">${v}</div></div>`).join("")}</div>
      ${last&&last.dose?`<div style="font-size:11px;color:var(--t4)">Last: <span style="color:${c.color}">${esc(last.dose)} ${c.unit}</span>${last.site?` · ${esc(last.site)}`:""}</div>`:""}
    </div></div>
    ${currentPh&&!trough&&!sensitivityWindow?`<div style="background:${currentPh.color}0d;border:1px solid ${currentPh.color}33;border-radius:8px;padding:8px 12px;margin-bottom:12px;font-size:12px;color:${currentPh.color}">${
      currentPh.id==="activation"  ? `⚡ Activation — compound is absorbing. Plasma levels rising from zero. No strong effects yet; any sensation at the injection site is normal.` :
      currentPh.id==="rising"      ? `📈 Taking Effect — levels building toward peak. Appetite suppression and food noise quieting typically begin here. Log what you notice — this is your baseline.` :
      currentPh.id==="peak"        ? `🎯 Peak Effect — estimated peak concentration. Appetite suppression and food noise at their strongest. Metabolic rate most elevated above baseline. Avoid undereating.` :
      currentPh.id==="cruise"      ? `🛳 Cruise Phase — levels stable near peak, effects consistent. This is your steadiest window — good time to assess how you feel at this dose.` :
      currentPh.label
    }</div>`:""}
    ${sensitivityWindow?`<div style="background:${c.color}0d;border:1px solid ${c.color}33;border-radius:8px;padding:8px 12px;margin-bottom:12px;font-size:12px;color:${c.color}">💡 Day ${Math.floor(since)+1} — still at or near peak plasma levels, but this is your noted sensitivity window. Log any appetite or food noise changes — this is your highest-value comparison data.</div>`:""}
    ${trough?`<div style="background:#ff8c0011;border:1px solid #ff8c0033;border-radius:8px;padding:8px 12px;margin-bottom:12px;font-size:12px;color:#ff8c00">📉 Day ${Math.floor(since)+1} — plasma levels are falling (winding down phase). Appetite and food noise may be returning. Log symptoms to build your trough pattern.</div>`:""}

    </div>
    <div style="font-size:10px;color:var(--t4);text-align:center;margin-top:4px">Tap a dose to see what happened after it</div>
  </div>`;

function siteTrackerSection(name, doses) {
  if(!doses.length) return `<div style="color:var(--t4);font-size:12px;text-align:center;padding:12px 0">No doses logged yet.</div>`;
  const c=cfg(name);
  const counts={};
  doses.forEach(d=>{ if(d.site){counts[d.site]=(counts[d.site]||0)+1;} });
  const entries=Object.entries(counts).sort((a,b)=>b[1]-a[1]);
  if(!entries.length) return `<div style="color:var(--t4);font-size:12px;padding:8px 0">No injection sites recorded. Add a site when logging doses.</div>`;
  const max=entries[0][1];
  return entries.map(([site,n])=>`<div style="margin-bottom:8px">
    <div style="display:flex;justify-content:space-between;margin-bottom:3px"><span style="font-size:12px;color:var(--t2)">${esc(site)}</span><span style="font-size:11px;color:${c.color}">${n}×</span></div>
    <div style="height:6px;background:var(--surface-2);border-radius:3px;overflow:hidden"><div style="height:100%;width:${Math.round(n/max*100)}%;background:${c.color};border-radius:3px;${n===max?"opacity:1":"opacity:0.5"}"></div></div>
  </div>`).join("")+`<div style="font-size:10px;color:var(--t4);margin-top:8px;line-height:1.4">Brighter bars = most-used. Rotate to avoid lipohypertrophy — any single site used >${Math.floor(doses.length*0.3)+1} times is worth cycling off for a week.</div>`;
}

function sideEffectsSection(name, doses) {
  const tf = state._symptomTF || "1m";
  const TF_DAYS={"2w":14,"1m":30,"3m":90,"all":null};
  const cutoff = TF_DAYS[tf] ? Date.now()-TF_DAYS[tf]*86400000 : 0;
  const tagged = state.dailyLogs.filter(l=>l.compound===name && new Date(l.date).getTime()>=cutoff);
  const dosesInRange = doses.filter(d=>new Date(d.date).getTime()>=cutoff);
  const fromDoses = dosesInRange.flatMap(d=>(d.symptoms||[]).map(s=>({...((typeof s==="string")?{name:s}:s), date:d.date})));
  const allSyms = [...tagged.flatMap(l=>(l.symptoms||[]).map(s=>({...((typeof s==="string")?{name:s}:s), date:l.date}))), ...fromDoses];
  const tfBtn=(k,label)=>`<button class="symtf" data-tf="${k}" style="flex:1;padding:6px 0;border-radius:8px;font-size:11px;font-weight:600;background:${tf===k?"var(--surface-3)":"transparent"};color:${tf===k?"var(--t1)":"var(--t4)"};border:none">${label}</button>`;
  const tfBar=`<div style="display:flex;gap:4px;background:var(--surface-3);border-radius:10px;padding:3px;margin-bottom:14px">${tfBtn("2w","2w")}${tfBtn("1m","1m")}${tfBtn("3m","3m")}${tfBtn("all","All")}</div>`;
  if(!allSyms.length) return tfBar+`<div style="color:var(--t4);font-size:12px;padding:8px 0">No symptoms logged in this window.</div>`;

  const totalLogs = new Set([...tagged.map(l=>dayKey(l.date)), ...dosesInRange.map(d=>dayKey(d.date))]).size || 1;
  const counts={};
  allSyms.forEach(s=>{ counts[s.name]=(counts[s.name]||0)+1; });
  const entries=Object.entries(counts).sort((a,b)=>b[1]-a[1]).slice(0,6);
  const c=cfg(name); const max=entries[0][1];

  // Category lookup
  const symCategory = sym => {
    const custom = (state.settings.customSymptoms||[]).find(c=>c.name===sym);
    if(custom) return custom.category||"Other";
    return Object.entries(SYMPTOM_GROUPS).find(([,list])=>list.includes(sym))?.[0] || "Other";
  };

  // Dose-timing clustering: for each symptom, find avg days-since-last-dose when it occurred
  const sortedDoses=[...doses].sort((a,b)=>new Date(a.date)-new Date(b.date));
  const daysSinceDoseFor = date => {
    const t=new Date(date).getTime();
    let best=null;
    sortedDoses.forEach(d=>{ const dt=(t-new Date(d.date).getTime())/86400000; if(dt>=0 && (best===null||dt<best)) best=dt; });
    return best;
  };
  const timingLabel = sym => {
    const occ = allSyms.filter(s=>s.name===sym).map(s=>daysSinceDoseFor(s.date)).filter(v=>v!=null);
    if(occ.length<2) return "";
    const avg = occ.reduce((a,b)=>a+b,0)/occ.length;
    const window = avg<=2?"0–2 days after dose":avg<=5?"3–5 days after dose":"6–7 days after dose";
    return `Most common ${window}`;
  };

  // Phase correlation: which phase did each symptom most often occur in
  const phaseLabel = sym => {
    if(!c.phases) return "";
    const occ = allSyms.filter(s=>s.name===sym).map(s=>{
      const dd=daysSinceDoseFor(s.date); if(dd==null) return null;
      const ph=currentPhase(c.phases,dd); return ph?ph.label:null;
    }).filter(Boolean);
    if(occ.length<2) return "";
    const tally={}; occ.forEach(p=>tally[p]=(tally[p]||0)+1);
    const [topPhase,topN]=Object.entries(tally).sort((a,b)=>b[1]-a[1])[0];
    const pct=Math.round(topN/occ.length*100);
    return pct>=60 ? `${pct}% during ${topPhase}` : `Often during ${topPhase}`;
  };

  // Trend: compare last 14d vs prior 14d for top symptoms
  const trendFor = sym => {
    const now=Date.now();
    const recent=allSyms.filter(s=>s.name===sym && (now-new Date(s.date).getTime())<=14*86400000).length;
    const prior=allSyms.filter(s=>s.name===sym && (now-new Date(s.date).getTime())>14*86400000 && (now-new Date(s.date).getTime())<=28*86400000).length;
    if(prior<2) return null; // not enough baseline data
    const change=Math.round((recent-prior)/prior*100);
    if(Math.abs(change)<25) return {dir:"stable",text:`${esc(sym)} has remained stable.`};
    return change<0
      ? {dir:"down",text:`${esc(sym)} decreased ${Math.abs(change)}% vs. the prior 2 weeks.`}
      : {dir:"up",text:`${esc(sym)} increased ${change}% vs. the prior 2 weeks.`};
  };
  const bars = entries.map(([sym,n])=>{
    const pct = Math.round(n/totalLogs*100);
    const timing = timingLabel(sym);
    const phaseInfo = phaseLabel(sym);
    return `<div style="margin-bottom:10px">
      <div style="display:flex;justify-content:space-between;margin-bottom:3px">
        <span style="font-size:12px;color:var(--t2)">${esc(sym)}</span>
        <span style="font-size:10px;color:var(--t4)">${n}d · ${pct}% of logs</span>
      </div>
      <div style="height:6px;background:var(--surface-2);border-radius:3px;overflow:hidden"><div style="height:100%;width:${Math.round(n/max*100)}%;background:${c.color};opacity:0.75;border-radius:3px"></div></div>
      ${timing||phaseInfo?`<div style="font-size:10px;color:var(--t5);margin-top:2px">${[timing,phaseInfo].filter(Boolean).join(" · ")}</div>`:""}
    </div>`;
  }).join("");

  // Category grouping
  const byCat={};
  entries.forEach(([sym,n])=>{ const cat=symCategory(sym); (byCat[cat]=byCat[cat]||[]).push(sym); });
  const catLine = Object.entries(byCat).map(([cat,syms])=>`<span style="font-size:10px;color:var(--t4)">${cat}: ${syms.length}</span>`).join("  ·  ");

  // Recent-trend insight: compare last 7 days vs prior period for top symptom
  // Build a stack of natural-language insights, only when confidence is reasonable
  const insights=[];
  if(entries.length){
    const topSym=entries[0][0];
    const last7=allSyms.filter(s=>s.name===topSym && (Date.now()-new Date(s.date).getTime())<=7*86400000).length;
    const last7Logs=new Set([...tagged,...dosesInRange].filter(l=>(Date.now()-new Date(l.date).getTime())<=7*86400000).map(l=>dayKey(l.date))).size||1;
    if(last7>=2) insights.push(`<b style="color:${c.color}">${esc(topSym)}</b> appeared in ${last7} of your last ${last7Logs} logs.`);

    // Trend for top symptom
    const t=trendFor(topSym);
    if(t) insights.push(t.text);

    // Timing observation for top symptom
    const occ=allSyms.filter(s=>s.name===topSym).map(s=>daysSinceDoseFor(s.date)).filter(v=>v!=null);
    if(occ.length>=3){
      const avg=occ.reduce((a,b)=>a+b,0)/occ.length;
      if(avg<=2) insights.push(`${esc(topSym)} is most common within 48 hours after injection.`);
      else if(avg>=5) insights.push(`${esc(topSym)} typically returns around Day ${Math.round(avg)}.`);
    }

    // Persistent symptom flag (appears in >50% of logs across whole window)
    if(Math.round(entries[0][1]/totalLogs*100)>=50) insights.push(`<b style="color:${c.color}">${esc(topSym)}</b> appears to be your most persistent symptom.`);

    // Quiet period observation
    const lateOcc=allSyms.map(s=>daysSinceDoseFor(s.date)).filter(v=>v!=null && v>=4).length;
    const totalOcc=allSyms.filter(s=>daysSinceDoseFor(s.date)!=null).length;
    if(totalOcc>=5 && lateOcc/totalOcc<0.15) insights.push(`You rarely report symptoms after Day 4.`);
  }

  return tfBar
    + bars
    + (catLine?`<div style="margin-top:4px;padding-top:8px;border-top:1px solid var(--surface-2)">${catLine}</div>`:"")
    + (insights.length?`<div style="margin-top:10px;display:flex;flex-direction:column;gap:6px">${insights.slice(0,3).map(i=>`<div style="padding:8px 10px;background:${c.color}10;border:1px solid ${c.color}33;border-radius:8px;font-size:11px;color:var(--t2)">💡 ${i}</div>`).join("")}</div>`:"")
    + `<div style="font-size:10px;color:var(--t4);margin-top:8px">From dose logs + check-ins tagged to ${esc(name)}.</div>`;
}

function doseRetrospectiveModal(name, doseId) {
  const c = cfg(name);
  const p = allPeptides()[name]; if(!p) return;
  const sorted = [...p.doses].sort((a,b)=>new Date(a.date)-new Date(b.date));
  const idx = sorted.findIndex(d=>String(d.id)===String(doseId));
  const dose = sorted[idx]; if(!dose) return;
  const cycleStart = new Date(dose.date).getTime();
  const cycleEnd = sorted[idx+1] ? new Date(sorted[idx+1].date).getTime() : cycleStart + (p.scheduleDays||7)*86400000;

  // Symptoms during this cycle
  const cycleLogs = state.dailyLogs.filter(l=>{const t=new Date(l.date).getTime();return t>=cycleStart&&t<cycleEnd;});
  const cycleSyms = [...cycleLogs.flatMap(l=>(l.symptoms||[]).map(s=>typeof s==="string"?s:s.name)), ...(dose.symptoms||[]).map(s=>typeof s==="string"?s:s.name)];

  // Food noise / appetite return timing — first day a hunger/food-noise symptom appears after dose
  const hungerLog = cycleLogs.filter(l=>(l.symptoms||[]).some(s=>/hunger|food noise|appetite/i.test(typeof s==="string"?s:s.name))).sort((a,b)=>new Date(a.date)-new Date(b.date))[0];
  const returnDay = hungerLog ? Math.round((new Date(hungerLog.date)-cycleStart)/86400000) : null;

  // Weight change during cycle
  const wSorted=[...state.weightLogs].sort((a,b)=>new Date(a.date)-new Date(b.date));
  const wBefore=[...wSorted].reverse().find(w=>new Date(w.date).getTime()<=cycleStart);
  const wAfter=[...wSorted].reverse().find(w=>new Date(w.date).getTime()<=cycleEnd && new Date(w.date).getTime()>=cycleStart-2*86400000);
  const weightDelta = wBefore&&wAfter&&wAfter!==wBefore ? parseFloat(wAfter.weight)-parseFloat(wBefore.weight) : null;

  // Mood trend during cycle
  const moodVals=cycleLogs.filter(l=>l.mood!=null).map(l=>l.mood);
  const avgMood = moodVals.length ? moodVals.reduce((a,b)=>a+b,0)/moodVals.length : null;

  // ── Compute averages across ALL other cycles for comparison ──
  const allCycles = sorted.map((d,i)=>{
    const s=new Date(d.date).getTime(); const e=sorted[i+1]?new Date(sorted[i+1].date).getTime():s+(p.scheduleDays||7)*86400000;
    const logs=state.dailyLogs.filter(l=>{const t=new Date(l.date).getTime();return t>=s&&t<e;});
    const syms=[...logs.flatMap(l=>(l.symptoms||[]).map(x=>typeof x==="string"?x:x.name)),...(d.symptoms||[]).map(x=>typeof x==="string"?x:x.name)];
    const hLog=logs.filter(l=>(l.symptoms||[]).some(x=>/hunger|food noise|appetite/i.test(typeof x==="string"?x:x.name))).sort((a,b)=>new Date(a.date)-new Date(b.date))[0];
    const rDay = hLog ? Math.round((new Date(hLog.date)-s)/86400000) : null;
    const wB=[...wSorted].reverse().find(w=>new Date(w.date).getTime()<=s);
    const wA=[...wSorted].reverse().find(w=>new Date(w.date).getTime()<=e && new Date(w.date).getTime()>=s-2*86400000);
    const wd = wB&&wA&&wA!==wB ? parseFloat(wA.weight)-parseFloat(wB.weight) : null;
    return {symCount:syms.length, returnDay:rDay, weightDelta:wd};
  });
  const otherCycles = allCycles.filter((_,i)=>i!==idx);
  const avg = arr => arr.length ? arr.reduce((a,b)=>a+b,0)/arr.length : null;
  const avgSymCount = avg(otherCycles.map(x=>x.symCount));
  const avgReturnDay = avg(otherCycles.filter(x=>x.returnDay!=null).map(x=>x.returnDay));
  const avgWeightDelta = avg(otherCycles.filter(x=>x.weightDelta!=null).map(x=>x.weightDelta));

  const comparisons = [];
  if(avgSymCount!=null && otherCycles.length>=2){
    if(cycleSyms.length<avgSymCount*0.7) comparisons.push("✓ Fewer symptoms than your average cycle");
    else if(cycleSyms.length>avgSymCount*1.3) comparisons.push("⚠ More symptoms than your average cycle");
  }
  if(returnDay!=null && avgReturnDay!=null && otherCycles.filter(x=>x.returnDay!=null).length>=2){
    if(returnDay>avgReturnDay+1) comparisons.push("✓ Later food noise return than usual");
    else if(returnDay<avgReturnDay-1) comparisons.push("⚠ Earlier food noise return than usual");
  }
  if(weightDelta!=null && avgWeightDelta!=null && otherCycles.filter(x=>x.weightDelta!=null).length>=2){
    if(weightDelta<avgWeightDelta-0.3) comparisons.push("✓ Faster weight loss than your average cycle");
    else if(weightDelta>avgWeightDelta+0.3) comparisons.push("⚠ Slower weight loss than your average cycle");
  }

  const m = openModal(`
    <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:14px">
      <span class="mono" style="font-size:12px;color:${c.color};letter-spacing:1px">DOSE RETROSPECTIVE</span>
      <button id="x" style="color:var(--t4);font-size:18px">✕</button>
    </div>
    <div style="background:${c.color}10;border:1px solid ${c.color}33;border-radius:12px;padding:14px;margin-bottom:16px">
      <div style="font-size:16px;font-weight:700;color:var(--t1)">${esc(name)} ${dose.dose?esc(dose.dose)+" "+c.unit:""}</div>
      <div style="font-size:12px;color:var(--t4);margin-top:2px">${fmtDT(dose.date)}${dose.site?" · "+esc(dose.site):""}</div>
    </div>

    <div class="mono" style="font-size:9px;color:var(--t4);letter-spacing:1.5px;margin-bottom:10px">WHAT HAPPENED AFTER</div>
    <div style="display:flex;flex-direction:column;gap:8px;margin-bottom:16px">
      <div style="display:flex;justify-content:space-between;padding:8px 0;border-bottom:1px solid var(--surface-2)"><span style="font-size:12px;color:var(--t3)">Symptoms reported</span><span style="font-size:12px;color:var(--t1);font-weight:600">${cycleSyms.length ? [...new Set(cycleSyms)].join(", ") : "None logged"}</span></div>
      <div style="display:flex;justify-content:space-between;padding:8px 0;border-bottom:1px solid var(--surface-2)"><span style="font-size:12px;color:var(--t3)">Food noise return</span><span style="font-size:12px;color:var(--t1);font-weight:600">${returnDay!=null?`Day ${returnDay}`:"Not logged"}</span></div>
      <div style="display:flex;justify-content:space-between;padding:8px 0;border-bottom:1px solid var(--surface-2)"><span style="font-size:12px;color:var(--t3)">Weight change</span><span style="font-size:12px;color:var(--t1);font-weight:600">${weightDelta!=null?(weightDelta<0?"":"+")+weightDelta.toFixed(1)+" "+(state.settings.weightUnit||"lbs"):"Not enough data"}</span></div>
      <div style="display:flex;justify-content:space-between;padding:8px 0"><span style="font-size:12px;color:var(--t3)">Mood trend</span><span style="font-size:12px;color:var(--t1);font-weight:600">${avgMood!=null?avgMood.toFixed(1)+"/5":"Not logged"}</span></div>
    </div>

    ${comparisons.length ? `<div class="mono" style="font-size:9px;color:var(--t4);letter-spacing:1.5px;margin-bottom:10px">COMPARED TO YOUR AVERAGE</div>
    <div style="display:flex;flex-direction:column;gap:6px">${comparisons.map(t=>`<div style="font-size:12px;color:${t.startsWith("✓")?"#7DF9C0":"#F9C87D"};padding:6px 10px;background:${t.startsWith("✓")?"#7DF9C010":"#F9C87D10"};border-radius:8px">${esc(t)}</div>`).join("")}</div>`
    : `<div style="font-size:11px;color:var(--t5);text-align:center;padding:10px 0">Not enough cycle history yet to compare this dose to your average.</div>`}
  `, c.color);
  m.querySelector("#x").onclick = closeModal;
}

function pkCurveFull(name, data) {
  const c = cfg(name);
  if (!c.phases || !c.halfLifeDays || !(data.doses||[]).length) return "";
  const doses = (data.doses||[]).filter(d=>d.date);
  const lastDose = [...doses].sort((a,b)=>new Date(b.date)-new Date(a.date))[0];
  if (!lastDose) return "";
  const daysSinceLast = (Date.now() - new Date(lastDose.date).getTime()) / 86400000;
  const phase = currentPhase(c.phases, daysSinceLast);
  const origin = new Date(lastDose.date).getTime() - 86400000;
  const W=480, H=130, pad=28;
  const totalDays = 11;
  const px = frac => pad + frac * (W-pad*2);
  const py = v => pad + (1-Math.min(1.3,v)/1.3) * (H-pad*1.8);
  const nowFrac = (Date.now()-origin) / (totalDays*86400000);
  const STEPS=120;
  const pts=[...Array(STEPS+1)].map((_,i)=>{ const t=origin+(i/STEPS)*totalDays*86400000; const v=pkLevelAt(doses,c.halfLifeDays,t); return [px(i/STEPS),py(v)]; });
  const pathD=pts.map(([x,y],i)=>`${i?"L":"M"} ${x} ${y}`).join(" ");
  // Y-axis gridlines
  const gridLines=[0.25,0.5,0.75,1.0].map(v=>{const y=py(v);return `<line x1="${pad}" y1="${y}" x2="${W-pad}" y2="${y}" stroke="#ffffff" stroke-width="0.5" opacity="0.06"/><text x="${pad-3}" y="${y+3}" fill="#555" font-size="8" font-family="monospace" text-anchor="end">${Math.round(v*100)}%</text>`;}).join("");
  const phaseBands=c.phases.map(p=>{ const x1=px(Math.max(0,(p.range[0]+1)/totalDays)); const x2=px(Math.min(1,(Math.min(p.range[1],totalDays-1)+1)/totalDays)); if(x2<=x1) return ""; return `<rect x="${x1}" y="${pad}" width="${x2-x1}" height="${H-pad*1.8}" fill="${p.color}" opacity="0.06"/>`; }).join("");
  const doseMarkers=doses.slice(-10).map(d=>{ const frac=(new Date(d.date).getTime()-origin)/(totalDays*86400000); if(frac<0||frac>1) return ""; const x=px(frac); const dose=doseToMg(d.dose,data.unit||cfg(name)?.unit||"mg"); const doseLabel=c.unit==="mcg"?(dose*1000).toFixed(0)+"mcg":dose.toFixed(2)+"mg"; return `<circle cx="${x}" cy="${H-pad*0.8}" r="3.5" fill="${c.color}" opacity="0.9"/><text x="${x}" y="${H-pad*0.8-7}" fill="${c.color}" font-size="8" font-family="monospace" text-anchor="middle" opacity="0.8">${doseLabel}</text>`; }).join("");

    <span style="font-size:11px;color:var(--t4)">~${pctLevel}% of steady-state peak</span>
    <button class="phaseinfo" data-phaseid="${phase.id}" data-compound="${name}" style="background:${phase.color}18;border:1px solid ${phase.color}44;color:${phase.color};border-radius:5px;padding:3px 8px;font-size:9px;white-space:nowrap;margin-left:auto">ℹ What this means</button>
  </div>
  <svg viewBox="0 0 ${W} ${H}" style="width:100%;height:auto;margin-bottom:12px;display:block">
    ${gridLines}
    ${phaseBands}
    <path d="${pathD} L ${pts[pts.length-1][0]} ${H-pad*0.8} L ${pts[0][0]} ${H-pad*0.8} Z" fill="url(#pk-grad-${name})" opacity="1"/>
    <defs><linearGradient id="pk-grad-${name}" x1="0" y1="0" x2="0" y2="1"><stop offset="0%" stop-color="${c.color}" stop-opacity="0.35"/><stop offset="100%" stop-color="${c.color}" stop-opacity="0.02"/></linearGradient></defs>
    <path d="${pathD}" fill="none" stroke="${c.color}" stroke-width="2.5" stroke-linejoin="round" stroke-linecap="round"/>
    ${doseMarkers}
    ${nowInRange?`<line x1="${nowX}" y1="${pad}" x2="${nowX}" y2="${H-pad*0.8}" stroke="#fff" stroke-width="1" stroke-dasharray="3,3" opacity="0.3"/>
    <circle cx="${nowX}" cy="${py(nowLevel)}" r="5" fill="${c.color}" opacity="1"/>
    <circle cx="${nowX}" cy="${py(nowLevel)}" r="2.5" fill="#fff" opacity="0.9"/>
    <text x="${nowX+7}" y="${pad+10}" fill="#aaa" font-size="9" font-family="monospace">now</text>`:""}
    <text x="${pad}" y="${H-6}" fill="#444" font-size="8" font-family="monospace">-1d</text>
    <text x="${W/2-6}" y="${H-6}" fill="#444" font-size="8" font-family="monospace">+${Math.floor(totalDays/2)}d</text>
    <text x="${W-pad-12}" y="${H-6}" fill="#444" font-size="8" font-family="monospace">+${totalDays-1}d</text>
  </svg>
  <div style="background:${phase.color}11;border:1px solid ${phase.color}33;border-radius:10px;padding:12px 14px;margin-bottom:10px">
    <div style="font-size:13px;font-weight:600;color:${phase.color};margin-bottom:4px">${phase.label} — What's happening now</div>
    <div style="font-size:12px;color:var(--t3);line-height:1.55;margin-bottom:8px">${esc(phase.happening||phase.desc)}</div>
    ${phase.sideEffects&&phase.sideEffects.length?`<div class="mono" style="font-size:9px;color:var(--t4);letter-spacing:1px;margin-bottom:5px">POSSIBLE NOW</div>
    <div style="display:flex;flex-wrap:wrap;gap:5px;margin-bottom:8px">${phase.sideEffects.slice(0,5).map(s=>`<span class="pill" style="background:rgba(255,255,255,.05);color:var(--t3);border:1px solid var(--border);font-size:10px">${esc(s)}</span>`).join("")}</div>`:""}
    ${phase.watchFor&&phase.watchFor.length?`<div class="mono" style="font-size:9px;color:var(--t4);letter-spacing:1px;margin-bottom:5px">WATCH FOR</div>
    <div style="font-size:11px;color:var(--t3);line-height:1.5">${phase.watchFor.slice(0,2).map(s=>`→ ${esc(s)}`).join("<br>")}</div>`:""}
  </div>
  <div style="display:flex;gap:6px;flex-wrap:wrap;margin-bottom:4px">${c.phases.map(p=>`<button class="phaseinfo" data-phaseid="${p.id}" data-compound="${name}" style="padding:4px 9px;border-radius:6px;font-size:10px;background:${p===phase?p.color+"22":"transparent"};border:1px solid ${p===phase?p.color+"55":"#222"};color:${p===phase?p.color:"#555"}">${p.label}</button>`).join("")}</div>`;
}

  const dayWeight=state.weightLogs.find(w=>dayKey(w.date)===k);

  const mood=dayLog?MOODS.find(m=>m.v===dayLog.mood):null;

    ${mood?`<div style="display:flex;align-items:center;gap:10px;padding:12px 0;border-bottom:1px solid var(--surface-2)"><span style="font-size:24px">${mood.emoji}</span><div><div style="font-size:13px;color:var(--t2)">${mood.label}</div>${dayLog.compound?`<div style="font-size:11px;color:var(--t4)">re: ${esc(dayLog.compound)}</div>`:""}</div></div>`:""}
    ${dayLog&&dayLog.symptoms&&dayLog.symptoms.length?`<div style="padding:10px 0;border-bottom:1px solid var(--surface-2)"><div style="display:flex;gap:5px;flex-wrap:wrap">${dayLog.symptoms.map(s=>`<span class="pill" style="background:rgba(255,255,255,.05);color:var(--t3);border:1px solid #2e2e2e">${esc(typeof s==="string"?s:s.name+" "+"•".repeat(s.intensity||1))}</span>`).join("")}</div></div>`:""}
    ${dayLog&&dayLog.notes?`<div style="padding:8px 0;border-bottom:1px solid var(--surface-2);font-size:12px;color:var(--t3);font-style:italic">${esc(dayLog.notes)}</div>`:""}
    ${dayWeight?`<div style="padding:8px 0;border-bottom:1px solid var(--surface-2);font-size:12px;color:#8AB4FF">⚖ ${dayWeight.weight} ${state.settings.weightUnit}</div>`:""}
    ${dayMacro?`<div style="padding:8px 0;border-bottom:1px solid var(--surface-2);font-size:12px;color:#F9C87D">🍽 ${dayMacro.calories||"—"} kcal · P: ${dayMacro.protein||"—"}g · C: ${dayMacro.carbs||"—"}g · F: ${dayMacro.fat||"—"}g</div>`:""}
    ${daySupp?.taken?.length?`<div style="padding:8px 0;border-bottom:1px solid var(--surface-2);font-size:12px;color:#C8FF9C">💊 ${daySupp.taken.map(s=>esc(s)).join(" · ")}</div>`:""}

      ${!dayMacro?`<button id="addmacro" style="flex:1;padding:10px;border-radius:10px;background:#F9C87D18;border:1px solid #F9C87D44;color:#F9C87D;font-size:12px;font-weight:600">🍽 Macros</button>`:""}

function weeklyView() {
  const sub = state._calSub || "week";
  const subBtn = (id,l) => `<button id="cs-${id}" class="${sub===id?"on":""}">${l}</button>`;
  let html = `<h1 class="serif greet">Calendar</h1>
  <div class="seg" style="margin:14px 0 18px">${subBtn("week","Week")}${subBtn("month","Month")}${subBtn("logs","Logs")}</div>`;
  if (sub==="month") return html + monthView();
  if (sub==="logs")  return html + logsView();
  // ── Week ──────────────────────────────────────────────────────────────────
  const off = state._weekOff||0;
  const base = startOfWeek(new Date()); base.setDate(base.getDate()+off*7);
  const week = [...Array(7)].map((_,i)=>{const d=new Date(base);d.setDate(d.getDate()+i);return d;});
  const aps=allPeptides(), allDoses=Object.entries(aps).flatMap(([n,p])=>(p.doses||[]).map(d=>({...d,pep:n,color:cfg(n).color})));
  const dd=week.map(d=>{const k=dayKey(d);return{date:d,doses:allDoses.filter(x=>dayKey(x.date)===k),weight:state.weightLogs.find(w=>dayKey(w.date)===k),daily:state.dailyLogs.find(l=>dayKey(l.date)===k),macro:state.macroLogs.find(m=>dayKey(m.date)===k)};});
  const shots=dd.reduce((a,d)=>a+d.doses.length,0);
  const symCount={}; dd.forEach(d=>{(d.daily&&d.daily.symptoms||[]).forEach(s=>{const n=typeof s==="string"?s:s.name;symCount[n]=(symCount[n]||0)+1;});});
  const top=Object.entries(symCount).sort((a,b)=>b[1]-a[1]).slice(0,3);
  const label=off===0?"This week":off===-1?"Last week":`${fmtShort(week[0].toISOString())} – ${fmtShort(week[6].toISOString())}`;
  html+=`<div class="card" style="border-color:#7DF9C022">
    <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:16px"><button id="wp-prev" style="background:var(--surface-2);border:1px solid var(--border);color:var(--t3);border-radius:8px;width:32px;height:32px;font-size:18px">‹</button><span class="mono" style="font-size:13px;color:#7DF9C0;letter-spacing:1px">${label.toUpperCase()}</span><button id="wp-next" style="background:var(--surface-2);border:1px solid var(--border);color:var(--t3);border-radius:8px;width:32px;height:32px;font-size:18px;opacity:${off>=0?0.3:1}">›</button></div>
    <div style="display:flex;gap:4px;margin-bottom:16px">${dd.map((d,i)=>{
      const mood=d.daily?MOODS.find(m=>m.v===d.daily.mood):null;
      const today=dayKey(d.date)===dayKey(new Date());
      const pepCols=[...new Set(d.doses.map(x=>x.color))].slice(0,3);
      return `<div style="flex:1;text-align:center">
        <div class="mono" style="font-size:9px;color:${today?"#7DF9C0":"#555"};margin-bottom:4px">${DAY_LABELS[i]}</div>
        <button class="calday" data-date="${d.date.toISOString()}" style="width:100%;height:62px;border-radius:10px;background:${today?"#7DF9C00f":"var(--surface-2)"};border:1px solid ${today?"#7DF9C033":"var(--border-sub)"};display:flex;flex-direction:column;align-items:center;justify-content:center;gap:2px;padding:3px">
          ${pepCols.length?`<div style="display:flex;gap:2px;justify-content:center">${pepCols.map(col=>`<div style="width:5px;height:5px;border-radius:50%;background:${col}"></div>`).join("")}</div>`:""}
          ${mood?`<span style="font-size:14px;line-height:1">${mood.emoji}</span>`:""}
          ${d.weight?`<span style="font-size:7.5px;color:#8AB4FF">${parseFloat(d.weight.weight)}</span>`:""}
          ${!d.doses.length&&!mood&&!d.weight?`<span style="font-size:9px;color:var(--border)">+</span>`:""}
        </button>
        <div style="font-size:8px;color:${today?"#7DF9C0":"#444"};margin-top:3px">${d.date.getDate()}</div>
      </div>`;
    }).join("")}</div>
    <div style="display:flex;gap:16px;flex-wrap:wrap;margin-bottom:${top.length?12:0}px">${[["SHOTS",shots],["WEIGH-INS",dd.filter(d=>d.weight).length],["CHECK-INS",dd.filter(d=>d.daily).length]].map(([l,v])=>`<div><div class="mono" style="font-size:9px;color:var(--t4);letter-spacing:1.5px">${l}</div><div style="font-size:16px;font-weight:700;color:var(--t2)">${v}</div></div>`).join("")}</div>
    ${top.length?`<div><div class="mono" style="font-size:9px;color:var(--t4);letter-spacing:1.5px;margin-bottom:6px">MOST LOGGED SYMPTOMS</div><div style="display:flex;gap:6px;flex-wrap:wrap">${top.map(([n,c])=>`<span class="pill" style="background:rgba(255,255,255,.05);color:var(--t3);border:1px solid #2e2e2e">${esc(n)} ×${c}</span>`).join("")}</div></div>`:""}
  </div>`;
  return html;
}

function monthView() {
  const off = state._monthOff||0;
  const now = new Date(), yr=now.getFullYear(), mo=now.getMonth()+off;
  const firstDay=new Date(yr,mo,1), lastDay=new Date(yr,mo+1,0);
  const monthLabel=firstDay.toLocaleDateString("en-CA",{month:"long",year:"numeric"});
  const aps=allPeptides();
  const allDoses=Object.entries(aps).flatMap(([n,p])=>(p.doses||[]).map(d=>({...d,pep:n,color:cfg(n).color})));

  // Build projected dose map for this month
  const projectedMap = {};
  Object.entries(aps).filter(([,d])=>(d.doses||[]).length&&(d.status||"active")==="active").forEach(([n,d])=>{
    const last=[...d.doses].sort((a,b)=>new Date(b.date)-new Date(a.date))[0];
    if(!last) return;
    const col=cfg(n).color;
    let next=new Date(new Date(last.date).getTime()+d.scheduleDays*86400000);
    for(let i=0;i<26;i++){
      if(next>lastDay) break;
      if(next>=firstDay){ const k=dayKey(next.toISOString()); if(!projectedMap[k])projectedMap[k]=[]; projectedMap[k].push(col); }
      next=new Date(next.getTime()+d.scheduleDays*86400000);
    }
  });

  const startPad=firstDay.getDay(); // Sunday=0
  const totalCells=Math.ceil((startPad+lastDay.getDate())/7)*7;
  const cells=[...Array(totalCells)].map((_,i)=>{const d=new Date(firstDay);d.setDate(1-startPad+i);return d;});
  const today=dayKey(new Date());
  const isCurrentMonth=off===0;
  return `<div class="card" style="border-color:#7DF9C022">
    <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:14px">
      <button id="mprev" style="background:var(--surface-2);border:1px solid var(--border);color:var(--t3);border-radius:8px;width:32px;height:32px;font-size:18px">‹</button>
      <div style="display:flex;align-items:center;gap:10px">
        <span class="mono" style="font-size:13px;color:#7DF9C0;letter-spacing:1px">${monthLabel.toUpperCase()}</span>
        ${!isCurrentMonth?`<button id="mtoday" style="background:#7DF9C018;border:1px solid #7DF9C044;color:#7DF9C0;border-radius:7px;padding:3px 10px;font-size:11px;font-weight:600">Today</button>`:""}
      </div>
      <button id="mnext" style="background:var(--surface-2);border:1px solid var(--border);color:var(--t3);border-radius:8px;width:32px;height:32px;font-size:18px;opacity:${off>=0?0.3:1}">›</button>
    </div>
    <div style="display:grid;grid-template-columns:repeat(7,1fr);gap:3px;margin-bottom:6px">
      ${DAY_LABELS.map(d=>`<div class="mono" style="text-align:center;font-size:9px;color:var(--t4);padding-bottom:4px">${d}</div>`).join("")}
    </div>
    <div style="display:grid;grid-template-columns:repeat(7,1fr);gap:3px">
      ${cells.map(d=>{
        const k=dayKey(d),inMonth=d.getMonth()===(firstDay.getMonth());
        const doses=allDoses.filter(x=>dayKey(x.date)===k);
        const proj=(projectedMap[k]||[]).filter(col=>!doses.some(x=>x.color===col)).slice(0,3);
        const log=state.dailyLogs.find(l=>dayKey(l.date)===k);
        const wt=state.weightLogs.find(w=>dayKey(w.date)===k);
        const macro=state.macroLogs.find(m=>dayKey(m.date)===k);
        const mood=log?MOODS.find(m=>m.v===log.mood):null;
        const isToday=k===today;
        const pepCols=[...new Set(doses.map(x=>x.color))].slice(0,3);
        const projCols=[...new Set(proj)];
        return `<button class="calday" data-date="${d.toISOString()}" style="height:46px;border-radius:8px;background:${isToday?"#7DF9C015":inMonth?"var(--surface-2)":"var(--bg)"};border:1px solid ${isToday?"#7DF9C033":inMonth?"var(--border-sub)":"var(--bg-deep)"};display:flex;flex-direction:column;align-items:center;justify-content:center;gap:1px;opacity:${inMonth?1:0.3}">
          <span style="font-size:11px;color:${isToday?"#7DF9C0":inMonth?"var(--t2)":"var(--t5)"};font-weight:${isToday?"700":"400"};line-height:1">${d.getDate()}</span>
          <div style="display:flex;gap:2px;min-height:6px;align-items:center">
            ${pepCols.map(col=>`<div style="width:4px;height:4px;border-radius:50%;background:${col}"></div>`).join("")}
            ${projCols.map(col=>`<div style="width:4px;height:4px;border-radius:50%;background:${col};opacity:0.35;box-shadow:0 0 0 1px ${col}55"></div>`).join("")}
            ${!pepCols.length&&!projCols.length&&mood?`<span style="font-size:9px;line-height:1">${mood.emoji}</span>`:""}
            ${!pepCols.length&&!projCols.length&&!mood&&wt?`<div style="width:4px;height:4px;border-radius:50%;background:#8AB4FF"></div>`:""}
            ${!pepCols.length&&!projCols.length&&!mood&&!wt&&macro?`<div style="width:4px;height:4px;border-radius:50%;background:#F9C87D"></div>`:""}
          </div>
        </button>`;
      }).join("")}
    </div>
    <div style="display:flex;gap:12px;flex-wrap:wrap;margin-top:12px;padding-top:10px;border-top:1px solid var(--border-sub)">
      <div style="display:flex;align-items:center;gap:5px"><div style="width:6px;height:6px;border-radius:50%;background:#7DF9C0"></div><span style="font-size:10px;color:var(--t4)">Dose logged</span></div>
      <div style="display:flex;align-items:center;gap:5px"><div style="width:6px;height:6px;border-radius:50%;background:#7DF9C0;opacity:0.35;box-shadow:0 0 0 1.5px #7DF9C055"></div><span style="font-size:10px;color:var(--t4)">Projected</span></div>
      <div style="display:flex;align-items:center;gap:5px"><span style="font-size:11px">😐</span><span style="font-size:10px;color:var(--t4)">Check-in</span></div>
      <div style="display:flex;align-items:center;gap:5px"><div style="width:6px;height:6px;border-radius:50%;background:#8AB4FF"></div><span style="font-size:10px;color:var(--t4)">Weight</span></div>

function learnContent() {
  const sub = state._learnSub || "guides";
  const subBtn = (id,l) => `<button id="ls-${id}" class="${sub===id?"on":""}">${l}</button>`;
  let html = `<div class="seg" style="margin:0 0 18px">${subBtn("guides","Guides")}${subBtn("discover","Discover")}${subBtn("mixing","Stacking")}${subBtn("calc","Dose Calc")}</div>`;
  if (sub === "mixing") { return html+mixingChartView(); }
  if (sub === "calc")    { return html+reconCalcView(); }
  if (sub === "discover") {
    const q = (state._discoverSearch||"").toLowerCase();
    const af = state._discoverFilter||"";
    const CATS = ["All","Fat Loss","Recovery","Skin & Hair","Sleep","Cognitive","Hormonal","Longevity","Immune","Blends"];
    const CAT_MAP = {"Fat Loss":["Fat Loss","Metabolic"],"Recovery":["Recovery","Injury"],"Skin & Hair":["Skin","Hair"],"Sleep":["Sleep"],"Cognitive":["Cognitive","Focus","Mood","Nootropic"],"Hormonal":["Hormonal","Sexual Wellness","Libido"],"Longevity":["Longevity","Mitochondrial","Anti-aging"],"Immune":["Immune","Anti-viral","Anti-inflammatory"],"Blends":["Blend"]};
    const sortedLib = [...LIBRARY].sort((a,b)=>a.name.localeCompare(b.name));
    const filtered = sortedLib.filter(l=>{
      const matchQ = !q || l.name.toLowerCase().includes(q) || l.sub.toLowerCase().includes(q) || (l.aliases||[]).some(a=>a.toLowerCase().includes(q)) || (l.tags||[]).some(t=>t.toLowerCase().includes(q));
      const matchCat = !af || af==="All" || (CAT_MAP[af]||[af]).some(c=>(l.tags||[]).some(t=>t.toLowerCase().includes(c.toLowerCase())));
      return matchQ && matchCat;
    });
    return html + `
    <div style="position:relative;margin-bottom:10px">
      <input id="disc-search" class="inp" placeholder="🔍  Search by name, alias, or use…" value="${esc(state._discoverSearch||"")}" style="width:100%;padding-right:${state._discoverSearch?"36px":"14px"}">
      ${state._discoverSearch?`<button id="disc-clear" style="position:absolute;right:10px;top:50%;transform:translateY(-50%);color:var(--t4);font-size:15px;line-height:1;padding:4px">✕</button>`:""}
    </div>
    <div style="display:flex;gap:5px;flex-wrap:wrap;margin-bottom:14px">
      ${CATS.map(c=>`<button class="disc-filter" data-cat="${c}" style="padding:4px 10px;border-radius:99px;font-size:11px;background:${af===c||(!af&&c==="All")?"var(--surface-3)":"transparent"};border:1px solid ${af===c||(!af&&c==="All")?"var(--border)":"var(--border-sub)"};color:${af===c||(!af&&c==="All")?"var(--t1)":"var(--t4)"}">${c}</button>`).join("")}
    </div>
    ${filtered.length===0?`<div style="text-align:center;padding:30px;color:var(--t4)">No compounds match.</div>`:""}
    ${filtered.map(item=>{
      const evBg=item.evidence==="established"?"#7DF9C022":item.evidence==="emerging"?"#F9C87D22":"#9CC8FF22";
      const evCol=item.evidence==="established"?"#7DF9C0":item.evidence==="emerging"?"#F9C87D":"#9CC8FF";
      const inStack=isInStack(item.name);
      return `<div class="card discitem" data-name="${esc(item.name)}" style="border-color:${item.color}22;cursor:pointer">
        <div style="display:flex;align-items:center;gap:10px;margin-bottom:4px">
          <div style="width:8px;height:8px;border-radius:50%;background:${item.color};flex-shrink:0"></div>
          <span class="mono" style="font-size:14px;color:var(--t1);letter-spacing:1px;flex:1">${esc(item.name)}</span>
          ${inStack?`<span class="pill" style="background:#7DF9C022;color:#7DF9C0;border:1px solid #7DF9C044">In Stack</span>`:""}
        </div>
        ${item.aliases?.length?`<div style="font-size:10px;color:var(--t5);margin-bottom:3px;margin-left:18px">aka ${item.aliases.join(", ")}</div>`:""}
        <div style="font-size:12px;color:var(--t4);margin-bottom:8px;margin-left:18px">${esc(item.sub)}</div>
        <div style="display:flex;gap:5px;flex-wrap:wrap;margin-left:18px">
          <span class="pill" style="background:${evBg};color:${evCol};border:1px solid ${evCol}44">${item.evidence}</span>
          ${(item.tags||[]).map(t=>`<span class="pill" style="background:rgba(255,255,255,.05);color:var(--t4);border:1px solid var(--border)">${esc(t)}</span>`).join("")}
        </div>
      </div>`;
    }).join("")}`;
  }
  // Guides
  const cats=[...new Set(GUIDES.map(g=>g.cat))];
  return html + cats.map(cat=>`
    <div class="mono" style="font-size:9px;color:var(--t4);letter-spacing:2px;margin:${cat===cats[0]?"0":"16px"} 0 10px">${cat.toUpperCase()}</div>
    ${GUIDES.filter(g=>g.cat===cat).map((g,idx)=>{
      const i=GUIDES.indexOf(g);
      return `<button class="guideitem" data-i="${i}" style="display:flex;align-items:center;gap:14px;width:100%;padding:14px 16px;background:var(--surface);border:1px solid var(--border-sub);border-radius:12px;text-align:left;margin-bottom:8px;cursor:pointer"><span style="font-size:22px;flex-shrink:0">${g.icon}</span><div style="flex:1;min-width:0"><div style="font-size:14px;color:var(--t2);font-weight:500;margin-bottom:2px">${esc(g.title)}</div><div style="font-size:11px;color:var(--t4)">${g.min||""}</div></div><span style="color:var(--t5);font-size:18px">›</span></button>`;
    }).join("")}
  `).join("");
}

function guideDetail(i) {
  const g = GUIDES[i];
  if (!g) return `<div style="color:var(--t4);padding:40px;text-align:center">Guide not found.</div>`;
  const backBtn = `<div style="display:flex;align-items:center;gap:12px;margin-bottom:20px"><button id="backguide" style="background:var(--surface-2);border:1px solid var(--border);color:var(--t3);border-radius:8px;width:32px;height:32px;font-size:18px">‹</button><h1 class="serif" style="font-size:20px;color:var(--t1);flex:1;margin:0">${esc(g.title)}</h1></div>`;

  // Special visual layout for the dosing math guide
  if(g.title.includes("mg, mcg, mL")) {
    const refCard = (vialMg, bacOpts) => `<div style="margin-bottom:12px">
      <div class="mono" style="font-size:10px;color:var(--t4);letter-spacing:1.5px;margin-bottom:8px">${vialMg}mg VIAL</div>
      ${bacOpts.map(([bac,conc,examples])=>`<div style="background:var(--surface-2);border:1px solid var(--border-sub);border-radius:10px;padding:10px 12px;margin-bottom:6px">
        <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:6px">
          <span style="font-size:12px;font-weight:700;color:var(--t1)">${bac}mL BAC → ${conc}mg/mL</span>
          ${bac===2?`<span style="font-size:9px;color:#7DF9C0;background:#7DF9C015;border:1px solid #7DF9C033;border-radius:8px;padding:1px 7px">COMMON</span>`:""}
        </div>
        <div style="display:grid;grid-template-columns:1fr 1fr;gap:3px">
          ${examples.map(([dose,units])=>`<div style="display:flex;justify-content:space-between;padding:3px 6px;background:var(--surface-3);border-radius:5px"><span style="font-size:11px;color:var(--t4)">${dose}</span><span style="font-size:11px;color:var(--t2);font-weight:600">${units} u</span></div>`).join("")}
        </div>
      </div>`).join("")}
