  modalEl.querySelector(".modal").innerHTML = innerHTML;
  modalEl.addEventListener("click", e => { if (e.target === modalEl) closeModal(); });
  document.body.appendChild(modalEl);
  return modalEl.querySelector(".modal");
}
function closeModal() { if (modalEl) { modalEl.remove(); modalEl = null; } }

// ─── Symptom picker (shared) ────────────────────────────────────────────────────
function symptomPickerHTML(selected, color) {
  // Get compound-specific symptoms for active compounds
  const activeCompounds = Object.keys(allPeptides()).filter(n=>(allPeptides()[n].doses||[]).length>0||(allPeptides()[n].status||"active")==="active");
  const compoundGroups = activeCompounds
    .filter(n=>COMPOUND_SYMPTOMS[n])
    .map(n=>COMPOUND_SYMPTOMS[n])
    .filter(g=>g.symptoms.length>0);

  if(!state._symPickerOpen) state._symPickerOpen={};
  const isOpen = key => !!state._symPickerOpen[key];

  const chipRow = (syms, groupColor) => `
    <div style="display:flex;flex-wrap:wrap;gap:6px;padding:10px 2px 2px">
      ${syms.map(sym => {
        const sel = selected.find(s=>s.name===sym);
        const c = groupColor||color;
        return `<div style="display:flex;flex-direction:column;gap:4px">
          <button data-sym="${esc(sym)}" class="symbtn" style="padding:5px 11px;border-radius:99px;font-size:11px;background:${sel?c+"22":"transparent"};border:1px solid ${sel?c:"#333"};color:${sel?c:"#777"}">${esc(sym)}</button>
          <div class="symint" data-sym="${esc(sym)}" style="display:${sel?"flex":"none"};gap:3px;justify-content:center">
            ${[1,2,3].map(i=>`<button data-int="${i}" style="width:22px;height:22px;border-radius:50%;background:${sel&&sel.intensity>=i?c:"var(--border)"};border:none;cursor:pointer;display:flex;align-items:center;justify-content:center"><div style="width:8px;height:8px;border-radius:50%;background:${sel&&sel.intensity>=i?"#fff":"transparent"}"></div></button>`).join("")}
          </div>
        </div>`;
      }).join("")}
    </div>`;

  const renderGroup = (key, groupLabel, syms, groupColor) => {
    const selCount = syms.filter(sym=>selected.find(s=>s.name===sym)).length;
    // selected symptoms first within the category
    const ordered = [...syms].sort((a,b)=>{
      const aSel=selected.some(s=>s.name===a), bSel=selected.some(s=>s.name===b);
      return (bSel?1:0)-(aSel?1:0);
    });
    const open = isOpen(key);
    const c = groupColor||"var(--t3)";
    return `<div style="margin-bottom:6px;border:1px solid var(--border-sub);border-radius:10px;overflow:hidden">
      <button class="symcat-toggle" data-key="${key}" style="width:100%;display:flex;align-items:center;justify-content:space-between;padding:10px 12px;background:${open?"var(--surface-2)":"transparent"}">
        <span class="mono" style="font-size:10px;color:${selCount?c:"var(--t3)"};letter-spacing:1px">${groupLabel.toUpperCase()}${selCount?` <span style="color:${c}">(${selCount} selected)</span>`:""}</span>
        <span style="color:var(--t5);font-size:13px">${open?"▾":"▸"}</span>
      </button>
      ${open?chipRow(ordered,groupColor):""}
    </div>`;
  };

  const customSyms = state.settings.customSymptoms||[];
  let html = "";
  if(compoundGroups.length) html += compoundGroups.map(g=>renderGroup("cmp_"+g.label,`${g.label} — specific`, g.symptoms, g.color)).join("");
  html += Object.entries(SYMPTOM_GROUPS).map(([group,syms])=>renderGroup("grp_"+group,group,syms,group==="⚠ Red Flag Reaction"?"#FF7C7C":null)).join("");
  if(customSyms.length) html += renderGroup("custom","Custom", customSyms.map(c=>c.name), "#C9A0FF");
  // Red flag warning if any red flag symptom is selected
  const hasRedFlag = selected.some(s=>RED_FLAG_SYMPTOMS.has(s.name));
  if(hasRedFlag) html = `<div style="background:#FF7C7C18;border:1px solid #FF7C7C55;border-radius:10px;padding:10px 14px;margin-bottom:10px;font-size:11px;color:#FF7C7C;line-height:1.6">⚠️ Some reaction symptoms can be serious. Consider urgent medical advice if symptoms are severe, spreading, or involve breathing, swelling, fever, or faintness.</div>` + html;
  html += `<button id="add-custom-symptom" style="width:100%;padding:9px;border-radius:10px;border:1px dashed var(--border);color:var(--t3);font-size:12px;margin-top:8px">➕ Add Custom Symptom</button>`;
  return html;
}
function wireSymptomPicker(container, selected, color, onUpdate) {
  container.querySelectorAll(".symcat-toggle").forEach(btn=>{
    btn.onclick = () => { const k=btn.dataset.key; state._symPickerOpen[k]=!state._symPickerOpen[k]; refresh(); };
  });
  container.querySelectorAll(".symbtn").forEach(btn => {
    btn.onclick = () => {
      const name = btn.dataset.sym;
      const idx = selected.findIndex(s=>s.name===name);
      if (idx>=0) selected.splice(idx,1); else selected.push({name,intensity:2});
      refresh();
    };
  });
  container.querySelectorAll(".symint").forEach(box => {
    box.querySelectorAll("button").forEach(b => {
      b.onclick = () => { const s = selected.find(x=>x.name===box.dataset.sym); if (s) { s.intensity = +b.dataset.int; refresh(); } };
    });
  });
  const addBtn = container.querySelector("#add-custom-symptom");
  if(addBtn) addBtn.onclick = () => {
    // Inject inline form instead of opening a new modal (which would close the check-in)
    addBtn.style.display="none";
    const form=document.createElement("div");
    form.style.cssText="background:var(--surface-2);border:1px solid #C9A0FF44;border-radius:10px;padding:12px;margin-top:8px";
    form.innerHTML=`<div style="font-size:11px;color:#C9A0FF;margin-bottom:8px;letter-spacing:1px" class="mono">ADD CUSTOM SYMPTOM</div>
      <input id="cs-name-inline" class="inp" placeholder="Symptom name" style="width:100%;margin-bottom:8px;padding:9px 12px">
      <div style="display:flex;gap:6px">
        <button id="cs-cancel" style="flex:1;padding:8px;border-radius:8px;border:1px solid var(--border);color:var(--t3);font-size:12px">Cancel</button>
        <button id="cs-save" style="flex:1;padding:8px;border-radius:8px;background:#C9A0FF;color:#fff;font-size:12px;font-weight:700">Add</button>
      </div>`;
    addBtn.parentNode.insertBefore(form,addBtn);
    form.querySelector("#cs-cancel").onclick=()=>{form.remove();addBtn.style.display="";};
    form.querySelector("#cs-save").onclick=()=>{
      const name=(form.querySelector("#cs-name-inline").value||"").trim();
      if(!name) return;
      if(!state.settings.customSymptoms) state.settings.customSymptoms=[];
      if(!state.settings.customSymptoms.find(c=>c.name.toLowerCase()===name.toLowerCase())){
        state.settings.customSymptoms.push({name,category:"Other"});
        saveState();
      }
      selected.push({name,intensity:2});
      state._symPickerOpen=state._symPickerOpen||{};
      state._symPickerOpen.custom=true;
      form.remove();
      addBtn.style.display="";
      refresh();
    };
    form.querySelector("#cs-name-inline").focus();
  };
  function refresh() { container.innerHTML = symptomPickerHTML(selected, color); wireSymptomPicker(container, selected, color, onUpdate); if(onUpdate) onUpdate(); }
}

    tgt[name].doses = tgt[name].doses.filter(d=>d.id!==dose.id);
    tgt[name].doses.push(dose);
    saveState(); closeModal(); render();
  };
}

  const tagOptions=["Not sure","General",...allCompounds];

  function renderCompoundSections(){
    // Compound symptom tagging — only show if symptoms selected
    const tagSection=m.querySelector("#compound-tag-section");
    const notesSection=m.querySelector("#compound-notes-section");
    if(!tagSection||!notesSection) return;
    if(f.symptoms.length===0){tagSection.innerHTML="";notesSection.innerHTML="";return;}
    // Symptom tagging
    tagSection.innerHTML=`<label class="field-label" style="margin-top:4px">LINK SYMPTOMS TO COMPOUNDS</label>
      <div style="display:flex;flex-direction:column;gap:5px;margin-bottom:14px">
        ${f.symptoms.map(s=>{
          const tags=f.symptomTags[s.name]||[];
          return `<div style="padding:8px 10px;background:var(--surface-2);border:1px solid var(--border-sub);border-radius:9px">
            <div style="font-size:12px;color:var(--t2);margin-bottom:6px">${esc(s.name)}</div>
            <div style="display:flex;flex-wrap:wrap;gap:4px">
              ${tagOptions.map(c=>{
                const on=tags.includes(c);
                return `<button class="tag-pill" data-sym="${esc(s.name)}" data-compound="${esc(c)}"
                  style="padding:3px 9px;border-radius:99px;font-size:10px;font-weight:600;
                  background:${on?"#A78BFA22":"transparent"};border:1px solid ${on?"#A78BFA":"var(--border-sub)"};color:${on?"#A78BFA":"var(--t5)"}">${esc(c)}</button>`;
              }).join("")}
            </div>
          </div>`;
        }).join("")}
      </div>`;
    // Compound-specific notes — show for compounds that are tagged
    const taggedCompounds=[...new Set(Object.values(f.symptomTags).flat().filter(c=>c!=="Not sure"&&c!=="General"))];
    if(taggedCompounds.length){
      notesSection.innerHTML=`<label class="field-label">COMPOUND NOTES <span style="color:var(--t4);font-weight:400">(optional)</span></label>
        <div style="display:flex;flex-direction:column;gap:6px;margin-bottom:14px">
          ${taggedCompounds.map(c=>`<div style="display:flex;flex-direction:column;gap:4px">
            <span style="font-size:10px;color:var(--t4);letter-spacing:0.5px">${esc(c)}</span>
            <textarea class="inp compound-note" data-compound="${esc(c)}" placeholder="Notes for ${esc(c)}…" style="min-height:44px;resize:vertical;font-size:12px">${esc(f.compoundNotes[c]||"")}</textarea>
          </div>`).join("")}
        </div>`;
    } else { notesSection.innerHTML=""; }
    // Wire tag pills
    tagSection.querySelectorAll(".tag-pill").forEach(btn=>btn.onclick=()=>{
      const sym=btn.dataset.sym, cmp=btn.dataset.compound;
      if(!f.symptomTags[sym]) f.symptomTags[sym]=[];
      const idx=f.symptomTags[sym].indexOf(cmp);
      if(idx>=0) f.symptomTags[sym].splice(idx,1); else f.symptomTags[sym].push(cmp);
      renderCompoundSections();
    });
    // Wire compound note textareas
    notesSection.querySelectorAll(".compound-note").forEach(ta=>ta.oninput=()=>{f.compoundNotes[ta.dataset.compound]=ta.value;});
  }
  renderCompoundSections();

  // Wire supplement chips in dailyModal
  const suppChips = m.querySelectorAll(".supp-chip");
  const suppDate2 = f.date || localDate();
  const existingSupp2 = state.supplementLogs.find(l=>dayKey(l.date)===suppDate2);
  const suppTaken2 = new Set(existingSupp2?.taken||[]);
  suppChips.forEach(b=>{
    const n=b.dataset.name;
    if(suppTaken2.has(n)){ b.style.background="#C8FF9C22"; b.style.borderColor="#C8FF9C"; b.style.color="#C8FF9C"; }
    b.onclick=()=>{
      const on=suppTaken2.has(n);
      if(on){suppTaken2.delete(n);b.style.background="transparent";b.style.borderColor="var(--border)";b.style.color="var(--t4)";}
      else{suppTaken2.add(n);b.style.background="#C8FF9C22";b.style.borderColor="#C8FF9C";b.style.color="#C8FF9C";}
    };
  });
  m.querySelector("#save").onclick = () => {
    f.date=m.querySelector("#date").value; f.notes=m.querySelector("#notes").value;
    f.symptomTags = f.symptomTags||{}; f.compoundNotes = f.compoundNotes||{};
    state.dailyLogs = state.dailyLogs.filter(x=>x.id!==f.id); state.dailyLogs.push(f);
    // Also save supplement selection if any chips were shown
    if(suppChips.length){
      state.supplementLogs=(state.supplementLogs||[]).filter(l=>dayKey(l.date)!==f.date);
      if(suppTaken2.size) state.supplementLogs.push({id:uid(),date:f.date,taken:[...suppTaken2]});
    }
    saveState(); closeModal(); render();
  };
}

function buildAminoContext() {
  const aps = allPeptides();
  const started = Object.entries(aps).filter(([,d])=>(d.doses||[]).length>0);
  const lines = [
    `USER: ${state.profile.name||"Deidra"}, protocol started ${state.profile.startDate||"unknown"}.`,
    `ACTIVE COMPOUNDS:`,
    ...started.map(([n,d])=>{
      const doses=[...d.doses].sort((a,b)=>new Date(b.date)-new Date(a.date));
      const last=doses[0]; const c=cfg(n);
      const next=last?addDays(last.date,d.scheduleDays):null;
      return `  ${n}: ${doses.length} doses. Last: ${last?fmtDate(last.date)+" ("+esc(last.dose||"?")+c.unit+")":"never"}. Next due: ${next?fmtDate(next):"unknown"}. Every ${d.scheduleDays}d.`;
    }),
    `STASH: ${state.supplies.map(s=>{
      const rem=Math.max(0,(s.totalVials||0)*(s.vialMg||0)-(()=>{
        const allD=(aps[s.name]?.doses||[]);
        const sameCompoundKits=state.supplies.filter(k=>k.name===s.name);
        const tagged=allD.filter(d=>d.kitId===s.id);
        const legacy=sameCompoundKits.length===1?allD.filter(d=>!d.kitId):[];
        return [...tagged,...legacy].reduce((a,d)=>a+doseToMg(d.dose,cfg&&cfg(s?.name||name||"")?.unit||"mg"),0);
      })());
      const exp=s.reconDate&&s.expiryDays?Math.ceil((new Date(addDays(s.reconDate,s.expiryDays)).getTime()-Date.now())/86400000):null;
      return `${s.name}: ${rem.toFixed(1)}mg left${exp!==null?", vial expires "+exp+"d":""}`;
    }).join("; ")||"none"}`,
    `RECENT CHECK-INS: ${[...state.dailyLogs].sort((a,b)=>new Date(b.date)-new Date(a.date)).slice(0,7).map(l=>{
      const mood=MOODS.find(m=>m.v===l.mood); const syms=(l.symptoms||[]).map(s=>typeof s==="string"?s:s.name);
      return `${fmtDate(l.date)} ${mood?mood.label:""}${syms.length?" ["+syms.slice(0,3).join(",")+"]":""}`;
    }).join("; ")||"none"}`,
    `WEIGHT: ${[...state.weightLogs].sort((a,b)=>new Date(b.date)-new Date(a.date)).slice(0,3).map(w=>`${fmtDate(w.date)}: ${w.weight}${state.settings.weightUnit}`).join(", ")||"none"}`,
    `TODAY: ${new Date().toLocaleDateString("en-CA",{weekday:"long",month:"long",day:"numeric",year:"numeric"})}`,
  ];
  return lines.join("\n");
}

function nexusAnswer(input) {
  const q = input.toLowerCase().trim();
  const aps = allPeptides();
  const started = Object.entries(aps).filter(([,d])=>(d.doses||[]).length>0);
  const active  = started.filter(([,d])=>(d.status||"active")==="active");

  // ── Next shot ──────────────────────────────────────────────────────────────
  if (/next.*(shot|dose|inject|pin)|when.*(do i|should i).*(inject|dose|take|pin)|due/.test(q)) {
    if (!active.length) return "No active compounds yet — log your first dose to get started.";
    const lines = active.map(([n,d])=>{
      const last=[...d.doses].sort((a,b)=>new Date(b.date)-new Date(a.date))[0];
      const next=addDays(last.date,d.scheduleDays);
      const dl=Math.ceil((new Date(next).getTime()-Date.now())/86400000);
      const c=cfg(n);
      if(dl<0) return `**${n}**: overdue by ${Math.abs(dl)} day${Math.abs(dl)===1?"":"s"} (was due ${fmtDate(next)})`;
      if(dl===0) return `**${n}**: due TODAY`;
      return `**${n}**: due ${fmtDate(next)} — in ${dl} day${dl===1?"":"s"}`;
    });
    return lines.join("\n");
  }

  // ── Stash / how much left ──────────────────────────────────────────────────
  if (/stash|how much|remaining|left|supply|mg|vial/.test(q)) {
    if (!state.supplies.length) return "No stash entries yet. Add a kit in the Stash tab.";
    const lines = state.supplies.map(s=>{
      const used=(()=>{
        const allD=(aps[s.name]?.doses||[]);
        const sameCompoundKits=state.supplies.filter(k=>k.name===s.name);
        const tagged=allD.filter(d=>d.kitId===s.id);
        const legacy=sameCompoundKits.length===1?allD.filter(d=>!d.kitId):[];
        return [...tagged,...legacy].reduce((a,d)=>a+doseToMg(d.dose,cfg&&cfg(s?.name||name||"")?.unit||"mg"),0);
      })();
      const rem=Math.max(0,(s.totalVials||0)*(s.vialMg||0)-used);
      const exp=s.reconDate&&s.expiryDays?Math.ceil((new Date(addDays(s.reconDate,s.expiryDays)).getTime()-Date.now())/86400000):null;
      return `**${s.name}**: ${rem.toFixed(1)} mg remaining (${s.totalVials} vials × ${s.vialMg}mg)${exp!==null?`, vial expires in ${exp}d`:""}`;
    });
    return lines.join("\n");
  }

  // ── Symptoms ───────────────────────────────────────────────────────────────
  if (/symptom|side effect|nausea|fatigue|feel|feeling|bloat|constip|energy|appetite/.test(q)) {
    if (!state.dailyLogs.length) return "No check-ins logged yet. Tap + Check-in on Today to start tracking how you feel.";
    const count={};
    state.dailyLogs.forEach(l=>(l.symptoms||[]).forEach(s=>{
      const n=typeof s==="string"?s:s.name; count[n]=(count[n]||0)+1;
    }));
    const sorted=Object.entries(count).sort((a,b)=>b[1]-a[1]);
    if(!sorted.length) return "You haven't logged any symptoms yet in your check-ins.";
    const top=sorted.slice(0,5).map(([n,c])=>`${n} (×${c})`).join(", ");
    return `Your top symptoms across ${state.dailyLogs.length} check-ins:\n${top}`;
  }

  // ── Adherence / on track ───────────────────────────────────────────────────
  if (/on track|adherence|missed|adherent|protocol|doing/.test(q)) {
    const weekStart=startOfWeek(new Date());
    const wkDoses=Object.values(aps).flatMap(d=>(d.doses||[]).filter(x=>new Date(x.date)>=weekStart));
    const wkLogs=state.dailyLogs.filter(l=>new Date(l.date)>=weekStart);
    return `This week: **${wkDoses.length}** dose${wkDoses.length===1?"":"s"} logged, **${wkLogs.length}** check-in${wkLogs.length===1?"":"s"} (out of 7 days).\n${wkDoses.length>0&&wkLogs.length>=3?"Looks like you're staying on top of it ✓":"Keep going — daily check-ins make the trough analysis sharper."}`;
  }

  // ── Protocol start / how long ──────────────────────────────────────────────
  if (/how long|protocol|started|day|week|been on/.test(q)) {
    if (!state.profile.startDate) return "No protocol start date set. Go to Profile → Edit to set it.";
    const days=Math.floor((Date.now()-new Date(state.profile.startDate).getTime())/86400000);
    const weeks=Math.floor(days/7);
    return `You've been on protocol for **${days} days** (${weeks} week${weeks===1?"":"s"}), since ${fmtDate(state.profile.startDate)}.`;
  }

  // ── Weight ─────────────────────────────────────────────────────────────────
  if (/weight|weigh|lbs|kg|lost|gained/.test(q)) {
    if (!state.weightLogs.length) return "No weight logs yet. Tap ⚖ Weight on Today to start tracking.";
    const sorted=[...state.weightLogs].sort((a,b)=>new Date(a.date)-new Date(b.date));
    const first=sorted[0], last=sorted[sorted.length-1];
    const delta=(parseFloat(last.weight)-parseFloat(first.weight)).toFixed(1);
    const sign=parseFloat(delta)>0?"+":"";
    return `Current: **${last.weight} ${state.settings.weightUnit}** (${fmtDate(last.date)})\nChange since ${fmtDate(first.date)}: **${sign}${delta} ${state.settings.weightUnit}**`;
  }

  // ── Trough ─────────────────────────────────────────────────────────────────
  if (/trough/.test(q)) {
    return `The **trough** is the point in your dosing cycle when the medication is at its lowest level — typically a few days before your next injection. For Retatrutide (6-day half-life, weekly dosing), this is around days 5–7. You may notice symptoms returning: appetite coming back, food noise increasing, or energy dipping. These are signals your levels are dropping. The app tracks your trough symptoms automatically from your check-ins — see Trends → Retatrutide → Trough Analysis.`;
  }

  // ── What is [compound] ─────────────────────────────────────────────────────
  const compMatch = q.match(/what is|what's|tell me about|explain/) && Object.keys(PEPTIDES).find(n=>q.includes(n.toLowerCase()));
  if (compMatch) {
    const c=cfg(compMatch);
    const d=aps[compMatch];
    const doses=(d?.doses||[]).length;
    return `**${compMatch}** — ${c.unit} dosing, ${c.halfLifeDays?c.halfLifeDays+"-day half-life":""}.\nYou have ${doses} dose${doses===1?"":"s"} logged.${doses>0?` Last dose: ${fmtDate([...d.doses].sort((a,b)=>new Date(b.date)-new Date(a.date))[0].date)}.`:""}\n\nFor detailed info, go to Nexus → Learn → Discover Peptides.`;
  }

  // ── Dose count ─────────────────────────────────────────────────────────────
  if (/how many dose|total dose|dose count/.test(q)) {
    const lines=active.map(([n,d])=>`**${n}**: ${d.doses.length} doses`);
    return lines.length?lines.join("\n"):"No active compounds yet.";
  }

  // ── Mood ───────────────────────────────────────────────────────────────────
  if (/mood|feel|emotion|mental|how am i/.test(q)) {
    if (!state.dailyLogs.length) return "No check-ins logged yet.";
    const recent=[...state.dailyLogs].sort((a,b)=>new Date(b.date)-new Date(a.date)).slice(0,7);
    const avg=recent.reduce((a,l)=>a+l.mood,0)/recent.length;
    const moodObj=MOODS.reduce((b,m)=>Math.abs(m.v-avg)<Math.abs(b.v-avg)?m:b);
    return `Average mood over your last ${recent.length} check-ins: **${moodObj.emoji} ${moodObj.label}**`;
  }

  // ── Fallback ───────────────────────────────────────────────────────────────
  return `I can answer questions about:\n• **Next shot** — "When's my next dose?"\n• **Stash** — "How much Retatrutide is left?"\n• **Symptoms** — "What symptoms am I getting most?"\n• **Progress** — "How long have I been on protocol?"\n• **Weight** — "How much weight have I lost?"\n• **Trough** — "What does trough mean?"\n• **Compounds** — "What is BPC-157?"\n\nTry one of these!`;
}

function insightsFeed() {
  const cards = [];
  const ic = (icon,headline,detail,color,cat="pattern") => cards.push({icon,headline,detail,color,cat});
  const now = Date.now();
  const aps = allPeptides();
  const activeCompounds = Object.entries(aps).filter(([,p])=>(p.doses||[]).length && (p.status||"active")==="active");

  // ── 1. WHAT CHANGED (last 14d vs prior 14d) ──────────────────────────
  activeCompounds.forEach(([n,p])=>{
    const doses=[...p.doses].sort((a,b)=>new Date(a.date)-new Date(b.date));
    const last=doses[doses.length-1], prev=doses[doses.length-2];
    if(last && prev && parseFloat(last.dose)!==parseFloat(prev.dose) && parseFloat(last.dose) && parseFloat(prev.dose)){
      ic("💊", `${n} dose changed`, `${prev.dose} → ${last.dose} ${cfg(n).unit||"mg"} on ${fmtDate(last.date)}`, cfg(n).color,"changed");
    }
  });
  // New supplement
  (state.settings.supplements||[]).forEach(s=>{
    const firstLog=state.supplementLogs.filter(l=>(l.taken||[]).includes(s)).sort((a,b)=>new Date(a.date)-new Date(b.date))[0];
    if(firstLog){ const days=Math.floor((now-new Date(firstLog.date).getTime())/86400000); if(days>=1&&days<=14) ic("🌿",`Started ${s}`,`${days}d ago`,"#C8FF9C","changed"); }
  });
  // Weight trend
  if(state.weightLogs.length>=4){
    const sorted=[...state.weightLogs].sort((a,b)=>new Date(a.date)-new Date(b.date));
    const recent=sorted.filter(w=>(now-new Date(w.date).getTime())<=14*86400000);
    const prior=sorted.filter(w=>{const d=now-new Date(w.date).getTime();return d>14*86400000&&d<=28*86400000;});
    if(recent.length>=2&&prior.length>=2){
      const avgR=recent.reduce((a,b)=>a+parseFloat(b.weight),0)/recent.length;
      const avgP=prior.reduce((a,b)=>a+parseFloat(b.weight),0)/prior.length;
      const diff=avgR-avgP;
      if(Math.abs(diff)>=1) ic(diff<0?"📉":"📈", `Weight ${diff<0?"down":"up"} ${Math.abs(diff).toFixed(1)} ${state.settings.weightUnit}`, "vs. prior 2 weeks","#8AB4FF","changed");
    }
  }

  // ── SYMPTOM INTELLIGENCE (shared across hero/changed/correlation/prediction) ──
  const heroCandidates=[]; // {text, confidence:'high'|'medium', detail}
  const changedRows=[]; // {sym,pct,dir}
  activeCompounds.forEach(([n,p])=>{
    const c=cfg(n);
    const doses=[...p.doses].sort((a,b)=>new Date(a.date)-new Date(b.date));
    const allSyms=[...state.dailyLogs.filter(l=>l.compound===n),...p.doses].flatMap(l=>(l.symptoms||[]).map(s=>({name:typeof s==="string"?s:s.name,date:l.date})));
    if(allSyms.length<6) return;
    const daysSinceDose=date=>{const t=new Date(date).getTime();let best=null;doses.forEach(d=>{const dt=(t-new Date(d.date).getTime())/86400000;if(dt>=0&&(best===null||dt<best))best=dt;});return best;};
    const uniqSyms=[...new Set(allSyms.map(s=>s.name))];

    // What Changed: 14d vs prior 14d per symptom (top 4 by volume)
    uniqSyms.forEach(sym=>{
      const recent=allSyms.filter(s=>s.name===sym&&(now-new Date(s.date).getTime())<=14*86400000).length;
      const prior=allSyms.filter(s=>s.name===sym&&(now-new Date(s.date).getTime())>14*86400000&&(now-new Date(s.date).getTime())<=28*86400000).length;
      if(prior<2&&recent<2) return;
      if(prior===0&&recent===0) return;
      const pct=prior===0?(recent>0?100:0):Math.round((recent-prior)/prior*100);
      if(prior>=2||recent>=2) changedRows.push({sym,pct,dir:Math.abs(pct)<20?"flat":pct<0?"down":"up"});
    });

    // Phase correlation per symptom (for hero + correlation cards)
    uniqSyms.forEach(sym=>{
      const occ=allSyms.filter(s=>s.name===sym);
      if(occ.length<5) return;
      if(c.phases){
        const phases=occ.map(s=>{const dd=daysSinceDose(s.date);if(dd==null)return null;const ph=currentPhase(c.phases,dd);return ph?ph.label:null;}).filter(Boolean);
        if(phases.length>=5){
          const tally={};phases.forEach(ph=>tally[ph]=(tally[ph]||0)+1);
          const [topPhase,topN]=Object.entries(tally).sort((a,b)=>b[1]-a[1])[0];
          const pct=Math.round(topN/phases.length*100);
          if(pct>=70) heroCandidates.push({confidence:"high",text:`${sym} is strongly associated with the ${topPhase}.`,detail:`${pct}% of occurrences`});
          else if(pct>=50) heroCandidates.push({confidence:"medium",text:`${sym} most often occurs during ${topPhase}.`,detail:`${pct}% of occurrences`});
        }
      }
      // Day-of-cycle clustering
      const days=occ.map(s=>daysSinceDose(s.date)).filter(v=>v!=null);
      if(days.length>=5){
        const avg=days.reduce((a,b)=>a+b,0)/days.length;
        const variance=days.reduce((a,b)=>a+(b-avg)**2,0)/days.length;
        if(variance<=2.5){ // tight clustering = high confidence
          heroCandidates.push({confidence:"high",text:`${sym} consistently appears around Day ${Math.round(avg)}.`,detail:`Based on ${days.length} occurrences`});
        }
      }
    });

    // Overall trend: total symptom burden this month vs first month
    const firstDoseT=new Date(doses[0].date).getTime();
    const monthsSince=(now-firstDoseT)/(30*86400000);
    if(monthsSince>=2){
      const firstMonth=allSyms.filter(s=>(new Date(s.date).getTime()-firstDoseT)<=30*86400000).length;
      const recentMonth=allSyms.filter(s=>(now-new Date(s.date).getTime())<=30*86400000).length;
      if(firstMonth>=5){
        const pctChange=Math.round((recentMonth-firstMonth)/firstMonth*100);
        if(pctChange<=-30) heroCandidates.push({confidence:"high",text:`Overall symptoms have decreased ${Math.abs(pctChange)}% since your first month on ${n}.`,detail:""});
      }
    }
  });

  // Sort hero candidates: high confidence first, pick the single best
  // Rank by confidence × usefulness × rarity, not confidence alone.
  // usefulness: longer streaks / bigger swings / actionable timing > generic phase association
  // rarity: fewer total heroCandidates sharing the same compound+symptom = more novel
  const confScore = h => h.confidence==="high" ? 1 : 0.6;
  const usefulScore = h => {
    if(/consistently appears around Day/.test(h.text)) return 1; // precise, actionable timing
    if(/decreased \d+%|increased \d+%/.test(h.text)) return 0.9; // big quantified swing
    if(/strongly associated/.test(h.text)) return 0.8;
    if(/most often occurs/.test(h.text)) return 0.6; // weaker phase tie
    return 0.7;
  };
  heroCandidates.forEach(h=>{ h._score = confScore(h)*usefulScore(h)*(h._rarity||1); });
  heroCandidates.sort((a,b)=>b._score-a._score);
  const hero = heroCandidates[0];

  // What Changed rollup (max 4, prioritize biggest movers)
  const topChanged = changedRows.sort((a,b)=>Math.abs(b.pct)-Math.abs(a.pct)).slice(0,4);

  // Milestone expansion
  activeCompounds.forEach(([n,p])=>{
    if(p.doses.length===5) ic("🏆","Five injections completed",n,cfg(n).color,"milestone");
    // First month completed
    const firstD=new Date([...p.doses].sort((a,b)=>new Date(a.date)-new Date(b.date))[0].date).getTime();
    const dOn=Math.floor((now-firstD)/86400000);
    if(dOn===30) ic("🏆","First month completed",n,cfg(n).color,"milestone");
  });
  if(state.dailyLogs.length){
    const sortedLogs=[...state.dailyLogs].sort((a,b)=>new Date(a.date)-new Date(b.date));
    let streak=0,maxStreak=0,prevDate=null;
    sortedLogs.forEach(l=>{const d=dayKey(l.date);if(prevDate&&addDays(prevDate,1)===d)streak++;else streak=1;maxStreak=Math.max(maxStreak,streak);prevDate=d;});
    if(maxStreak===30) ic("🏆","30 consecutive days logged","",  "#F9C87D","milestone");

    // First week without nausea-type symptom (or top symptom) — last 7 logged days have zero of it
    const last14=sortedLogs.slice(-14);
    if(last14.length>=7){
      const last7=sortedLogs.slice(-7);
      const allNames=[...new Set(sortedLogs.flatMap(l=>(l.symptoms||[]).map(s=>typeof s==="string"?s:s.name)))];
      allNames.forEach(sym=>{
        const hadBeforeCount=sortedLogs.slice(0,-7).filter(l=>(l.symptoms||[]).some(s=>(typeof s==="string"?s:s.name)===sym)).length;
        const hasNow=last7.some(l=>(l.symptoms||[]).some(s=>(typeof s==="string"?s:s.name)===sym));
        if(hadBeforeCount>=4 && !hasNow) ic("🏆",`First week without ${sym}`,"",  "#7DF9C0","milestone");
      });
    }

    // Lowest symptom burden week so far (needs 4+ weeks of data)
    if(sortedLogs.length>=12){
      const weekBuckets={};
      sortedLogs.forEach(l=>{const wk=Math.floor((new Date(l.date)-new Date(sortedLogs[0].date))/(7*86400000));(weekBuckets[wk]=weekBuckets[wk]||[]).push(l);});
      const weekKeys=Object.keys(weekBuckets);
      if(weekKeys.length>=4){
        const burden=wk=>weekBuckets[wk].reduce((a,l)=>a+(l.symptoms||[]).length,0)/weekBuckets[wk].length;
        const lastWk=weekKeys[weekKeys.length-1];
        const minWk=weekKeys.reduce((a,b)=>burden(a)<burden(b)?a:b);
        if(lastWk===minWk && burden(lastWk)<burden(weekKeys[0])) ic("🏆","Lowest symptom burden so far","This week","#7DF9C0","milestone");
      }
    }
  }
  // Largest waist/measurement reduction recorded
  if(state.measurementLogs && state.measurementLogs.length>=3){
    const waist=state.measurementLogs.filter(m=>m.waist).sort((a,b)=>new Date(a.date)-new Date(b.date));
    if(waist.length>=3){
      let maxDrop=0;
      for(let i=1;i<waist.length;i++){ const d=parseFloat(waist[i-1].waist)-parseFloat(waist[i].waist); if(d>maxDrop) maxDrop=d; }
      const lastDrop=parseFloat(waist[waist.length-2]?.waist||0)-parseFloat(waist[waist.length-1].waist);
      if(maxDrop>0 && lastDrop===maxDrop) ic("🏆","Largest waist reduction recorded",`${maxDrop.toFixed(1)} ${state.settings.measureUnit||"in"}`,"#7DF9C0","milestone");
    }
  }
  activeCompounds.forEach(([n,p])=>{
    const nDoses=p.doses.length;
    if([10,25,50].includes(nDoses)) ic("💉", `${nDoses}th ${n} dose logged`, "", cfg(n).color,"milestone");
    const days=Math.floor(daysSince(p.doses[0].date)||0);
    if([30,90,180].includes(days)) ic("📅", `${days} days on ${n}`, "", cfg(n).color,"milestone");
  });
  if(state.profile.goalWeight && state.weightLogs.length){
    const latest=parseFloat([...state.weightLogs].sort((a,b)=>new Date(b.date)-new Date(a.date))[0].weight);
    const start=parseFloat(state.profile.startWeight||latest);
    const goal=parseFloat(state.profile.goalWeight);
    const totalDelta=Math.abs(start-goal), progressDelta=Math.abs(start-latest);
    [5,10,15,20].forEach(m=>{ if(progressDelta>=m && progressDelta<m+1 && totalDelta>=m) ic("🎯",`${m} ${state.settings.weightUnit} toward goal`,"",  "#7DF9C0","milestone"); });
  }

  // ── 3. CORRELATIONS (top 1-2 strongest only) ─────────────────────────
  let bestCorr=null;
  activeCompounds.forEach(([n,p])=>{
    if(!state.supplementLogs.length) return;
    const supps=[...new Set(state.supplementLogs.flatMap(s=>s.taken||[]))];
    supps.forEach(supp=>{
      const takenDays=new Set(state.supplementLogs.filter(s=>(s.taken||[]).includes(supp)).map(s=>dayKey(s.date)));
      const logs=state.dailyLogs.filter(l=>dayKey(l.date)>=dayKey(p.doses[0].date));
      const withS=logs.filter(l=>takenDays.has(dayKey(l.date)));
      const withoutS=logs.filter(l=>!takenDays.has(dayKey(l.date)));
      if(withS.length<5||withoutS.length<5) return;
      const rateW=withS.reduce((a,l)=>a+(l.symptoms||[]).length,0)/withS.length;
      const rateWo=withoutS.reduce((a,l)=>a+(l.symptoms||[]).length,0)/withoutS.length;
      if(rateWo===0) return;
      const pctDiff=Math.round((rateW-rateWo)/rateWo*100);
      if(Math.abs(pctDiff)>=25 && (!bestCorr||Math.abs(pctDiff)>Math.abs(bestCorr.pctDiff))) bestCorr={supp,pctDiff,n};
    });
  });
  if(bestCorr) ic("🔗", `${bestCorr.supp}`, `Days taken had ${Math.abs(bestCorr.pctDiff)}% ${bestCorr.pctDiff<0?"fewer":"more"} symptom logs`,"#C8FF9C","pattern");

  // Weight loss vs hunger-report correlation (across weeks)
  if(state.weightLogs.length>=4 && state.dailyLogs.length>=8){
    const wSorted=[...state.weightLogs].sort((a,b)=>new Date(a.date)-new Date(b.date));
    const weeklyHunger={}, weeklyWeightDelta={};
    for(let i=1;i<wSorted.length;i++){
      const wk=Math.floor((new Date(wSorted[i].date)-new Date(wSorted[0].date))/(7*86400000));
      weeklyWeightDelta[wk]=(weeklyWeightDelta[wk]||0)+(parseFloat(wSorted[i].weight)-parseFloat(wSorted[i-1].weight));
    }
    state.dailyLogs.forEach(l=>{
      const hungerSyms=(l.symptoms||[]).filter(s=>{const n=typeof s==="string"?s:s.name;return /hunger|food noise|appetite/i.test(n);});
      if(!hungerSyms.length) return;
      const wk=Math.floor((new Date(l.date)-new Date(wSorted[0].date))/(7*86400000));
      weeklyHunger[wk]=(weeklyHunger[wk]||0)+hungerSyms.length;
    });
    const wks=Object.keys(weeklyWeightDelta).filter(wk=>weeklyHunger[wk]!=null);
    if(wks.length>=4){
      const lowHungerWks=wks.filter(wk=>weeklyHunger[wk]<=1);
      const highHungerWks=wks.filter(wk=>weeklyHunger[wk]>=2);
      if(lowHungerWks.length>=2 && highHungerWks.length>=2){
        const avgLoss=arr=>arr.reduce((a,wk)=>a+weeklyWeightDelta[wk],0)/arr.length;
        const lossLow=avgLoss(lowHungerWks), lossHigh=avgLoss(highHungerWks);
        if(lossLow<lossHigh-0.3) heroCandidates.push({confidence:"medium",text:"Weight loss tends to be stronger in weeks with fewer hunger reports.",detail:`${lowHungerWks.length} low-hunger weeks vs ${highHungerWks.length} high-hunger weeks`});
      }
    }
  }

  // Mood vs phase correlation (needs 8+ mood-tagged logs across a compound's phases)
  activeCompounds.forEach(([n,p])=>{
    const c=cfg(n); if(!c.phases) return;
    const doses=[...p.doses].sort((a,b)=>new Date(a.date)-new Date(b.date));
    const daysSinceDose=date=>{const t=new Date(date).getTime();let best=null;doses.forEach(d=>{const dt=(t-new Date(d.date).getTime())/86400000;if(dt>=0&&(best===null||dt<best))best=dt;});return best;};
    const moodLogs=state.dailyLogs.filter(l=>l.compound===n && l.mood!=null);
    if(moodLogs.length<8) return;
    const byPhase={};
    moodLogs.forEach(l=>{const dd=daysSinceDose(l.date);if(dd==null)return;const ph=currentPhase(c.phases,dd);if(!ph)return;(byPhase[ph.label]=byPhase[ph.label]||[]).push(l.mood);});
    const phaseEntries=Object.entries(byPhase).filter(([,arr])=>arr.length>=2);
    if(phaseEntries.length<2) return;
    const avgs=phaseEntries.map(([ph,arr])=>[ph,arr.reduce((a,b)=>a+b,0)/arr.length]);
    avgs.sort((a,b)=>b[1]-a[1]);
    const [bestPh,bestAvg]=avgs[0], [worstPh,worstAvg]=avgs[avgs.length-1];
    if(bestAvg-worstAvg>=0.8) ic("🙂",`Mood tends to be lowest during ${worstPh}`,`Highest during ${bestPh}`,"#8AB4FF","pattern");
  });

  // 1. Injection site ↔ symptom correlation (site-reaction symptoms only: redness, irritation, soreness, swelling, bruising)
  activeCompounds.forEach(([n,p])=>{
    const siteDoses = p.doses.filter(d=>d.site && (d.symptoms||[]).length);
    if(siteDoses.length<8) return;
    const siteRxSyms = sym => /redness|irritation|sore|swel|bruis|itch/i.test(sym);
    const bySite={};
    siteDoses.forEach(d=>{
      const names=(d.symptoms||[]).map(s=>typeof s==="string"?s:s.name);
      const hasRx = names.some(siteRxSyms);
      (bySite[d.site]=bySite[d.site]||{total:0,rx:0}).total++;
      if(hasRx) bySite[d.site].rx++;
    });
    const siteEntries=Object.entries(bySite).filter(([,v])=>v.total>=3);
    if(siteEntries.length<2) return;
    const rates=siteEntries.map(([site,v])=>[site,v.rx/v.total]);
    rates.sort((a,b)=>b[1]-a[1]);
    const [worstSite,worstRate]=rates[0];
    if(worstRate>=0.4 && worstRate>=rates[rates.length-1][1]*2) ic("📍",`${worstSite} shows more site reactions`,`${Math.round(worstRate*100)}% of doses at this site`,"#F9C87D","pattern");
  });

  // 2. Escalation-dose outcomes — do escalated doses produce more/fewer symptoms than routine doses?
  activeCompounds.forEach(([n,p])=>{
    const c=cfg(n);
    const sorted=[...p.doses].sort((a,b)=>new Date(a.date)-new Date(b.date));
    const cycleSymCount = (doseIdx) => {
      const s=new Date(sorted[doseIdx].date).getTime();
      const e=sorted[doseIdx+1]?new Date(sorted[doseIdx+1].date).getTime():s+(p.scheduleDays||7)*86400000;
      const logs=state.dailyLogs.filter(l=>{const t=new Date(l.date).getTime();return t>=s&&t<e;});
      return [...logs.flatMap(l=>(l.symptoms||[]).map(x=>typeof x==="string"?x:x.name)),...(sorted[doseIdx].symptoms||[]).map(x=>typeof x==="string"?x:x.name)].length;
    };
    const escIdx=[],routineIdx=[];
    sorted.forEach((d,i)=>{ if(d.escalation) escIdx.push(i); else routineIdx.push(i); });
    if(escIdx.length<3 || routineIdx.length<3) return;
    const avg=arr=>arr.length?arr.reduce((a,b)=>a+b,0)/arr.length:0;
    const escAvg=avg(escIdx.map(cycleSymCount)), routineAvg=avg(routineIdx.map(cycleSymCount));
    if(routineAvg>0){
      const pctDiff=Math.round((escAvg-routineAvg)/routineAvg*100);
      if(Math.abs(pctDiff)>=30) ic(pctDiff>0?"⚠️":"✓", `Escalated doses tend to bring ${pctDiff>0?"more":"fewer"} symptoms`, `${Math.abs(pctDiff)}% ${pctDiff>0?"more":"fewer"} than routine ${n} doses`, pctDiff>0?"#F9C87D":"#7DF9C0","pattern");
    }
  });

  // 3. Protein intake ↔ symptom burden (esp. nausea — common GLP-1 pattern)
  if(state.macroLogs.length>=8 && state.dailyLogs.length>=8){
    const proteinDays={}; state.macroLogs.forEach(m=>{ if(m.protein) proteinDays[dayKey(m.date)]=parseFloat(m.protein); });
    const proteinVals=Object.values(proteinDays);
    if(proteinVals.length>=8){
      const median=[...proteinVals].sort((a,b)=>a-b)[Math.floor(proteinVals.length/2)];
      const lowDays=new Set(Object.entries(proteinDays).filter(([,v])=>v<median*0.7).map(([k])=>k));
      const highDays=new Set(Object.entries(proteinDays).filter(([,v])=>v>=median*0.7).map(([k])=>k));
      const lowLogs=state.dailyLogs.filter(l=>lowDays.has(dayKey(l.date)));
      const highLogs=state.dailyLogs.filter(l=>highDays.has(dayKey(l.date)));
      if(lowLogs.length>=4 && highLogs.length>=4){
        const rateLow=lowLogs.reduce((a,l)=>a+(l.symptoms||[]).length,0)/lowLogs.length;
        const rateHigh=highLogs.reduce((a,l)=>a+(l.symptoms||[]).length,0)/highLogs.length;
        if(rateHigh>0){
          const pctDiff=Math.round((rateLow-rateHigh)/rateHigh*100);
          if(pctDiff>=30) ic("🥩","Low-protein days show more symptoms",`${pctDiff}% more symptom reports vs. higher-protein days`,"#F9C87D","pattern");
        }
      }
    }
  }

  // Dose-increase impact on symptom burden
  activeCompounds.forEach(([n,p])=>{
    const sorted=[...p.doses].sort((a,b)=>new Date(a.date)-new Date(b.date));
    for(let i=1;i<sorted.length;i++){
      if(parseFloat(sorted[i].dose)>parseFloat(sorted[i-1].dose)){
        const incDate=new Date(sorted[i].date).getTime();
        const before=state.dailyLogs.filter(l=>{const d=new Date(l.date).getTime();return d<incDate&&d>=incDate-14*86400000;});
        const after=state.dailyLogs.filter(l=>{const d=new Date(l.date).getTime();return d>=incDate&&d<incDate+14*86400000;});
        if(before.length>=3&&after.length>=3){
          const rateB=before.reduce((a,l)=>a+(l.symptoms||[]).length,0)/before.length;
          const rateA=after.reduce((a,l)=>a+(l.symptoms||[]).length,0)/after.length;
          if(rateB>0){
            const pct=Math.round((rateA-rateB)/rateB*100);
            if(pct<=-25) ic("✨",`Symptoms eased after increasing ${n}`,`Since reaching ${sorted[i].dose}${cfg(n).unit} (${Math.abs(pct)}% fewer reports)`,"#7DF9C0","pattern");
            else if(pct>=40) ic("⚠️",`Symptoms increased after raising ${n}`,`Since reaching ${sorted[i].dose}${cfg(n).unit} (${pct}% more reports)`,"#F9C87D","pattern");
          }
        }
      }
    }
  });

  // ── 4. PREDICTIONS (schedule-based + pattern-based) ───────────────
  const lookingAhead=[];
  activeCompounds.forEach(([n,p])=>{
    const c=cfg(n); const doses=[...p.doses].sort((a,b)=>new Date(b.date)-new Date(a.date));
    const last=doses[0]; if(!last) return;
    const ds=daysSince(last.date)||0;
    const nextDue=addDays(dayKey(last.date), p.scheduleDays||7);
    lookingAhead.push(`Next ${n} dose: ${fmtDate(nextDue)}`);
    lookingAhead.push(`Currently Day ${Math.floor(ds)+1} of this cycle`);
    if(c.phases){
      const nextPhase=c.phases.find(ph2=>ph2.range[0]>ds);
      if(nextPhase){ const daysUntil=Math.ceil(nextPhase.range[0]-ds); if(daysUntil<=3) lookingAhead.push(`Entering ${nextPhase.label} in ~${daysUntil}d`); }
    }
    // Pattern-based: symptom expected to return based on past cycles (needs 3+ complete cycles)
    const allSyms=[...state.dailyLogs.filter(l=>l.compound===n),...p.doses].flatMap(l=>(l.symptoms||[]).map(s=>({name:typeof s==="string"?s:s.name,date:l.date})));
    const daysSinceDose=date=>{const t=new Date(date).getTime();let best=null;doses.forEach(d=>{const dt=(t-new Date(d.date).getTime())/86400000;if(dt>=0&&(best===null||dt<best))best=dt;});return best;};
    if(doses.length>=3){
      const symDayMap={};
      allSyms.forEach(s=>{const dd=daysSinceDose(s.date);if(dd!=null){(symDayMap[s.name]=symDayMap[s.name]||[]).push(dd);}});
      Object.entries(symDayMap).forEach(([sym,days])=>{
        if(days.length<3) return;
        // Only use occurrences that happened at least 3.5+ days after dose (avoids Day 0-1 suppression artifacts)
        const minDay=(p.scheduleDays||7)>=6?3.5:2;
        const filteredDays=days.filter(d=>d>=minDay);
        if(filteredDays.length<3) return;
        const avg=filteredDays.reduce((a,b)=>a+b,0)/filteredDays.length;
        if(avg>ds && avg-ds<=2.5) lookingAhead.push(`${sym} typically returns around Day ${Math.round(avg)} — you're close`);
      });
    }
  });

  if(!cards.length && !hero && !topChanged.length && !lookingAhead.length) return `<div style="text-align:center;padding:40px 20px"><div style="font-size:30px;margin-bottom:10px">✨</div><div style="font-size:13px;color:var(--t3)">Keep logging — insights appear once there's enough data to find real patterns.</div></div>`;

  const heroHtml = hero ? `<div style="background:linear-gradient(135deg,#A78BFA22,#A78BFA08);border:1px solid #A78BFA44;border-radius:14px;padding:16px;margin-bottom:14px">
    <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:6px">
      <span class="mono" style="font-size:9px;color:#A78BFA;letter-spacing:1.5px">TOP INSIGHT</span>
      <span style="font-size:9px;font-weight:600;color:${hero.confidence==="high"?"#7DF9C0":"#F9C87D"};background:${hero.confidence==="high"?"#7DF9C022":"#F9C87D22"};padding:2px 7px;border-radius:8px">${hero.confidence==="high"?"HIGH CONFIDENCE":"MEDIUM CONFIDENCE"}</span>
    </div>
    <div style="font-size:14px;color:var(--t1);font-weight:600;line-height:1.4">💡 ${esc(hero.text)}</div>
    ${hero.detail?`<div style="font-size:11px;color:var(--t4);margin-top:4px">${esc(hero.detail)}</div>`:""}
  </div>` : "";

  const changedHtml = topChanged.length ? `<div style="background:var(--surface-2);border:1px solid var(--border-sub);border-radius:14px;padding:14px;margin-bottom:14px">
    <div class="mono" style="font-size:9px;color:var(--t4);letter-spacing:1.5px;margin-bottom:10px">WHAT CHANGED · LAST 14 DAYS</div>
    ${topChanged.map(r=>`<div style="display:flex;justify-content:space-between;align-items:center;padding:5px 0">
      <span style="font-size:12px;color:var(--t2)">${esc(r.sym)}</span>
      <span style="font-size:12px;font-weight:600;color:${r.dir==="down"?"#7DF9C0":r.dir==="up"?"#ff8c8c":"var(--t4)"}">${r.dir==="down"?"⬇":r.dir==="up"?"⬆":"➡"} ${r.dir==="flat"?"Unchanged":Math.abs(r.pct)+"%"}</span>
    </div>`).join("")}
  </div>` : "";

  const aheadHtml = lookingAhead.length ? `<div style="background:var(--surface-2);border:1px solid var(--border-sub);border-radius:14px;padding:14px;margin-bottom:14px">
    <div class="mono" style="font-size:9px;color:var(--t4);letter-spacing:1.5px;margin-bottom:10px">🔮 LOOKING AHEAD</div>
    ${lookingAhead.slice(0,5).map(t=>`<div style="font-size:12px;color:var(--t2);padding:4px 0">• ${esc(t)}</div>`).join("")}
    <div style="font-size:9px;color:var(--t5);margin-top:6px">Estimates based on your schedule and past cycles — not guarantees.</div>
  </div>` : "";

  // Monthly narrative — only if 30+ days of data exist
  let narrative="";
  if(activeCompounds.length){
    const [n0,p0]=activeCompounds[0];
    const firstDoseT=new Date([...p0.doses].sort((a,b)=>new Date(a.date)-new Date(b.date))[0].date).getTime();
    if((now-firstDoseT)>=30*86400000){
      const sents=[];
      const tc=topChanged.find(r=>r.dir!=="flat");
      if(tc) sents.push(`${tc.sym} has ${tc.dir==="down"?"become less frequent":"increased"} over the last two weeks.`);
      if(hero) sents.push(hero.text);
      const monthLogs=state.dailyLogs.filter(l=>(now-new Date(l.date).getTime())<=30*86400000).length;
      const prevMonthLogs=state.dailyLogs.filter(l=>{const d=now-new Date(l.date).getTime();return d>30*86400000&&d<=60*86400000;}).length;
      if(prevMonthLogs>=4){
        const symThis=state.dailyLogs.filter(l=>(now-new Date(l.date).getTime())<=30*86400000).reduce((a,l)=>a+(l.symptoms||[]).length,0);
        const symPrev=state.dailyLogs.filter(l=>{const d=now-new Date(l.date).getTime();return d>30*86400000&&d<=60*86400000;}).reduce((a,l)=>a+(l.symptoms||[]).length,0);
        if(symPrev>0){ const pct=Math.round((symThis-symPrev)/symPrev*100); if(Math.abs(pct)>=20) sents.push(`Overall, your symptom reports are ${pct<0?"down":"up"} ${Math.abs(pct)}% compared to last month.`); }
      }
      if(sents.length>=2) narrative=`<div style="background:var(--surface-2);border:1px solid var(--border-sub);border-radius:14px;padding:16px;margin-bottom:14px">
        <div class="mono" style="font-size:9px;color:var(--t4);letter-spacing:1.5px;margin-bottom:8px">📖 YOUR LAST 30 DAYS</div>
        <div style="font-size:13px;color:var(--t2);line-height:1.7">${sents.map(esc).join(" ")}</div>
      </div>`;
    }
  }

  // Group remaining cards into named sections
  const cardHtml = cd => `<div style="background:var(--surface-2);border:1px solid var(--border-sub);border-radius:12px;padding:12px 14px;display:flex;gap:10px;align-items:flex-start">
      <div style="font-size:18px;flex-shrink:0">${cd.icon}</div>
      <div style="flex:1;min-width:0">
        <div style="font-size:13px;color:var(--t1);font-weight:600">${cd.headline}</div>
        ${cd.detail?`<div style="font-size:11px;color:var(--t4);margin-top:2px">${cd.detail}</div>`:""}
      </div>
    </div>`;
  const patternCards = cards.filter(c=>c.cat==="pattern").slice(0,4);
  const milestoneCards = cards.filter(c=>c.cat==="milestone").slice(0,4);
  const changedCards = cards.filter(c=>c.cat==="changed").slice(0,3);

  const sectionHtml = (label,list) => list.length ? `<div style="margin-bottom:14px">
    <div class="mono" style="font-size:9px;color:var(--t4);letter-spacing:1.5px;margin-bottom:8px">${label}</div>
    <div style="display:flex;flex-direction:column;gap:8px">${list.map(cardHtml).join("")}</div>
  </div>` : "";

  // changed-category cards (dose changes, new supplements, weight) fold into What Changed
  const changedExtra = changedCards.length ? `<div style="display:flex;flex-direction:column;gap:8px;margin-top:8px">${changedCards.map(cardHtml).join("")}</div>` : "";

  return heroHtml
    + (changedHtml ? changedHtml.replace("</div>","")+changedExtra+"</div>" : sectionHtml("📈 WHAT CHANGED",changedCards))
    + sectionHtml("🔍 PATTERNS DISCOVERED",patternCards)
    + aheadHtml
    + narrative
    + sectionHtml("🏆 MILESTONES",milestoneCards);
}

async function aminoSend(input) {
  if (!state._aminoMsgs) state._aminoMsgs = [];
  state._aminoMsgs.push({role:"user", content:input});
  state._aminoLoading = true; render();
  setTimeout(()=>{ const c=document.getElementById("amino-chat"); if(c) c.scrollTop=c.scrollHeight; },50);
  // Small delay for natural feel
  await new Promise(r=>setTimeout(r,400));
  state._aminoMsgs.push({role:"assistant", content:nexusAnswer(input)});
  state._aminoLoading = false; render();
  setTimeout(()=>{ const c=document.getElementById("amino-chat"); if(c) c.scrollTop=c.scrollHeight; },50);
}

// ─── Adherence Calendar (12-week grid) ────────────────────────────────────────
function adherenceCalendar() {
  const today = localDate();
  const aps = allPeptides();
  const allDoses = Object.entries(aps).flatMap(([n,p])=>(p.doses||[]).map(d=>({...d,pep:n,color:cfg(n).color})));
  const scheduledDays = new Set();
  Object.entries(aps).filter(([,d])=>(d.doses||[]).length&&(d.status||"active")==="active").forEach(([n,d])=>{
    const sorted=[...d.doses].sort((a,b)=>new Date(a.date)-new Date(b.date));
    sorted.forEach(dose=>scheduledDays.add(dayKey(dose.date)));
    let next=new Date(addDays(sorted[sorted.length-1].date,d.scheduleDays));
    for(let i=0;i<60;i++){
      const k=dayKey(next.toISOString()); if(new Date(k)>new Date(today)) break;
      scheduledDays.add(k); next=new Date(next.getTime()+d.scheduleDays*86400000);
    }
  });
  const gridEnd = new Date(today);
  const gridStart = new Date(today); gridStart.setDate(gridStart.getDate()-83);
  const start = new Date(gridStart);
  const dow=start.getDay(); start.setDate(start.getDate()-(dow===0?6:dow-1));
  const cells=[]; const cur=new Date(start);
  while(dayKey(cur.toISOString())<=today){ cells.push(new Date(cur)); cur.setDate(cur.getDate()+1); }
  let totalSched=0,totalTaken=0;
  cells.forEach(d=>{ const k=dayKey(d.toISOString()); if(scheduledDays.has(k)){ totalSched++; if(allDoses.some(x=>dayKey(x.date)===k)) totalTaken++; } });
  const adherPct=totalSched>0?Math.round(totalTaken/totalSched*100):null;
  const weeks=[]; for(let i=0;i<cells.length;i+=7) weeks.push(cells[i]);
  const cellCol=(d)=>{
    const k=dayKey(d.toISOString());
    if(k>today) return "transparent";
    const hasDose=allDoses.some(x=>dayKey(x.date)===k);
    const hasLog=state.dailyLogs.some(l=>dayKey(l.date)===k);
    if(hasDose) return cfg(allDoses.find(x=>dayKey(x.date)===k).pep).color;
    if(scheduledDays.has(k)) return "#ff7c7c";
    if(hasLog) return "#A78BFA";
    return "var(--surface-3)";
  };
  return `<div style="margin-top:18px;padding-top:14px;border-top:1px solid var(--border-sub)">

const HK_TYPES = {
  HKQuantityTypeIdentifierBodyMass:"weight",
  HKQuantityTypeIdentifierStepCount:"steps",
  HKQuantityTypeIdentifierActiveEnergyBurned:"activeCalories",
  HKQuantityTypeIdentifierRestingHeartRate:"restingHR",
  HKQuantityTypeIdentifierWaistCircumference:"waist",
  HKQuantityTypeIdentifierDietaryEnergyConsumed:"calories",
  HKQuantityTypeIdentifierDietaryProtein:"protein",
  HKQuantityTypeIdentifierDietaryCarbohydrates:"carbs",
  HKQuantityTypeIdentifierDietaryFatTotal:"fat",
};
function parseHealthExport(file, onProgress) {
  return new Promise((resolve,reject)=>{
    const CHUNK=2*1024*1024; let offset=0, buffer="", total=file.size;
    const result={weight:[],steps:[],activeCalories:[],restingHR:[],waist:[],calories:[],protein:[],carbs:[],fat:[]};
    const recRe=/<Record\s([^>]*?)\/>/g, attrRe=/(\w+)="([^"]*)"/g;
    function attrs(s){const m={};let a;attrRe.lastIndex=0;while((a=attrRe.exec(s))!==null)m[a[1]]=a[2];return m;}
    function process(text){let m;recRe.lastIndex=0;while((m=recRe.exec(text))!==null){const a=attrs(m[1]);const mapped=HK_TYPES[a.type];if(!mapped)continue;const date=a.startDate||a.creationDate;const val=parseFloat(a.value);if(!date||isNaN(val))continue;result[mapped].push({date:new Date(date).toISOString(),value:val,unit:a.unit||"",sourceName:a.sourceName||"Unknown"});}}
    const reader=new FileReader();
    function next(){ if(offset>=total){finish();return;} reader.readAsText(file.slice(offset,offset+CHUNK)); }
    reader.onload=e=>{ buffer+=e.target.result; const tail=buffer.lastIndexOf("<"); if(tail>0&&tail<buffer.length-1){process(buffer.slice(0,tail));buffer=buffer.slice(tail);}else{process(buffer);buffer="";} offset+=CHUNK; onProgress(Math.min(99,Math.round(offset/total*100))); setTimeout(next,0); };
    reader.onerror=reject;
    function byDay(arr){const m={};arr.forEach(r=>{const k=dayKey(r.date);m[k]=(m[k]||0)+r.value;});return Object.entries(m).map(([d,v])=>({date:new Date(d).toISOString(),value:Math.round(v)})).sort((a,b)=>new Date(a.date)-new Date(b.date));}
    function lastPerDay(arr){const m={};arr.forEach(r=>{m[dayKey(r.date)]=r;});return Object.values(m).sort((a,b)=>new Date(a.date)-new Date(b.date));}
    function byDayForSrc(arr,src){const m={};arr.filter(r=>r.sourceName===src).forEach(r=>{const k=dayKey(r.date);m[k]=(m[k]||0)+r.value;});return Object.entries(m).map(([d,v])=>({date:d,value:Math.round(v)})).sort((a,b)=>a.date.localeCompare(b.date));}
    function finish(){
      if(buffer)process(buffer);
      onProgress(100);
      const macroKeys=["calories","protein","carbs","fat"];
      const macroSrcSet=new Set();
      macroKeys.forEach(k=>result[k].forEach(r=>macroSrcSet.add(r.sourceName)));
      // Sort sources — MacroFactor always first
      const macroSources=[...macroSrcSet].sort((a,b)=>{
        if(a.includes("MacroFactor"))return -1;
        if(b.includes("MacroFactor"))return 1;
        return a.localeCompare(b);
      });
      const macroBySrc={};
      macroSources.forEach(src=>{
        macroBySrc[src]={};
        macroKeys.forEach(k=>{ macroBySrc[src][k]=byDayForSrc(result[k],src); });
      });
      resolve({
        weight:lastPerDay(result.weight),
        steps:byDay(result.steps),
        activeCalories:byDay(result.activeCalories),
        restingHR:result.restingHR.sort((a,b)=>new Date(a.date)-new Date(b.date)),
        waist:lastPerDay(result.waist),
        macroSources,
        macroBySrc,
      });
    }
    next();
  });
}
// ─── CSV aggregate parser (Health Auto Export) ──────────────────────────────
function parseCSVDate(str) {
  if (!str) return null;
  const s = str.trim().split(' ')[0].split('T')[0];
  if (/^\d{4}-\d{2}-\d{2}$/.test(s)) return s;
  const m = s.match(/^(\d{1,2})\/(\d{1,2})\/(\d{4})$/);
  if (m) return `${m[3]}-${m[1].padStart(2,'0')}-${m[2].padStart(2,'0')}`;
  return null;
}
function parseAggregateCSV(text) {
  const lines = text.replace(/\r/g,'').trim().split('\n');
  if (lines.length < 2) throw new Error('CSV appears empty');
  const headers = lines[0].split(',').map(h=>h.trim().replace(/"/g,''));
  // Flexible column name map — covers Health Auto Export and common variants
  const COL_MAP = {
    'Date':'date',
    // ── Nutrition (exact Health Auto Export names) ──
    'Energy consumed(Cal)':'calories',
    'Protein(g)':'protein',
    'Carbohydrates(g)':'carbs',
    'Fat total(g)':'fat',
    'Fat saturated(g)':'fatSaturated',
    'Fiber(g)':'fiber',
    'Sugar(g)':'sugar',
    'Cholesterol(mg)':'cholesterol',
    'Caffeine(mg)':'caffeine',
    'Calcium(mg)':'calcium',
    'Iron(mg)':'iron',
    'Magnesium(mg)':'magnesium',
    'Potassium(mg)':'potassium',
    'Sodium(mg)':'sodium',
    'Water(mL)':'water',
    'Vitamin A(mcg)':'vitaminA',
    'Vitamin C(mg)':'vitaminC',
    'Vitamin D(mcg)':'vitaminD',
    // ── Energy ──
    'Active energy burned(Cal)':'activeCalories',
    'Basal energy burned(Cal)':'basalCalories',
    'Exercise time(min)':'exerciseMinutes',
    // ── Activity / movement ──
    'Step count(count)':'steps',
    'Flights climbed(count)':'flightsClimbed',
    'Distance walking / running(km)':'distanceKm',
    'Distance cycling(km)':'distanceCyclingKm',
    'Distance swimming(m)':'distanceSwimmingM',
    'Apple Watch stand hours(hr)':'standHours',
    'Stand time(min)':'standMinutes',
    // ── Heart rate ──
    'Heart rate(count/min)':'avgHeartRate',
    'Resting heart rate(count/min)':'restingHR',
    'Walking heart rate average(count/min)':'walkingHR',
    // ── Body ──
    'Body mass':'weight',                        // lb variants
    'Body Mass (lb)':'weight',
    'Body mass (kg)':'weightKg',
    'Body Mass (kg)':'weightKg',
    'Body fat percentage':'bodyFat',
    'Body Fat Percentage (%)':'bodyFat',
    // ── HRV / other (record-based fallback names) ──
    'Heart rate variability (SDNN)(HKQuantityTypeIdentifierHeartRateVariabilitySDNN)':'hrv',
    'Resting heart rate(HKQuantityTypeIdentifierRestingHeartRate)':'restingHR',
    'Body mass(HKQuantityTypeIdentifierBodyMass)':'weight',
    'VO2 Max(HKQuantityTypeIdentifierVO2Max)':'vo2max',
    'Waist circumference(HKQuantityTypeIdentifierWaistCircumference)':'waistCm',
    'Walking heart rate average(HKQuantityTypeIdentifierWalkingHeartRateAverage)':'walkingHR',
    'Time asleep(hr)':'sleepHours',
  };
  const idxMap = {};
  headers.forEach((h,i)=>{ const k=COL_MAP[h]; if(k) idxMap[k]=i; });
  if (!('date' in idxMap)) throw new Error('No "Date" column found. Check the file header row.');
  const rows = [];
  for (let i=1; i<lines.length; i++) {
    if (!lines[i].trim()) continue;
    const cols = lines[i].split(',').map(c=>c.replace(/^"|"$/g,'').trim());
    const date = parseCSVDate(cols[idxMap.date]);
    if (!date) continue;
    const row = {date};
    ['calories','protein','carbs','fat','fatSaturated','fiber','sugar','cholesterol','caffeine','sodium','water','activeCalories','basalCalories','exerciseMinutes','steps','flightsClimbed','standHours','standMinutes','distanceKm','distanceCyclingKm','avgHeartRate','restingHR','walkingHR','hrv','bodyFat','vo2max','sleepHours'].forEach(k=>{
      if (k in idxMap){ const n=parseFloat(cols[idxMap[k]]); if(!isNaN(n)&&n>0) row[k]=Math.round(n*10)/10; }
    });
    if ('weight' in idxMap){ const n=parseFloat(cols[idxMap.weight]); if(!isNaN(n)&&n>30) row.weight=+(n.toFixed(1)); }
    if ('weightKg' in idxMap && !row.weight){ const n=parseFloat(cols[idxMap.weightKg]); if(!isNaN(n)&&n>10) row.weight=+(n*2.2046).toFixed(1); }
    if (Object.keys(row).length > 1) rows.push(row);
  }
  if (!rows.length) throw new Error('No valid data rows found. Check the file format.');
  return rows.sort((a,b)=>a.date.localeCompare(b.date));
}

function parseWorkoutCSV(text) {
  const lines = text.replace(/\r/g,'').trim().split('\n');
  if (lines.length < 2) throw new Error('Workout CSV appears empty');
  const headers = lines[0].split(',').map(h=>h.trim().replace(/"/g,''));
  const idx = k => headers.indexOf(k);
  // Required columns
  const dateIdx=idx('Date'), actIdx=idx('Activity');
  if (dateIdx<0) throw new Error('No Date column in workout CSV');
  const rows = [];
  for (let i=1; i<lines.length; i++) {
    if (!lines[i].trim()) continue;
    const cols = lines[i].split(',').map(c=>c.replace(/^"|"$/g,'').trim());
    // Date range format: "2026-05-24 16:08:05 - 2026-05-24 16:24:42"
    const rawDate = cols[dateIdx]||'';
    const dateStr = parseCSVDate(rawDate.split(' - ')[0]);
    if (!dateStr) continue;
    const row = {
      date: dateStr,
      startTime: rawDate.split(' - ')[0]||'',
      endTime: rawDate.split(' - ')[1]||'',
      activity: actIdx>=0 ? (cols[actIdx]||'') : 'Workout',
    };
    const num = (k,mult) => { const n=parseFloat(cols[idx(k)]); return (!isNaN(n)&&n>0) ? Math.round(n*(mult||1)*10)/10 : null; };
    row.activeCalories = num('Active energy burned(Cal)');
    row.durationMin    = num('Duration(s)') != null ? Math.round(num('Duration(s)')/60) : null;
    row.distanceKm     = num('Distance(km)');
    row.avgHR          = num('Heart rate: Average(count/min)');
    row.maxHR          = num('Heart rate: Maximum(count/min)');
    row.mets           = num('METs Average(kcal/hr·kg)');
    // HR zones (store as 0–100 percentages)
    ['A Easy (<115bpm)','B Fat Burn (115-135bpm)','C Moderate Training (135-155bpm)','D Hard Training (155-175bpm)','E Extreme Training (>175bpm)'].forEach((z,zi)=>{
      const k=`Heart rate zone: ${z}(%)`;
      const n=parseFloat(cols[idx(k)]||'');
      if(!isNaN(n)) row[`hrZone${zi+1}`]=Math.round(n*100)/100;
    });
    if (row.activity) rows.push(row);
  }
  if (!rows.length) throw new Error('No valid workout rows found');
  return rows.sort((a,b)=>a.startTime.localeCompare(b.startTime));
}

  // ── CSV preview / import ──────────────────────────────────────────────────

    // Activity conflict stats (per-metric: only check non-workout logs)
    const existActLogs = state.activityLogs.filter(a=>!a.isWorkout);
    const actConflicts = actRows.filter(r=>existActLogs.some(a=>dayKey(a.date)===r.date)).length;
    const newAct = actRows.length - actConflicts;
    const newWeight = weightRows.filter(r=>!new Set(state.weightLogs.map(w=>dayKey(w.date))).has(r.date)).length;
    const conflictPillAct = k => `<button class="csv-cam" data-cm="${k}" style="padding:5px 11px;border-radius:99px;font-size:11px;font-weight:600;border:1px solid ${csvActivityConflictMode===k?"#7DF9C0":"var(--border-sub)"};background:${csvActivityConflictMode===k?"#7DF9C022":"transparent"};color:${csvActivityConflictMode===k?"#7DF9C0":"var(--t4)"}">${{skip:"Skip existing",replace:"Replace existing",merge:"Merge missing only"}[k]}</button>`;

      <div style="background:var(--surface-2);border:1px solid var(--border-sub);border-radius:10px;padding:12px 14px;margin-bottom:8px">
        <div class="csv-row" data-k="${key}" style="display:flex;align-items:center;gap:10px;cursor:pointer;margin-bottom:${conflictCount?"10px":"0"}">

          <div style="flex:1"><div style="font-size:13px;font-weight:600;color:var(--t2)">${label}</div>
          <div style="font-size:11px;color:var(--t4);margin-top:2px">${total} days · <span style="color:#7DF9C0">${isNew} new</span>${conflictCount?` · <span style="color:#F9C87D">${conflictCount} conflict${conflictCount>1?"s":""}</span>`:""}</div></div>
        </div>
        ${conflictCount?`<div style="font-size:10px;color:var(--t5);margin-bottom:6px">CONFLICT HANDLING</div><div style="display:flex;gap:6px;flex-wrap:wrap">${conflictPills}</div>`:""}
        ${extra||""}
      </div>`:"";
    body.innerHTML = `
      <div style="display:flex;align-items:center;gap:10px;margin-bottom:14px">
        <button id="bp" style="color:var(--t4);font-size:20px;padding:2px 8px">‹</button>
        <span class="mono" style="font-size:13px;color:#7DF9C0;letter-spacing:1.5px">CSV PREVIEW</span>
      </div>
      <div style="background:#7DF9C011;border:1px solid #7DF9C033;border-radius:10px;padding:10px 14px;margin-bottom:12px;font-size:12px;color:var(--t3)">
        <b style="color:#7DF9C0">${filteredRows.length}</b> of ${csvRows.length} days · <span style="font-size:11px;color:var(--t5)">${importFileName||"aggregate CSV"}</span>
        <div style="display:flex;gap:8px;margin-top:8px;align-items:center;flex-wrap:wrap">
          <span style="font-size:10px;color:var(--t4)">Import range:</span>

          ${csvDateFrom||csvDateTo?`<button id="csv-clearrange" style="font-size:10px;color:var(--t4);border:1px solid var(--border-sub);border-radius:6px;padding:3px 8px">Clear</button>`:""}
        </div>
      </div>
      ${sectionCard("macros","Dietary Macros","#F9C87D",macroRows.length,newMacro,conflicts,["skip","replace","merge"].map(conflictPill).join(""),sampleTable)}
      ${sectionCard("activity","Steps & Activity (daily totals)","#7DF9C0",actRows.length,newAct,actConflicts,["skip","replace","merge"].map(conflictPillAct).join(""),"")}
      ${sectionCard("weight","Body Weight","#8AB4FF",weightRows.length,newWeight,0,"","")}
      ${macroRows.length||weightRows.length||actRows.length?`<button id="csv-imp" class="btn-primary" style="background:#7DF9C0;margin-top:8px">IMPORT SELECTED</button>`:""}`;
    body.querySelector("#bp").onclick = pick;
    body.querySelectorAll(".csv-row").forEach(row=>row.onclick=e=>{ if(e.target.closest(".csv-cm,.csv-cam")) return; const k=row.dataset.k; csvSel[k]=!csvSel[k]; csvPreview(); });
    body.querySelectorAll(".csv-cm").forEach(btn=>btn.onclick=e=>{ e.stopPropagation(); csvConflictMode=btn.dataset.cm; csvPreview(); });
    body.querySelectorAll(".csv-cam").forEach(btn=>btn.onclick=e=>{ e.stopPropagation(); csvActivityConflictMode=btn.dataset.cm; csvPreview(); });
    const cfrom=body.querySelector("#csv-from"); if(cfrom) cfrom.onchange=()=>{ csvDateFrom=cfrom.value; csvPreview(); };
    const cto=body.querySelector("#csv-to"); if(cto) cto.onchange=()=>{ csvDateTo=cto.value; csvPreview(); };
    const ccr=body.querySelector("#csv-clearrange"); if(ccr) ccr.onclick=()=>{ csvDateFrom=""; csvDateTo=""; csvPreview(); };
    const imp=body.querySelector("#csv-imp"); if(imp) imp.onclick=csvDoImport;

  function csvDoImport() {
    if (!csvRows?.length) return;
    const filteredImport = csvRows.filter(r=>{
      if(csvDateFrom && r.date < csvDateFrom) return false;
      if(csvDateTo   && r.date > csvDateTo)   return false;
      return true;
    });
    const macroRows=filteredImport.filter(r=>r.calories||r.protein||r.carbs||r.fat||r.fiber||r.sugar);
    const weightRows=filteredImport.filter(r=>r.weight);
    const actRows=filteredImport.filter(r=>r.steps||r.activeCalories||r.basalCalories||r.restingHR||r.walkingHR||r.avgHeartRate||r.hrv||r.exerciseMinutes||r.flightsClimbed||r.standHours||r.distanceKm||r.distanceCyclingKm||r.vo2max||r.sleepHours);
    const meta={sourceType:"aggregate_csv",importBatchId,importedAt,importSource:importFileName};
    const existWK=new Set(state.weightLogs.map(w=>dayKey(w.date)));
    const ACT_FIELDS=['steps','activeCalories','basalCalories','exerciseMinutes','flightsClimbed','standHours','standMinutes','distanceKm','distanceCyclingKm','avgHeartRate','restingHR','walkingHR','hrv','bodyFat','vo2max','sleepHours'];
    let imported=0, replaced=0, merged=0, skipped=0;
    // Macros — with conflict mode
    if (csvSel.macros) {
      macroRows.forEach(row=>{
        const dk=row.date;
        const idx=state.macroLogs.findIndex(m=>dayKey(m.date)===dk);
        if (idx===-1) {
          state.macroLogs.push({id:uid(),date:dk+"T12:00:00",...meta,calories:row.calories,protein:row.protein,carbs:row.carbs,fat:row.fat,notes:"Health Auto Export"});
          imported++;
        } else if (csvConflictMode==="replace") {
          state.macroLogs[idx]={...state.macroLogs[idx],...meta,calories:row.calories,protein:row.protein,carbs:row.carbs,fat:row.fat};
          replaced++;
        } else if (csvConflictMode==="merge") {
          const ex=state.macroLogs[idx];
          if(!ex.calories&&row.calories) ex.calories=row.calories;
          if(!ex.protein&&row.protein) ex.protein=row.protein;
          if(!ex.carbs&&row.carbs) ex.carbs=row.carbs;
          if(!ex.fat&&row.fat) ex.fat=row.fat;
          merged++;
        } else { skipped++; }
      });
    }
    // Weight — skip existing dates
    if (csvSel.weight) weightRows.filter(r=>!existWK.has(r.date)).forEach(r=>{
      state.weightLogs.push({id:uid(),date:r.date+"T12:00:00",...meta,weight:String(r.weight),notes:"Health Auto Export"});
      imported++;
    });
    // Activity — PER-METRIC conflict handling (not date-level)
    if (csvSel.activity) {
      actRows.forEach(row=>{
        const dk=row.date;
        const existing=state.activityLogs.find(a=>dayKey(a.date)===dk&&!a.isWorkout);
        if (!existing) {
          const e={id:uid(),date:dk+"T12:00:00",...meta};
          ACT_FIELDS.forEach(k=>{if(row[k]!=null)e[k]=row[k];});
          state.activityLogs.push(e); imported++;
        } else if (csvActivityConflictMode==="replace") {
          ACT_FIELDS.forEach(k=>{if(row[k]!=null)existing[k]=row[k];});
          Object.assign(existing,meta); replaced++;
        } else if (csvActivityConflictMode==="merge") {
          // Only fill in fields that are null/undefined in existing record
          ACT_FIELDS.forEach(k=>{if(row[k]!=null&&existing[k]==null)existing[k]=row[k];});
          merged++;
        } else { skipped++; }
      });
    }
    saveState();
    const parts=[imported&&`${imported} added`,replaced&&`${replaced} replaced`,merged&&`${merged} merged`,skipped&&`${skipped} skipped`].filter(Boolean);
    body.innerHTML=`<div style="text-align:center;padding:30px 0"><div style="font-size:48px;margin-bottom:12px">✓</div><div style="font-size:15px;color:#7DF9C0;font-weight:700;margin-bottom:8px">Import complete</div><div style="font-size:12px;color:var(--t4);line-height:1.6">${parts.join(" · ")}</div><div style="font-size:11px;color:var(--t5);margin-top:8px;color:#A78BFA">Batch ID: ${String(importBatchId).slice(0,8)}</div></div><button id="done" class="btn-primary" style="background:#7DF9C0;margin-top:8px">DONE</button>`;
    body.querySelector("#done").onclick=()=>{closeModal();render();};
  }
  // ── Workout preview / import ──────────────────────────────────────────────

      </div>
      ${sampleTable}
      <button id="wk-imp" class="btn-primary" style="background:#A78BFA;margin-top:12px">IMPORT WORKOUTS</button>`;
    body.querySelector("#bp").onclick=pick;
    body.querySelector("#wk-imp").onclick=workoutDoImport;

  function workoutDoImport() {
    if (!workoutRows?.length) return;
    const workoutMeta={sourceType:"workout_csv",isWorkout:true,importBatchId,importedAt,importSource:importFileName};
    let added=0, skipped=0;
    workoutRows.forEach(r=>{
      // Workouts can stack on same day — use startTime as unique key
      const key=r.startTime||r.date;
      const alreadyHas=state.activityLogs.some(a=>(a.workoutStart||a.date)===key&&a.isWorkout);
      if(alreadyHas){ skipped++; return; }
      // Workout calories stored as workoutActiveCalories — NOT activeCalories
      // This prevents workout session data from polluting daily aggregate energy stats
      const e={id:uid(),date:r.date+"T12:00:00",...workoutMeta,workoutStart:r.startTime,workoutEnd:r.endTime,workoutType:r.activity};
      if(r.activeCalories!=null) e.workoutActiveCalories=r.activeCalories; // isolated from daily aggregate
      ['durationMin','distanceKm','avgHR','maxHR','mets','hrZone1','hrZone2','hrZone3','hrZone4','hrZone5'].forEach(k=>{if(r[k]!=null)e[k]=r[k];});
      state.activityLogs.push(e); added++;
    });
    saveState();
    body.innerHTML=`<div style="text-align:center;padding:30px 0"><div style="font-size:48px;margin-bottom:12px">✓</div><div style="font-size:15px;color:#A78BFA;font-weight:700;margin-bottom:8px">Workouts imported</div><div style="font-size:12px;color:var(--t4)">${added} added · ${skipped} already existed</div></div><button id="done" class="btn-primary" style="background:#A78BFA;margin-top:8px">DONE</button>`;
    body.querySelector("#done").onclick=()=>{closeModal();render();};
  }

      sel[k]=!sel[k]; const col=rows.find(r=>r[0]===k)[2];
      row.style.background=sel[k]?col+"11":"var(--surface-2)"; row.style.border=`1px solid ${sel[k]?col+"44":"var(--border)"}`;
      const box=row.querySelector(".hbox"); box.style.background=sel[k]?col:"transparent"; box.style.border=`2px solid ${sel[k]?col:"#444"}`;
    });
    body.querySelectorAll(".macro-src-btn").forEach(btn => btn.onclick = e => {
      e.stopPropagation();
      macroSource=btn.dataset.src;
      preview(); // re-render with new source selection
    });
    const imp = body.querySelector("#imp"); if (imp) imp.onclick = doImport;
  }
  function doImport() {
    const wk=new Set(state.weightLogs.map(w=>dayKey(w.date)));
    const waistK=new Set(state.measurementLogs.map(x=>dayKey(x.date)));
    const ak=new Set(state.activityLogs.map(a=>dayKey(a.date)));
    const existMacroK=new Set(state.macroLogs.map(m=>dayKey(m.date))); // fix: was wrongly using measurementLogs
    if (sel.weight) parsed.weight.filter(r=>!wk.has(dayKey(r.date))).forEach(r=>state.weightLogs.push({id:uid(),date:r.date,weight:(r.unit==="kg"?(r.value*2.2046):r.value).toFixed(1),notes:"Apple Health"}));
    if (sel.waist) parsed.waist.filter(r=>!waistK.has(dayKey(r.date))).forEach(r=>state.measurementLogs.push({id:uid(),date:r.date,waist:(r.unit==="cm"?(r.value/2.54):r.unit==="m"?(r.value*39.37):r.value).toFixed(1),notes:"Apple Health"}));
    // Macros: import from selected source only — no cross-source summing
    if(sel.macros && macroSource && parsed.macroBySrc?.[macroSource]){
      const src=parsed.macroBySrc[macroSource];
      const macroByDay={};
      ["calories","protein","carbs","fat"].forEach(k=>{
        (src[k]||[]).forEach(r=>{const dk=dayKey(r.date);if(!macroByDay[dk])macroByDay[dk]={date:r.date+"T12:00:00"};macroByDay[dk][k]=r.value;});
      });
      Object.values(macroByDay).forEach(rec=>{
        if(!existMacroK.has(dayKey(rec.date))) state.macroLogs.push({id:uid(),...rec,notes:"Apple Health · "+macroSource});
      });
    }
    parsed.steps.filter(r=>!ak.has(dayKey(r.date))).forEach(r=>{
      const cal=parsed.activeCalories.find(c=>dayKey(c.date)===dayKey(r.date)); const hr=parsed.restingHR.find(x=>dayKey(x.date)===dayKey(r.date));
      const e={id:uid(),date:r.date}; if(sel.steps)e.steps=r.value; if(sel.activeCalories&&cal)e.activeCalories=cal.value; if(sel.restingHR&&hr)e.restingHR=hr.value;
      if(e.steps||e.activeCalories||e.restingHR) state.activityLogs.push(e);
    });
    saveState();
    body.innerHTML = `<div style="text-align:center;padding:30px 0"><div style="font-size:48px;margin-bottom:12px">✓</div><div style="font-size:15px;color:#7DF9C0;font-weight:700;margin-bottom:8px">Import complete</div><div style="font-size:12px;color:var(--t4)">Check Trends to see it overlaid on your cycle.</div></div><button id="done" class="btn-primary" style="background:#7DF9C0">DONE</button>`;
    body.querySelector("#done").onclick = () => { closeModal(); render(); };
  }
  function manageImports() {
    // Helper: detect import fingerprint even without importBatchId
    const inferSrc = r => {
      if (r.sourceType) return r.sourceType;
      const n = r.notes||r.note||"";
      if (n.includes("Apple Health ·")) return "apple_health_xml";
      if (n === "Apple Health" || n === "Health Auto Export Apple Health") return "apple_health_xml";
      if (n === "Health Auto Export") return "aggregate_csv";
      if (r.isWorkout) return "workout_csv";
      return null; // manual entry — ignore
    };
    const isImported = r => r.importBatchId || inferSrc(r);

    // Collect all import records — tracked (have batchId) and legacy (have notes fingerprint)
    const allImported = [
      ...state.macroLogs.filter(isImported).map(r=>({...r,logType:"macros"})),
      ...state.weightLogs.filter(isImported).map(r=>({...r,logType:"weight"})),
      ...state.activityLogs.filter(isImported).map(r=>({...r,logType:"activity"})),
    ];

    // Group tracked records by batchId
    const batches = {};
    const legacy  = { apple_health_xml:{counts:{macros:0,weight:0,activity:0}}, aggregate_csv:{counts:{macros:0,weight:0,activity:0}}, workout_csv:{counts:{macros:0,weight:0,activity:0,workout:0}} };

    allImported.forEach(r => {
      if (r.importBatchId) {
        const k = r.importBatchId;
        if (!batches[k]) batches[k] = {batchId:k,sourceType:r.sourceType||inferSrc(r)||"unknown",importedAt:r.importedAt||"",importSource:r.importSource||"",counts:{macros:0,weight:0,activity:0,workout:0}};
        if (r.isWorkout) batches[k].counts.workout++;
        else batches[k].counts[r.logType]=(batches[k].counts[r.logType]||0)+1;
      } else {
        const src = inferSrc(r);
        if (src && legacy[src]) {
          if (r.isWorkout) legacy[src].counts.workout=(legacy[src].counts.workout||0)+1;
          else legacy[src].counts[r.logType]=(legacy[src].counts[r.logType]||0)+1;
        }
      }
    });

    const batchList = Object.values(batches).sort((a,b)=>b.importedAt.localeCompare(a.importedAt));
    const legacyEntries = Object.entries(legacy).filter(([,v])=>Object.values(v.counts).some(n=>n>0));
    const srcLabel = {aggregate_csv:"📊 Aggregate CSV",workout_csv:"🏋️ Workouts CSV",apple_health_xml:"📄 Apple Health XML",unknown:"❓ Unknown"};

    const isLegacyMatch = (r, srcType) => {
      if (r.importBatchId) return false; // tracked — handle via batch deletion
      return inferSrc(r) === srcType;
    };
    const deleteByBatch = bid => {
      const sidBid = String(bid); // data-bid attrs are strings; importBatchId is a number — compare as strings
      confirmAction("Delete this import batch? This cannot be undone.",()=>{
        state.macroLogs    = state.macroLogs.filter(r=>String(r.importBatchId)!==sidBid);
        state.weightLogs   = state.weightLogs.filter(r=>String(r.importBatchId)!==sidBid);
        state.activityLogs = state.activityLogs.filter(r=>String(r.importBatchId)!==sidBid);
        saveState(); render(); manageImports();
      });
    };
    const deleteByType = srcType => {
      const label = srcLabel[srcType]||srcType;

    const countStr = counts => Object.entries(counts).filter(([,n])=>n>0).map(([k,n])=>`${n} ${k}`).join(" · ");

    body.innerHTML=`
      <div style="display:flex;align-items:center;gap:10px;margin-bottom:16px">
        <button id="bp" style="color:var(--t4);font-size:20px;padding:2px 8px">‹</button>
        <span class="mono" style="font-size:13px;color:#A78BFA;letter-spacing:1.5px">MANAGE IMPORTS</span>
      </div>
      <div style="font-size:11px;color:var(--t4);line-height:1.5;margin-bottom:14px">Delete imported data by batch or source type. Manual entries are never affected.</div>

      ${batchList.length===0&&legacyEntries.length===0?`<div style="background:var(--surface-2);border:1px solid var(--border-sub);border-radius:10px;padding:20px;text-align:center;font-size:12px;color:var(--t4)">No imported records found.<br><span style="font-size:11px;color:var(--t5)">Import data via CSV or XML first.</span></div>`:""}

      ${batchList.length?`<div class="mono" style="font-size:10px;color:var(--t4);letter-spacing:1px;margin-bottom:8px">TRACKED BATCHES</div>`:""}
      ${batchList.map(b=>{

        return `<div style="background:var(--surface-2);border:1px solid var(--border-sub);border-radius:10px;padding:12px 14px;margin-bottom:8px">

            <span style="font-size:11px;color:var(--t2);font-weight:600">${srcLabel[b.sourceType]||b.sourceType}</span>
            <span style="font-size:10px;color:var(--t5)">${dateStr}</span>
